tier_rationale:
  en: |
    Two small offshore islands (Big Brother and Little Brother) 60 km
    east of the Egyptian mainland — accessible only by multi-day
    liveaboard. Walls drop into the open Red Sea (over 1000 m beyond
    the shelf), with strong unpredictable currents. Resident oceanic
    whitetip and thresher shark populations. Deepest reliable recovery
    point is back on the liveaboard, multiple hours from the nearest
    chamber (Hurghada or Marsa Alam). Reserved for advanced divers with
    deep specialty + at least 100 logged dives per most operator rules.

display_name:
  en: Scuba — Red Sea Brothers Islands
  it: Immersione — Mar Rosso Brothers Islands
  es: Buceo — Mar Rojo Brothers Islands
  fr: Plongée — Mer Rouge Brothers Islands
  de: Tauchen — Rotes Meer Brothers Islands

description:
  en: |
    Offshore tier-1 wall diving for the experienced Red Sea community.
    Pelagic encounters (oceanic whitetip, thresher, occasional hammerhead
    schools at Little Brother) are the draw. Diving exclusively from
    liveaboards moored on the islands' protected lee side; conditions
    in even moderate weather make pickup non-trivial. Season is
    roughly May-October — winter swell makes the crossing impractical.

