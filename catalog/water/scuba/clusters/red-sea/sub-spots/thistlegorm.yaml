  es: Buceo — Mar Rojo SS Thistlegorm
  fr: Plongée — Mer Rouge SS Thistlegorm
  de: Tauchen — Rotes Meer SS Thistlegorm

description:
  en: |
    The Red Sea's most-visited wreck dive — British WWII supply ship
    with intact cargo (trucks, motorcycles, locomotives, rifles).
    Standard operating profile is two dives: external + light
    penetration through the cargo holds. Mooring rotation in place to
    limit anchor damage on the wreck (HEPCA + Egyptian authority
    coordination). Visibility seasonally variable (20-35 m).

