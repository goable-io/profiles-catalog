tier_rationale:
  en: |
    World-famous wreck of a British supply ship sunk in 1941, sitting
    upright at 16-32 m in the Strait of Gubal. Standard dive is an
    external tour at 24-30 m with optional limited penetration of the
    cargo holds (the truck and motorbike rooms). Current at the wreck
    is variable and sometimes strong (running between the Sinai and the
    mainland). Penetration in the holds is "swim-through" rather than
    deep wreck penetration — no overhead more than 2-3 m from open water
    on the standard tour. Multiple competent boats moored above.

