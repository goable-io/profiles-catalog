description:
  en: |
    The Red Sea (Egyptian, Sudanese, Saudi coasts) is the global tier-1
    warm-water diving destination, with year-round 22-29°C surface
    temperatures, 25-40m visibility, and unique fringing reef + offshore
    seamount topology. Dominant condition factor is wind — the prevailing
    NW (Etesian-Khamsin transition) creates short-period chop above
    20 knots that gates safari (liveaboard) operations. Underwater
    visibility is exceptional but turbidity briefly drops post-shamal
    sandstorms and during spring/autumn current shifts. This profile
    targets recreational + technical Red Sea diving from both shore-based
    (Dahab, Aqaba, Sharm) and liveaboard (Brothers, Daedalus, Elphinstone)
    operations.

