gates:
  - metric: wave_height_m
    condition: gt
    value: 2.3
    reason_code: MED_HIGH_SEAS
    description: Wave height above 2.3m in Mediterranean coastal sites (Tramontane/Mistral storm events) creates unsafe shore-entry and small-boat access conditions.

  - metric: visibility_km
    condition: lt
    value: 0.8
    reason_code: POOR_VISIBILITY_MED
    description: Surface visibility below 800m during Mediterranean haze/sirocco events makes site-finding unsafe.

  - metric: precipitation_mm_h
    condition: gt
    value: 12
    reason_code: HEAVY_RAIN_RUNOFF
    description: Heavy active rain in coastal sites triggers terrestrial runoff that drops underwater visibility from 20m+ to 1-3m at impacted sites within hours.

  - metric: turbidity_proxy
    condition: gt
    value: 25
    reason_code: HIGH_TURBIDITY_POSTSTORM
    description: Elevated turbidity (post-storm sediment, river plumes) destroys diving quality and creates underwater navigation hazards.

sustainability:
  carbon_neutral: true
  equipment_dependency: high
  typical_season_weeks: 28
  carrying_capacity_sensitivity: medium
  notes: |
    Mediterranean dive sites are concentrated in Marine Protected Areas
    (Medes Islands, Lavezzi, Capraia, Ustica, Kornati) where carrying
    capacity is actively managed via permits and daily diver caps.
    Coral and gorgonian degradation from contact + bubble exposure is
    documented; site managers enforce trim and frequency limits. Boat
    transport accounts for the largest per-session footprint in the
    Mediterranean basin (typically 5-30 min RIB transfer).

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "FIPSAS (Italian underwater federation) Mediterranean dive site classification"
    - "Mediterranean Action Plan (UNEP/MAP) MPA carrying capacity guidance"
    - "Lloret et al. 2008, Mediterranean SCUBA diving impact studies"
    - "PADI Mediterranean regional dive condition handbook"
  notes: |
    Regional overrides vs global scuba: visibility weight raised from
    0.30 to 0.32 (Mediterranean clarity is part of the value proposition);
    water_temp optimal shifted from 22 to 26°C (basin warming); added
    turbidity_proxy gate (post-storm sediment events are the main
    quality killer in shoulder seasons). Water clarity sub-metric added
    explicitly as a small weight to flag bloom periods (April-May,
    September). Wave gate tightened from 2.5 to 2.3 m given prevailing
    shore-entry sites.
