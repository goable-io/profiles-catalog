slug: scuba-mediterranean
version: "1.0.0"
category: water
extends: scuba
region: mediterranean
display_name:
  en: Scuba Diving — Mediterranean
  it: Immersione — Mediterraneo
  es: Buceo — Mediterráneo
  fr: Plongée — Méditerranée
  de: Tauchen — Mittelmeer
description:
  en: |
    Mediterranean diving spans coastal walls, posidonia meadows, wrecks,
    and seamount drift dives across the basin. Visibility is generally
    better than Atlantic sites (15-30m typical) but seasonally variable —
    spring blooms and post-storm sediment can briefly halve it. Water
    temperature stratification is sharp: thermocline at 15-25m drops
    bottom temperatures by 6-10°C below mixed-layer values. Regional
    overrides shift the optimal water_temperature curve to a higher
    sweet spot (basin warms to 26-28°C in August) and weight visibility
    higher because Mediterranean clarity is part of the value proposition.

dimensions:
  - name: visibility
    metric: visibility_km
    weight: 0.32
    curve:
      - { x: 0.0, s: 0.0 }
      - { x: 0.5, s: 0.1 }
      - { x: 1.0, s: 0.5 }
      - { x: 3.0, s: 0.85 }
      - { x: 5.0, s: 1.0 }

  - name: wave
    metric: wave_height_m
    weight: 0.22
    curve:
      - { x: 0.0, s: 1.00 }
      - { x: 0.3, s: 1.00 }
      - { x: 0.7, s: 0.85 }
      - { x: 1.3, s: 0.50 }
      - { x: 2.0, s: 0.15 }
      - { x: 2.8, s: 0.00 }

  - name: water_temp
    metric: water_temperature_c
    weight: 0.20
    curve:
      - { x: 12, s: 0.10 }
      - { x: 16, s: 0.45 }
      - { x: 20, s: 0.85 }
      - { x: 24, s: 1.00 }
      - { x: 28, s: 1.00 }
      - { x: 30, s: 0.90 }

  - name: wind_speed
    metric: wind_speed_kn
    weight: 0.10
    curve:
      - { x: 0,  s: 1.00 }
      - { x: 8,  s: 1.00 }
      - { x: 14, s: 0.75 }
      - { x: 20, s: 0.40 }
      - { x: 28, s: 0.00 }

  - name: water_clarity
    metric: water_clarity_index
    weight: 0.08
    curve:
      - { x: 0.0, s: 0.15 }
      - { x: 0.3, s: 0.55 }
      - { x: 0.6, s: 0.85 }
      - { x: 1.0, s: 1.00 }

  - name: air_temp_comfort
    metric: apparent_temp_c
    weight: 0.05
    curve:
      - { x: 5,  s: 0.20 }
      - { x: 15, s: 0.75 }
      - { x: 22, s: 1.00 }
