slug: sailing
spot_kind: base
version: "1.0.0"
category: water
display_name:
  en: Sailing
  it: Vela
  es: Vela
  fr: Voile
  de: Segeln
description:
  en: |
    Sailing benefits from steady wind in the 8-20 knot range. Unlike kite and
    windsurf, all wind directions are workable (tacking and jibing). Wave
    conditions affect comfort and safety; visibility is critical for navigation.

dimensions:
  - name: wind_speed
    metric: wind_speed_kn
    weight: 0.40
    curve:
      - { x: 0, s: 0.00 }
      - { x: 5, s: 0.30 }
      - { x: 8, s: 0.70 }
      - { x: 12, s: 0.95 }
      - { x: 18, s: 1.00 }
      - { x: 25, s: 0.80 }
      - { x: 30, s: 0.50 }
      - { x: 35, s: 0.10 }
      - { x: 40, s: 0.00 }
    modifiers:
      gust_factor_penalty:
        threshold: 1.5
        penalty_coefficient: 0.10

  - name: wind_direction
    metric: wind_direction_deg
    weight: 0.20
    modifiers:
      direction_preference:
        - { from: 0, to: 90, multiplier: 0.9 }
        - { from: 90, to: 180, multiplier: 1.0 }
        - { from: 180, to: 270, multiplier: 1.0 }
        - { from: 270, to: 360, multiplier: 0.9 }

  - name: wave
    metric: wave_height_m
    weight: 0.15
    curve:
      - { x: 0.0, s: 0.80 }
      - { x: 0.5, s: 1.00 }
      - { x: 1.5, s: 0.90 }
      - { x: 2.5, s: 0.70 }
      - { x: 4.0, s: 0.40 }
      - { x: 6.0, s: 0.10 }
      - { x: 8.0, s: 0.00 }

  - name: visibility
    metric: visibility_km
    weight: 0.10
    curve:
      - { x: 0, s: 0.0 }
      - { x: 1, s: 0.0 }
      - { x: 3, s: 0.5 }
      - { x: 5, s: 0.8 }
      - { x: 10, s: 1.0 }

  - name: air_temp_comfort
    metric: apparent_temp_c
    weight: 0.10
    curve:
      - { x: -5, s: 0.0 }
      - { x: 5, s: 0.3 }
      - { x: 15, s: 0.8 }
      - { x: 25, s: 1.0 }
      - { x: 38, s: 0.6 }

  - name: water_temp
    metric: water_temperature_c
    weight: 0.05
    curve:
      - { x: 5, s: 0.0 }
      - { x: 12, s: 0.4 }
      - { x: 18, s: 0.8 }
      - { x: 22, s: 1.0 }
      - { x: 30, s: 1.0 }

gates:
  - metric: wind_speed_kn
    condition: gt
    value: 35
    reason_code: GALE_FORCE_WIND
    description: Wind above 35 knots is unsafe for recreational sailing.

  - metric: visibility_km
    condition: lt
    value: 1
    reason_code: LOW_VISIBILITY
    description: Visibility below 1 km is unsafe for navigation.

  - metric: precipitation_mm_h
    condition: gt
    value: 15
    reason_code: HEAVY_RAIN
    description: Heavy rain reduces visibility and indicates storm conditions.

sustainability:
  carbon_neutral: true
  equipment_dependency: high
  typical_season_weeks: 28
  carrying_capacity_sensitivity: low
  notes: |
    Wind-powered activity with zero direct emissions per session (auxiliary
    engine fuel use excluded). Equipment footprint is high (boat, sails,
    rigging) but amortised over a 10-20 year vessel lifespan. Boats require
    marina access; low carrying capacity sensitivity because each vessel
    occupies a large area naturally spacing users out.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "Royal Yachting Association (RYA) weather training guidelines"
    - "World Sailing (ISAF) race category safety requirements"
  notes: |
    Provisional profile v1.0. Wind direction weight is distributed broadly
    across all angles (0.9-1.0 multiplier) because a sailboat can point in
    any direction relative to wind. Narrow-angle sailing (close-hauled) is
    typically restricted to experienced crews — operators may lower the wind
    gate for beginner courses via tenant_profile_overrides.
