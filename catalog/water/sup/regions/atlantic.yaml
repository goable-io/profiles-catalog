slug: sup-atlantic
version: "1.0.0"
category: water
extends: sup
region: atlantic
display_name:
  en: Stand Up Paddleboarding — Atlantic
  it: Stand Up Paddle — Atlantico
  es: Paddle Surf — Atlántico
  fr: Paddle debout — Atlantique
  de: Stand-Up-Paddeln — Atlantik
description:
  en: |
    Atlantic SUP is more demanding than Mediterranean: synoptic winds (10-20kn)
    are persistent and harder to escape, tidal range is significant (2-4m),
    and Atlantic swell creates confused chop even in sheltered bays. Wind gate
    lowered to 12 knots — Atlantic gusts are sustained rather than pulsing,
    and an off-shore wind in open coastal conditions can carry even experienced
    paddlers into serious danger. Best conditions: protected estuaries, river
    mouths, and harbours at slack tide. Flatwater touring in the Algarve,
    Bretagne coast, and Canary Islands protected bays.

dimensions:
