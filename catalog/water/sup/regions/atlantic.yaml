      - { x: 30, s: 1.0 }

gates:
  - metric: wind_speed_kn
    condition: gt
    value: 12
    reason_code: STRONG_WIND
    description: Wind above 12 knots in open Atlantic conditions is unsafe for SUP — sustained off-shore gusts are life-threatening.

  - metric: precipitation_mm_h
    condition: gt
    value: 10
    reason_code: HEAVY_RAIN
    description: Heavy rain reduces visibility and indicates storm conditions.

  - metric: visibility_km
    condition: lt
    value: 1
    reason_code: LOW_VISIBILITY
    description: Visibility below 1 km is unsafe.

sustainability:
  carbon_neutral: true
  equipment_dependency: medium
  typical_season_weeks: 26
  carrying_capacity_sensitivity: low
  notes: |
    Atlantic SUP season is concentrated (June-September for comfort) but
    protected estuary and harbour paddling extends the season. Cold water
    requires thicker wetsuit, increasing material footprint. Atlantic spots
    see lower SUP density than Mediterranean due to harder conditions.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "ISA SUP Safety Guidelines 2023"
    - "Moran & Sherker 2009, paddling injury prevention, Wilderness Medicine"
    - "RNLI (Royal National Lifeboat Institution) coastal safety guidance 2022"
  notes: |
    Regional override vs global SUP: wind gate tightened from 15kn to 12kn
    (Atlantic sustained winds are far more dangerous than Mediterranean thermals
    — RNLI data shows SUP incidents concentrate above 12kn in open coastal
    conditions); wave curve compressed to reflect smaller acceptable swell.
