    metric: wind_speed_kn
    weight: 0.35
    curve:
      - { x: 0,  s: 1.00 }
      - { x: 5,  s: 1.00 }
      - { x: 8,  s: 0.80 }
      - { x: 12, s: 0.30 }
      - { x: 15, s: 0.05 }
      - { x: 18, s: 0.00 }

  - name: wave
    metric: wave_height_m
    weight: 0.20
    curve:
      - { x: 0.0, s: 1.00 }
      - { x: 0.3, s: 0.90 }
      - { x: 0.5, s: 0.65 }
      - { x: 0.8, s: 0.30 }
      - { x: 1.0, s: 0.10 }
      - { x: 1.5, s: 0.00 }

  - name: visibility
