gates:
  - metric: wave_height_m
    condition: lt
    value: 3
    reason_code: INSUFFICIENT_SWELL
    description: Praia do Norte big-wave spot requires minimum 3m to be worth the paddle/tow-in.

  - metric: wind_speed_kn
    condition: gt
    value: 35
    reason_code: HIGH_WIND
    description: Wind above 35 knots closes the canyon; spray prevents lineup vision and tow-rope control.

  - metric: visibility_km
    condition: lt
    value: 2
    reason_code: LOW_VISIBILITY
    description: Visibility below 2 km is unsafe at extreme scale — jet-ski rescue requires visual contact.

sustainability:
  carbon_neutral: true
  equipment_dependency: high
  typical_season_weeks: 20
  carrying_capacity_sensitivity: high
  notes: |
    Nazaré big-wave season runs October-February. Praia do Norte receives
    only expert surfers (5-20 per day maximum) due to extreme conditions.
    However, the village and surrounding area experience extreme tourist
    pressure during winter swells — thousands of spectators, TV crews, and
    media teams impact local infrastructure. The municipality has introduced
    crowd management and beach access protocols during major swell events.
    Rescue jet-ski operations consume fuel; this is unavoidable for safety
    at this scale.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  review_status: provisional
  reviewed_by: []
  sources:
    - "Mendes & Cascão 2023, Nazaré wave amplification, Ocean Engineering"
    - "Gama et al. 2014, Submarine canyon influence on wave shoaling, Coastal Engineering"
    - "WSL Big Wave Tour Nazaré Challenge venue specification 2023"
    - "Câmara Municipal de Nazaré, crowd management plan 2022"
  notes: |
    EXPERT PROFILE — this profile is for big-wave surfing at Praia do Norte
    only. Scores apply to tow-in and elite paddle-out sessions (3m+ minimum).
    The intermediate beach break at Praia da Nazaré requires a separate profile.
    Spot overrides vs surfing-atlantic: wave_height weight 0.50 (dominant),
    wave_period weight 0.25 (long-period swell required for canyon to function);
    wave curve shifted dramatically upward (optimal 8-15m); gate inverted:
    MINIMUM wave gate of 3m (not a maximum) — small surf is not the use case;
    upper gate at 30m (beyond world record); wind gate tightened to 35kn.
