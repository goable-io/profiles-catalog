display_name:
  en: Surfing — Nazaré
  it: Surf — Nazaré
  es: Surf — Nazaré
  fr: Surf — Nazaré
  de: Surfen — Nazaré
description:
  en: |
    Nazaré (Portugal) is home to the world's largest surfed waves, driven by
    the Nazaré Submarine Canyon — a 5000m-deep, 230km-long trench running from
    the shelf break to 500m offshore. The canyon focuses and amplifies North
    Atlantic groundswell, creating waves up to 30m+ at Praia do Norte. This
    profile targets the expert tow-in and big-wave paddle-out community; the
    village beach (Praia da Nazaré) scores differently — it has a regular
    beach break suitable for intermediates when the canyon is not firing.
    Active during North Atlantic storm season: October-February prime window.

