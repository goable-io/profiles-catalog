tier_rationale:
  en: |
    The Bay — Imsouane's signature long-walling right point break. Sand
    bottom for the full wave length, soft and slow-breaking, with a
    rideable wall that runs 600-800 m on the right swell. Lifeguarded
    in the morning, the village's primary tourism asset. Standard
    learning venue for surf schools across Morocco's Atlantic coast
    — possibly the most forgiving "epic-wave" spot in the African
    Atlantic. Failure mode is a long swim back to the take-off, fully
    recoverable for any reasonably-fit surfer.

