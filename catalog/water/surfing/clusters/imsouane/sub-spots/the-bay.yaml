description:
  en: |
    "The longest right in Africa." Imsouane Bay's right-hand point is
    a longboarder's dream and a perfect intermediate progression
    venue. Lower swell threshold than Taghazout — works on 0.6m+
    where Anchor Point needs 1m+ minimum.

