tier_rationale:
  en: |
    Outer reef point ~1 km south of The Bay. Reef-and-rock bottom,
    faster and steeper than The Bay, used by experienced surfers when
    The Bay is too small. Channel paddle around the south side of the
    reef. Smaller community presence than at The Bay.

