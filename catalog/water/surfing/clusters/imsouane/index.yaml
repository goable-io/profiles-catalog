    - "Stormrider Guide Africa Imsouane entry"
  notes: |
    Cluster aggregates The Bay (long classic right point) and
    Cathedral (outer reef big-day option). Region tag: atlantic.
    Sweet-spot wave height shifted slightly smaller (1.2m) vs
    Atlantic parent (1.8m) — the cluster shines on smaller cleaner
    swell, not on the biggest days (where Taghazout takes over).
