description:
  en: |
    Imsouane (Atlantic Morocco, 75 km N of Taghazout) is known for "The
    Bay" — one of the longest right-hand point waves in Africa,
    producing 600+ m rideable walls on the right swell. Cathedral, the
    cluster's outer reef, is the big-day option. Slower season than
    Taghazout (mid-October to March) but with characteristically
    cleaner, longer waves on smaller swell. Mountains shelter the bay
    from offshore wind for most of the surfable morning window.

