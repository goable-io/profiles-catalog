gates:
  - metric: wave_height_m
    condition: gt
    value: 6
    reason_code: BAY_CLOSEOUT
    description: The Bay closes out above 6m; on bigger swells the cluster shifts to Cathedral for the advanced community.

  - metric: wind_speed_kn
    condition: gt
    value: 30
    reason_code: HIGH_WIND
    description: Onshore wind above 30 knots destroys the long-wall shape.

  - metric: visibility_km
    condition: lt
    value: 1
    reason_code: LOW_VISIBILITY
    description: Visibility below 1 km is unsafe.

sustainability:
  carbon_neutral: true
  equipment_dependency: low
  typical_season_weeks: 24
  carrying_capacity_sensitivity: medium
  notes: |
    Imsouane is the longboard / mid-length destination of the Moroccan
    Atlantic. Quieter than Taghazout, with fewer schools and a small
    fishing-village core. Local crowd-management is community
    self-regulation rather than formal zoning.

