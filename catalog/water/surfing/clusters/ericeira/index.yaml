description:
  en: |
    Ericeira (Estremadura coast, Portugal) was declared a World Surfing
    Reserve in 2011 — one of only 11 worldwide. Concentrates ~10 km of
    high-quality reef-and-point breaks fed by consistent N Atlantic
    groundswell. Three flagship sub-spots: Coxos (the right-hand reef
    point, often called "Portugal's best wave"), Ribeira d'Ilhas (the
    WSL Pro venue), and Pedra Branca (the punchy outer reef). Peak
    season October-March with shoulder windows in April-May and
    September.

