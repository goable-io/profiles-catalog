gates:
  - metric: wave_height_m
    condition: gt
    value: 8
    reason_code: EXTREME_SURF
    description: Wave height above 8m closes Ericeira's reef breaks; serious sets push the WSL venue to its operational limits.

  - metric: wind_speed_kn
    condition: gt
    value: 30
    reason_code: HIGH_ONSHORE_WIND
    description: Sustained onshore wind above 30 knots destroys wave shape at the Ericeira reefs.

  - metric: visibility_km
    condition: lt
    value: 1
    reason_code: LOW_VISIBILITY
    description: Visibility below 1 km is unsafe; Atlantic fog drops it occasionally on summer mornings.

sustainability:
  carbon_neutral: true
  equipment_dependency: medium
  typical_season_weeks: 36
  carrying_capacity_sensitivity: high
  notes: |
    Ericeira World Surfing Reserve is the second WSR designated in
    Europe (after Mundaka in 2011 only Madeira matches). Operates under
    a formal stewardship framework managed by Save the Waves + Ericeira
    Surf Clube; peak winter weekends see crowd density that elders
    consider near-saturation at the main spots. Surf-tourism is the
    primary economic driver of the town outside the lobster season.

