tier_rationale:
  en: |
    Outer reef break north of Ribeira d'Ilhas. Big-wave-of-the-day
    spot for the local community when swell exceeds 2.5 m and
    closes out the inner reefs. Reef bottom with a deep channel
    on the outside but a shallow inside-section drop — the wave
    breaks twice. Used by experienced big-wave Ericeira surfers
    only; no school presence, no paddle assistance, exposure to
    open Atlantic swell.

