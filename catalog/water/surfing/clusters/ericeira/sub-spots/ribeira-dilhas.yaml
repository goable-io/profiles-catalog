tier_rationale:
  en: |
    Right-hand point break with a sand-and-rock bottom and a long
    rippable wall. The competition venue of the Ericeira Pro
    (WQS / former CT) since 1985. More forgiving than Coxos: paddle
    channel on the inside, sand sections at low tide, and a wider
    take-off zone. Wave height 1.2–3 m typical; works on NW swell
    similar to Coxos. Crowded at all swell sizes — the most-surfed
    spot in the cluster.

