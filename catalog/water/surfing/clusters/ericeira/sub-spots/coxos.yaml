tier_rationale:
  en: |
    Right-hand reef point at the northern end of the Ericeira WSR.
    Sharp basalt reef bottom under the lineup with a fast take-off
    and a hollow second section over a shallow exposed reef shelf.
    Wave height 1.5–3 m typical; on big days 4–6 m sets close out
    the inside section. No paddle channel — the only exit is back
    across the reef. Reserved for advanced surfers comfortable on
    a slab-style right.

