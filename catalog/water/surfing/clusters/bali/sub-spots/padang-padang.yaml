tier_rationale:
  en: |
    Bukit peninsula reef break ~2 km north of Uluwatu. Hollow short-
    barrel left over a shallow coral reef. Smaller window than
    Uluwatu (needs ~2 m+ to start working, closes out >4 m), but
    when it activates the inside-section barrel is among the best
    paddle-in tubes on the planet. Very shallow at the take-off — a
    wipeout puts a surfer onto exposed coral with a documented
    accident rate.

display_name:
  en: Surfing — Padang Padang
  it: Surf — Padang Padang
  es: Surf — Padang Padang
  fr: Surf — Padang Padang
  de: Surfen — Padang Padang

description:
  en: |
    "The Balinese Pipeline." Padang only works on solid swell + low-tide
    window, but on a good day produces some of the most photographed
    tubes in surfing. Hosts the Rip Curl Cup big-wave invitational on
    selected swells.

