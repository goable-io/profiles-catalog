tier_rationale:
  en: |
    The Bukit peninsula's flagship left-hand reef break — actually
    five distinct take-off zones along a 500 m reef ledge (the
    Peak, Racetracks, Outside Corner, Temples, Outside Outside).
    Coral reef bottom, very shallow at low tide, access via the
    cave entrance from the cliffs. Closed at low tide; mid-to-high
    is the operational window. International crowd density is the
    highest of any Bali break — collision risk is the dominant
    practical hazard, not the wave's energy.

