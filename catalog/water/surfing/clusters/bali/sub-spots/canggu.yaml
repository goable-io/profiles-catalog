tier_rationale:
  en: |
    Beach-break + reef-and-sand mix on Bali's west coast, 15 km north of
    the airport. Multiple peaks (Berawa, Echo Beach, Pererenan)
    spread along a 3 km stretch. Sand-and-rock bottom, smaller and
    cleaner than the Bukit reefs, the standard intermediate / learning
    side of Bali surfing. International crowd density is extreme in
    peak season (50+ surfers per peak at Echo Beach), but the
    softer wave makes consequence-of-error lower than the Bukit
    reef breaks.

