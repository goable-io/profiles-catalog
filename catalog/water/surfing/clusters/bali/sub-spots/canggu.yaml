description:
  en: |
    Bali's intermediate-and-beginner surf hub. Canggu's mix of
    accessible beach-break, surf schools, and digital-nomad culture
    has made it the global poster-child of Indonesian surf tourism.
    Best for first-week surfers and longboard sessions.

