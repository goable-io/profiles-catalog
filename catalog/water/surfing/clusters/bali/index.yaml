description:
  en: |
    Bali (Indonesia) is the global benchmark for warm-water tropical
    surfing. The Bukit peninsula (south Bali) hosts the iconic
    Indian-Ocean reef breaks — Uluwatu, Padang Padang, Bingin — fed
    by Southern-Ocean groundswell with SE trade winds delivering
    morning-glass offshore conditions. Canggu (west coast, central
    Bali) is the beach-break complement working on the same swell
    but more accessible and crowded. Peak season April-October (SE
    trade window). Warm water 27-29°C year-round — trunks only.

