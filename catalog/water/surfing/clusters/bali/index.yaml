gates:
  - metric: wave_height_m
    condition: gt
    value: 7
    reason_code: EXTREME_REEF_SURF
    description: Above 7m the Bukit reef points close out; only specialist big-day spots (Padang big, Outside Corner) take it from there.

  - metric: wind_speed_kn
    condition: gt
    value: 30
    reason_code: SW_MONSOON_ONSHORE
    description: SW monsoon onshore wind above 30 knots — typical wet-season afternoons — destroys wave shape on Bukit and Canggu.

  - metric: visibility_km
    condition: lt
    value: 1
    reason_code: LOW_VISIBILITY
    description: Visibility below 1 km is unsafe; tropical squalls drive most low-vis events.

sustainability:
  carbon_neutral: true
  equipment_dependency: low
  typical_season_weeks: 28
  carrying_capacity_sensitivity: high
  notes: |
    Bali's iconic Bukit reef breaks see global crowding pressure —
    Uluwatu peak-season weekend lineups exceed 100+ surfers with
    in-water collision documented as a fatality factor. Local
    Banjar (village) committees have emerged as informal crowd-
    managers at some spots (notably Padang). Wet-season runoff +
    coastal-development drainage are documented reef-stress factors.

