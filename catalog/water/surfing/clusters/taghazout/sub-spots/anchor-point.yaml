tier_rationale:
  en: |
    The classic long-walling right-hand point break of the cluster.
    Rocky / boulder bottom that becomes shallow at low tide — most
    sessions ride mid-to-high tide. 200-400 m rideable walls in good
    conditions. Channel paddle on the inside makes lineup access
    relatively forgiving. Local lineup priority enforced but lower
    intensity than Mundaka or Coxos.

