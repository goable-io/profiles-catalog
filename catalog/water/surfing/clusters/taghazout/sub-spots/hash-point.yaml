tier: 2
tier_rationale:
  en: |
    The Taghazout village wave — small reef point directly in front
    of the village (named after the resin-trade nickname of the area,
    not coffee). Softer than Anchor or Killers; works on smaller swell
    when both upper points are too small or too crowded. Reef bottom
    but with sand channels on either side. Most surf schools in the
    village use this point for intermediate lessons.

