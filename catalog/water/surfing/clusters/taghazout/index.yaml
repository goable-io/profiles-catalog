description:
  en: |
    Taghazout (Atlantic Morocco, 20 km N of Agadir) is North Africa's
    flagship surf destination — a 4 km stretch of right-hand point
    breaks fed by long-period North Atlantic groundswell, surfable
    October-April. The Atlas mountains shelter the coast from W winds
    most mornings (E offshore is the standard window). Three flagship
    points: Anchor Point (the long classic right), Killers (heaviest
    of the cluster), Hash Point (the village wave, softer). Warmer
    water than Portuguese / French Atlantic — typically 17-21°C, full
    3/2 mm winter or summer trunks.

