gates:
  - metric: wave_height_m
    condition: gt
    value: 8
    reason_code: EXTREME_POINT_SURF
    description: Above 8m, Taghazout's reef points produce closeout sections beyond paddle-in capability.

  - metric: wind_speed_kn
    condition: gt
    value: 32
    reason_code: ATLAS_RAIN_FRONT
    description: Strong onshore wind, usually associated with the rare Atlas-mountain front passage, destroys the points' shape.

  - metric: visibility_km
    condition: lt
    value: 1
    reason_code: LOW_VISIBILITY
    description: Visibility below 1 km — Saharan-dust Calima or Atlantic fog — is unsafe.

sustainability:
  carbon_neutral: true
  equipment_dependency: low
  typical_season_weeks: 32
  carrying_capacity_sensitivity: high
  notes: |
    Taghazout has scaled from a fishing village to Morocco's primary
    surf-tourism cluster in the 2010s-2020s (estimated 150k surf
    visitors/year). Local kingdom-led "Taghazout Bay" development
    introduces resort capacity that the surf community is mixed about.
    Reef-bottom points are sensitive to surfer density on big swells.

