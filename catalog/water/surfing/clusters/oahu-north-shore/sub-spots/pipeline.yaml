description:
  en: |
    The sport's reference for heavy tube riding. Pipeline activates
    on solid N/NW swell + light S/SE morning offshore. Hosts the WSL
    Pipe Pro and the historic Pipeline Masters. The single most-
    photographed wave on the planet.

