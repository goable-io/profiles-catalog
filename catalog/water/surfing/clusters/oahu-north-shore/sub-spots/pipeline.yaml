tier_rationale:
  en: |
    The heaviest tube ride in surfing, breaking over a shallow lava reef
    100 m off the beach at Ehukai. First Reef breaks at 1.5-3 m, Second
    Reef at 3-5 m, Third Reef at 5+ m. Reef bottom with exposed lava
    rock spikes — the recorded fatality count is the highest of any
    surf spot. Local lineup is governed by the Wolfpak, with strict
    priority hierarchy. Mandatory: tow-in qualification, full lifeguard
    coverage, helmet for most visitors. Reserved for elite tube
    specialists.

