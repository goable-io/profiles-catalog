description:
  en: |
    The right-hand sister to Pipeline. OTW (and the immediately-
    adjacent Backdoor) activates on the same swell window as Pipe
    but rewards the right approach. Sub-2 m days have made photo
    history (Slater 1995 free-surf footage).

