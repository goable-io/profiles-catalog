tier_rationale:
  en: |
    Right-hand reef break immediately west of Pipeline — the two
    breaks share a parking lot and a take-off zone on the right
    swell direction. Same shallow lava reef as Pipeline, comparable
    heaviness but with a slightly steeper-and-shorter wave geometry.
    Lineup is similarly hierarchical to Pipeline (Wolfpak priority).
    Mid-tide window narrower than Pipeline. Reserved for elite tube
    specialists.

