tier_rationale:
  en: |
    The original big-wave paddle venue — Waimea Bay only activates
    when the rest of the North Shore is closed-out, i.e. wave height
    6-10 m. Reef bottom, long paddle from the beach, "the Bay" only
    works on the right N/NNW direction (other directions close out
    the inside section). Eddie Aikau Big Wave Invitational venue
    (held only when the bay reaches 6 m / 20 ft Hawaiian — happens
    a few times per decade). Reserved for the global big-wave
    paddle elite.

