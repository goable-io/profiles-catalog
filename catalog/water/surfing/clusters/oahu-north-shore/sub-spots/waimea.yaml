    The Eddie. Waimea Bay is the historic home of paddle-in big-wave
    surfing. The Eddie Aikau Big Wave Invitational only holds when
    the bay reaches the legendary 6 m / 20 ft Hawaiian threshold,
    which happens irregularly across multi-decade timescales.

