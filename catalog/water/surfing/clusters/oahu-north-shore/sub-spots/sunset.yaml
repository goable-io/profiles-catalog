tier_rationale:
  en: |
    Outer reef point break — the most "open ocean" of the four
    sub-spots. Three reefs (West, Inside, Boneyards) at increasing
    distance from shore activate on increasing swell size. Sunset
    is the historical big-wave training venue for the North Shore
    (Eddie Aikau Bay Project pre-cursor). Long paddle out (300+ m)
    means most surfers commit to a single peak per session.

display_name:
  en: Surfing — Sunset Beach
  it: Surf — Sunset Beach
  es: Surf — Sunset Beach
  fr: Surf — Sunset Beach
  de: Surfen — Sunset Beach

description:
  en: |
    The big-wave training venue of the North Shore. Sunset operates
    smoothly at 2-5 m and becomes serious paddle territory at 5-8 m.
    Hosts the Vans World Cup of Surfing and various big-wave QS
    events.

