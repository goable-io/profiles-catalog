  notes: |
    Cluster aggregates the 4 most iconic North Shore breaks within
    4 km of each other. Region tag: pacific. Sweet-spot wave height
    pulled higher (2-3.5m) than surfing-pacific parent (2m) reflecting
    North Shore's bigger operational baseline. Upper gate raised to 10m
    (paddle ceiling at Waimea / Outer Reefs).
