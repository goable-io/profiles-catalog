gates:
  - metric: wave_height_m
    condition: gt
    value: 10
    reason_code: WAIMEA_LIMIT
    description: Above 10m the cluster shifts to tow-in only; Waimea closes out, Pipeline becomes Outer Reefs.

  - metric: wind_speed_kn
    condition: gt
    value: 35
    reason_code: HIGH_TRADE_OUTFLOW
    description: Trade-wind blowout above 35 knots destroys wave shape across the cluster.

  - metric: visibility_km
    condition: lt
    value: 1
    reason_code: LOW_VISIBILITY
    description: Visibility below 1 km — squall-driven — is unsafe.

sustainability:
  carbon_neutral: true
  equipment_dependency: low
  typical_season_weeks: 18
  carrying_capacity_sensitivity: high
  notes: |
    North Shore winter season operates under formal Hawaii Water
    Safety + lifeguard coverage that is the global benchmark for
    big-wave-spot risk management. Pipeline lineup is locally
    self-governed by the Wolfpak and the elder lineup hierarchy.
    Visitor crowd management at Sunset + Waimea is via county-
    enforced parking and access cap.

