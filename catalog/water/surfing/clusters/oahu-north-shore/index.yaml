  fr: Surf — Côte Nord d'Oahu
  de: Surfen — Oahu Nordküste
description:
  en: |
    The 11 km Oahu North Shore is the modern home of high-performance
    surfing — the WSL Championship Tour winter finale (Pipe Pro, Vans
    Triple Crown) and the global stage for tube riding, big-wave
    paddle, and the world's strongest competitive lineup. Pipeline +
    Off-the-Wall (the heaviest tubes in surfing), Sunset Beach (the
    classic outer reef big-wave point), Waimea Bay (the original
    big-wave paddle venue, ~6-10 m operational range). North-Pacific
    November-February swell window delivers 2-8 m sets daily for
    months. Warm water 24-26°C — trunks for everything except sub-3 m
    days in February.

