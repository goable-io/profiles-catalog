description:
  en: |
    Trestles (San Onofre State Beach, San Clemente, California) is
    the WSL CT Finals venue — the venue that crowns the world
    champion. Three high-performance cobblestone reef breaks within
    a 1.5 km stretch — Lower Trestles, Upper Trestles, and Cottons
    (named after the rail-bridge trestle that gave the area its
    name). South-Pacific summer swell window (May-October) +
    backup North-Pacific winter swell. Cold California Current water
    (15-21°C) — full 3/2 mm year-round.

