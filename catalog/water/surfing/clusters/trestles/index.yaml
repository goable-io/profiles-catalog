gates:
  - metric: wave_height_m
    condition: gt
    value: 5
    reason_code: HEAVY_CLOSEOUT
    description: Above 5m the Trestles cobblestone reefs close out; advanced surfers move to outer-reef Cottons or further north.

  - metric: wind_speed_kn
    condition: gt
    value: 30
    reason_code: SANTA_ANA_OR_ONSHORE
    description: Strong wind — onshore SW or strong offshore Santa Ana — destroys wave shape and creates safety issues.

  - metric: visibility_km
    condition: lt
    value: 1
    reason_code: COASTAL_FOG
    description: Visibility below 1 km — common in SoCal summer marine layer — is unsafe.

sustainability:
  carbon_neutral: true
  equipment_dependency: low
  typical_season_weeks: 42
  carrying_capacity_sensitivity: high
  notes: |
    Trestles sits inside San Onofre State Beach + the Camp Pendleton
    USMC base — access is via a 1 km trail walk from the parking
    area, which acts as a natural crowd-management mechanism. WSL CT
    Finals week saturates the parking lot. The Save Trestles
    campaign (2008-onwards) was a flagship coastal-protection win
    against a proposed toll road.

