tier_rationale:
  en: |
    The WSL CT Finals venue. Cobblestone reef bottom, A-frame peak
    with rideable both ways but better right. Mid-tide is the
    operational window. Crowd density at CT Finals week is the
    highest of any California break. Outside of event weeks, the
    1 km trail walk-in keeps casual surfers manageable. Cobblestone
    bottom is forgiving compared to lava or coral reef.

