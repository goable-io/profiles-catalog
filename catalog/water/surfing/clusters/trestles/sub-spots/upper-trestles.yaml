tier_rationale:
  en: |
    Reef break north of Lower Trestles (the two are connected by a
    short walk along the cobble beach). Predominantly a right-hand
    point that breaks across a longer wall than Lowers. Cobble
    bottom, mid-tide window, less crowded than Lowers because most
    visitors stop at the first lineup.

