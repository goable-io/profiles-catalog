description:
  en: |
    Peniche (Estremadura, Portugal) sits on a peninsula that creates
    Portugal's most consistent beach-break setups: Supertubos on the
    south face delivers heavy, hollow tubes when NW swell hits, while
    Praia do Norte on the north face works on smaller swell with
    cleaner mid-morning offshore. Hosts the MEO Rip Curl Pro Portugal
    WSL CT event annually. The peninsula geometry produces a wave on
    one side or the other regardless of swell direction — a key
    factor in its consistency rating.

