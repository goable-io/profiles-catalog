sustainability:
  carbon_neutral: true
  equipment_dependency: medium
  typical_season_weeks: 38
  carrying_capacity_sensitivity: high
  notes: |
    Peniche is Portugal's surfing-tourism volume hub — surf schools,
    rental, and accommodation cluster in town. CT-event week (October)
    saturates the bay; year-round shoulder weeks remain busy. Local
    federation manages a designated competition zone at Supertubos
    that is community-respected.

