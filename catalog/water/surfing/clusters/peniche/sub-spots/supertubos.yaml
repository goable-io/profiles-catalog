  de: Surfen — Supertubos (Peniche)

description:
  en: |
    The barrel spot of Portugal. Supertubos works on N-NW swell with
    SE-E offshore (morning offshore is the typical operational
    window). Host venue of the MEO Rip Curl Pro Portugal CT event.
    Wave is short but extremely hollow — a classic beach-break tube
    by global standards.

