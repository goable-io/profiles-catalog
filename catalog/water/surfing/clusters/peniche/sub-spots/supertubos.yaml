tier_rationale:
  en: |
    Heavy beach-break on the south face of the Peniche peninsula. Sand
    bottom but very hollow and powerful — Portugal's premier tube ride.
    Take-off zone shifts with swell direction and the sandbar of the
    season. Strong rip currents to the north and south of the peak,
    used by experienced surfers as channel paddles. No reef bottom
    but the wave's energy + occasional shallow inside section makes
    this a hospital-day spot for under-prepared visitors.

