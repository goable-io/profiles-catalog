tier_rationale:
  en: |
    North-face Peniche beach (the local "Praia do Norte" — not to be
    confused with the famous big-wave beach at Nazaré, ~60 km north).
    Sand bottom, softer wave than Supertubos, works on smaller W-NW
    swell when Supertubos is too small. Cleaner mid-morning
    offshore from the peninsula. Lifeguarded in summer. The intermediate
    learning side of the cluster — most local surf schools operate here.

display_name:
  en: Surfing — Praia do Norte (Peniche)
  it: Surf — Praia do Norte (Peniche)
  es: Surf — Praia do Norte (Peniche)
  fr: Surf — Praia do Norte (Peniche)
  de: Surfen — Praia do Norte (Peniche)

description:
  en: |
    The intermediate face of the Peniche peninsula. Faces north so it
    catches swell when Supertubos is flat, and is shaded from S/SW
    fronts in the summer. Best for intermediate surfers and surf-
    school sessions.

