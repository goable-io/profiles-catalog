tier_rationale:
  en: |
    Right-hand reef-and-point break at the West Cliff Drive
    lighthouse in Santa Cruz. Cobblestone reef bottom, urban
    coastline, the bay's most-watched wave — the lighthouse cliff
    is a 200 m vantage with hundreds of spectators on big days.
    Wave height 1.2-3 m typical, 4-5 m possible on storm-Pacific
    swell. Strong cold-water current, full hood-and-boots 4/3 mm
    year-round. Multiple reef sub-peaks (Middle Peak, The Slot, the
    Point) each with their own lineup priority.

