tier_rationale:
  en: |
    Long right-hand point break system 5 km east of Steamer Lane —
    multiple connected peaks (First Peak, Middle Peak, Sewer Peak,
    36th Avenue) along 600 m of urban cliff. Cobble + reef bottom,
    softer wave than Steamer Lane, the Santa Cruz longboard /
    intermediate hub. Crowded but spread across 4-5 peaks. Same
    cold-water California Current — 4/3 mm year-round.

