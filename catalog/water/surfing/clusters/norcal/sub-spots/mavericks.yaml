description:
  en: |
    The Eddie of the mainland. Mavericks activates a handful of times
    per winter on the right N/NW swell + period combination. Hosts
    the Titans of Mavericks big-wave event when conditions align.
    Cold-water North-Pacific paddle big-wave at the operational
    limit of human capability.

