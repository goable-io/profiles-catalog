tier_rationale:
  en: |
    The North American paddle big-wave reference. Mavericks breaks
    over an outer reef ~1 km offshore from Pillar Point at Half Moon
    Bay, activating only when wave height reaches 6+ m / 20+ ft
    Hawaiian. Reef bottom (mixed shale + boulders), water 10-13°C,
    long paddle out (~1 km from shore), exposed to open North
    Pacific with no shelter geometry. Tow-in qualifying — multiple
    recorded fatalities of elite big-wave specialists. Reserved
    exclusively for the small global big-wave paddle / tow community
    on the right swell.

