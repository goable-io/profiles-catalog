gates:
  - metric: wave_height_m
    condition: gt
    value: 10
    reason_code: MAVERICKS_PADDLE_LIMIT
    description: Above 10m the cluster shifts to tow-in only at Mavericks; Steamer Lane and Pleasure Point close out.

  - metric: wind_speed_kn
    condition: gt
    value: 30
    reason_code: HIGH_WIND
    description: Onshore wind above 30 knots destroys wave shape.

  - metric: visibility_km
    condition: lt
    value: 1
    reason_code: COASTAL_FOG
    description: Visibility below 1 km — common in NorCal summer marine layer — is unsafe.

  - metric: water_temperature_c
    condition: lt
    value: 6
    reason_code: COLD_WATER_HYPOTHERMIA
    description: Water below 6°C (rare but possible during cold-front upwelling spikes) requires hooded 6/5 mm beyond standard NorCal stock.

sustainability:
  carbon_neutral: true
  equipment_dependency: medium
  typical_season_weeks: 30
  carrying_capacity_sensitivity: medium
  notes: |
    Mavericks Beach Park (Pillar Point) is San Mateo County managed
    with strict winter parking caps when the surf is on. Steamer
    Lane is West Cliff Drive (Santa Cruz) with public lighthouse
    parking. The Mavericks Surf Foundation has formalised the local
    paddle-in big-wave community since 1999.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "Mavericks Surf Foundation operational documentation"
    - "Surfing Santa Cruz spot inventory (Steamer Lane + Pleasure Point)"
    - "NOAA NWS San Francisco / Monterey marine forecast methodology"
  notes: |
    Cluster aggregates Mavericks (Half Moon Bay, paddle big-wave),
    Steamer Lane (Santa Cruz, WSL QS), Pleasure Point (Santa Cruz,
    local longboard hub). The three are 50-100 km apart but share
    the cold-Pacific upwelling regime + North-Pacific winter swell
    window. Water-temp curve and gates are cluster-overridden to
    reflect the colder NorCal water vs the surfing-pacific parent.
