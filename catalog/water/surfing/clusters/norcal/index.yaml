display_name:
  en: Surfing — Northern California
  it: Surf — California del Nord
  es: Surf — California del Norte
  fr: Surf — Californie du Nord
  de: Surfen — Nordkalifornien
description:
  en: |
    Northern California (Half Moon Bay to Santa Cruz) is the
    cold-water reef-break belt of the US Pacific — Mavericks (the
    paddle big-wave reference), Steamer Lane (the WSL QS venue),
    Pleasure Point (the local longboard hub). Cold California
    Current upwelling keeps water 9-15°C year-round; 5/4 mm with
    hood and boots is the year-round wetsuit. North-Pacific
    November-March swell window delivers the heaviest paddles;
    the cluster activates on storm-Pacific groundswell that often
    closes-out the SoCal coast.

