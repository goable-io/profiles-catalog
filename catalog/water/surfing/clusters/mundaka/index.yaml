display_name:
  en: Surfing — Mundaka (Basque Country)
  it: Surf — Mundaka (Paesi Baschi)
  es: Surf — Mundaka (País Vasco)
  fr: Surf — Mundaka (Pays Basque)
  de: Surfen — Mundaka (Baskenland)
description:
  en: |
    Mundaka (Bizkaia, Basque Country) was Europe's first World Surfing
    Reserve and hosts one of the most celebrated waves in the world:
    a left-hand river-mouth sandbar that produces 300+ m rideable
    barrels on the right Cantabrian swell. The cluster also includes
    Bakio (20 km west, beach break) as the intermediate option when
    Mundaka is closed-out or too fickle. Cantabrian Bay-of-Biscay
    Atlantic regime: long-period N/NW groundswell September-April,
    cold water (12-18°C), full wetsuit year-round.

