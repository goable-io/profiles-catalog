    - "Federación Vasca de Surf (FVS) Mundaka spot documentation"
    - "González-Pérez et al. 2014, Mundaka rivermouth sediment dynamics"
  notes: |
    Cluster aggregates the iconic Mundaka left + Bakio (20 km W) as
    the intermediate alternative. Region tag: bay-of-biscay
    (Cantabrian sub-basin, distinct climatology from broader NE
    Atlantic). Long-period swell weighted higher (0.25) than the
    Atlantic parent (0.20) because Mundaka's wave only works on
    long-period N/NW swell.
