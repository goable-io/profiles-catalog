gates:
  - metric: wave_height_m
    condition: gt
    value: 7
    reason_code: EXTREME_RIVERMOUTH
    description: Mundaka closes out above 6 m; sustained 7+ m sets push the venue past safe paddle operations.

  - metric: wind_speed_kn
    condition: gt
    value: 30
    reason_code: HIGH_WIND
    description: Strong onshore wind destroys the wave's left-tube shape.

  - metric: visibility_km
    condition: lt
    value: 1
    reason_code: LOW_VISIBILITY
    description: Visibility below 1 km is unsafe.

sustainability:
  carbon_neutral: true
  equipment_dependency: medium
  typical_season_weeks: 32
  carrying_capacity_sensitivity: high
  notes: |
    Mundaka WSR governance is managed by the Mundaka Surf Club +
    Save the Waves under Bizkaia provincial oversight. The river-mouth
    sandbar is a Natura 2000 estuarine habitat — dredging is
    prohibited because it would change the wave's geometry, and the
    surf community is the primary protective constituency for the
    sandbar.

