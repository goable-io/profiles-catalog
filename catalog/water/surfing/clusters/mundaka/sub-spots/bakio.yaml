tier_rationale:
  en: |
    Long sand beach 20 km west of Mundaka, the standard intermediate
    alternative when Mundaka is closed-out, too small, or too
    crowded. Beach-break peaks shift with the sandbar of the season.
    Sand bottom, paddle channels at high tide, several active surf
    schools using the bay. Cantabrian cold water — full 4/3 mm
    year-round.

