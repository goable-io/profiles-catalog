  notes: |
    Sub-spot of surfing-spot-mundaka cluster. Tier 3: very heavy
    long-wall, fast take-off, strong currents, hostile lineup. Sand
    bottom slightly reduces consequence vs reef-bottom spots, but the
    wave's energy makes it advanced-only.
