tier_rationale:
  en: |
    Left-hand river-mouth sandbar wave at the entrance to the Urdaibai
    estuary. Sand bottom but very fast and very hollow — Mundaka is
    on a short list of breaks that can deliver 300+ m rideable
    barrels. Strong outgoing-tide current at the take-off zone (the
    wave only works on outgoing tide), local lineup priority strictly
    enforced, peak crowds during the few annual swells that pulse
    the bar properly. Recorded fatality history makes this a hard
    intermediate-not-yet spot for visitors. Best September-March.

