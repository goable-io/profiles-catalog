  fr: Surf — Mundaka (la gauche)
  de: Surfen — Mundaka (die Linke)

description:
  en: |
    One of the most photographed surf waves in the world. Mundaka left
    is the European reference for hollow long-walls. Crowds peak when
    a properly-aligned long-period N swell hits with offshore SE wind
    on outgoing tide — those alignments happen 10-25 days per season.

