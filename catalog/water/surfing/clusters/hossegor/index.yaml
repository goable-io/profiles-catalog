description:
  en: |
    Hossegor (Landes coast, SW France) is Europe's heaviest beach-break
    consortium — three world-class banks within 4 km of each other, fed
    by the deep Capbreton submarine canyon that focuses N Atlantic
    groundswell. Host venue of the Quiksilver Pro France WSL CT event
    (autumn slot in the CT calendar). La Gravière is the canyon-fed
    centrepiece; La Nord (Seignosse) catches cleaner mid-tide;
    La Sud (Capbreton) is the more forgiving option south of the canyon.
    Peak swell September-November.

