gates:
  - metric: wave_height_m
    condition: gt
    value: 7
    reason_code: HEAVY_BEACH_CLOSEOUT
    description: Above 7m the Hossegor beach breaks close out; even La Gravière is unsurfable above this size.

  - metric: wind_speed_kn
    condition: gt
    value: 30
    reason_code: HIGH_WIND
    description: Onshore wind above 30 knots — common in autumn fronts — destroys beach-break shape.

  - metric: visibility_km
    condition: lt
    value: 1
    reason_code: LOW_VISIBILITY
    description: Visibility below 1 km is unsafe.

sustainability:
  carbon_neutral: true
  equipment_dependency: medium
  typical_season_weeks: 32
  carrying_capacity_sensitivity: high
  notes: |
    Hossegor + Seignosse + Capbreton form Europe's largest dedicated
    surf-tourism cluster (estimated 800k surf-related visitor-days/year
    per Landes département). CT-event week saturates the bay; the
    Capbreton submarine canyon is a Natura 2000 marine habitat under
    France's Parc Naturel Marin governance.

