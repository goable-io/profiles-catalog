  fr: Surf — La Nord (Seignosse)
  de: Surfen — La Nord (Seignosse)

description:
  en: |
    The intermediate-friendly Hossegor option. La Nord works the same
    swell as La Gravière but produces longer, cleaner walls suited to
    progression rather than barrel-only riding. Most surf-school
    sessions in the cluster happen here.

