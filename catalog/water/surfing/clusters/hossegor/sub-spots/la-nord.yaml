tier_rationale:
  en: |
    Seignosse north end of the Hossegor stretch. Cleaner wave than
    La Gravière at the same swell because it sits past the immediate
    canyon focus zone — longer walls, less hollow, more rideable for
    intermediates. Sand bottom, paddle channels at high tide, multiple
    surf schools operate here. Crowd density is high in summer (the
    town's bathing beach) but the surf lineup spreads along 1+ km of
    beach.

