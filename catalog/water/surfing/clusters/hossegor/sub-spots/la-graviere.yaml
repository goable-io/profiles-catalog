tier_rationale:
  en: |
    The centrepiece of the Hossegor cluster — sits directly over the
    head of the Capbreton submarine canyon, which focuses N Atlantic
    swell into one of the heaviest beach-break tubes on the planet.
    Sand bottom but very fast, very hollow, with a shifting take-off
    that demands knowledge of the day's bank. Snaps boards regularly;
    snapped a CT competitor's board on the first wave of a heat in
    2018 (notable as a venue feature, not an anomaly).

