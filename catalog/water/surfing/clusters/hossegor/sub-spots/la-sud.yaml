tier_rationale:
  en: |
    Capbreton south end of the Hossegor stretch. Sits south of the
    canyon focus zone — receives a softer, smaller version of the
    same swell that lights up La Gravière. Often the only rideable
    Hossegor spot in mid-summer when the canyon over-focuses small
    fetches. Sand bottom, beach-break peaks shift with the season,
    several active surf schools.

display_name:
  en: Surfing — La Sud (Capbreton)
  it: Surf — La Sud (Capbreton)
  es: Surf — La Sud (Capbreton)
  fr: Surf — La Sud (Capbreton)
  de: Surfen — La Sud (Capbreton)

description:
  en: |
    The smallest-and-cleanest side of the cluster. La Sud is the
    school-and-summer alternative when La Gravière is firing too
    heavy or too closed-out. Capbreton's longshore drift creates
    seasonal sandbars that shift the peak.

