  es: Surf — Nazaré Praia da Vila
  fr: Surf — Nazaré Praia da Vila
  de: Surfen — Nazaré Praia da Vila

description:
  en: |
    Where most Nazaré recreational and learning surf happens. Town beach
    feel, multiple surf schools, and crucially-different physics: the
    breakwater of the fishing port truncates the canyon's wave
    amplification, so even on big-Praia-do-Norte days this beach stays
    rideable for intermediates. Crowded in summer; uncrowded but cold
    in winter.

