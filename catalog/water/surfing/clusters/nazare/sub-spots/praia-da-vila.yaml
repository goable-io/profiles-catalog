tier_rationale:
  en: |
    The "town beach" south of Nazaré harbour, sheltered from the full
    canyon amplification by the headland and breakwater. Wave height
    typically 0.5-2 m even when Praia do Norte is overhead, making this
    the intermediate-friendly counterpart in the cluster. Lifeguards
    operate during the May-October bathing season; rescue presence is
    limited in winter. Sand bottom, no rocks.

