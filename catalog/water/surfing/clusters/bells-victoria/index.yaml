description:
  en: |
    Bells Beach (Torquay, Victoria, Australia) is the home of the
    Rip Curl Pro Bells Beach — the longest-running surfing event
    in the world (since 1962). Cold-water Southern-Ocean reef
    break fed by huge SW swells. Bells (the headland point)
    and Winkipop (the long right reef immediately south) are the
    two flagship breaks; the broader cluster also includes Jan Juc
    + Rincon, both walk-in distance. Water 13-18°C — full 4/3 mm
    spring suit, 5/4 in winter.

