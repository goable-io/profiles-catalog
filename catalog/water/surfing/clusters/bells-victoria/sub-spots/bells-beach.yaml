tier_rationale:
  en: |
    The famous "Bells Bowl" right-hand reef break — long-walling
    right that handles big SW swell better than almost any spot
    in Australia. Rock-and-reef bottom with a paddle channel on
    the inside (the "Rincon" channel). Wave height routinely 2-4 m
    during the autumn / winter SW swell window; 6 m+ on rare
    deep-low days. The WSL event historically runs in 2-4 m surf
    over the Easter window. Crowd-density at event time is extreme;
    locals enforce strict priority year-round.

