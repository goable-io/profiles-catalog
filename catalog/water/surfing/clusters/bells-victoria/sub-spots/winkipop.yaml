tier_rationale:
  en: |
    Right-hand reef break immediately south of Bells (the two breaks
    share a parking lot). Faster, hollower, more sectiony than Bells
    — many Australian pros consider Winkipop the superior wave of
    the pair. Same reef bottom, same cold water, similar swell
    window but more critical take-off. Crowded but less so than Bells
    (the Bells Bowl is the iconic spot).

