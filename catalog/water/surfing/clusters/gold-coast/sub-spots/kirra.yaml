tier_rationale:
  en: |
    Middle section of the Superbank, 1.5 km west of Snapper. Hollower
    and faster than Snapper — produces the cluster's most iconic
    barrels (the cyclone-swell Kirra rights are surfing's photographic
    benchmark for sand-bottom tubes). Same engineered-sandbar bottom
    as the rest of the Superbank, with rockier sections on the inside.
    Less crowded than Snapper because the take-off zone is smaller
    and locals self-select.

