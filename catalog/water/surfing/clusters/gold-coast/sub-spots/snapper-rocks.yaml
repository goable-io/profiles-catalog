tier_rationale:
  en: |
    The northern entry to the Superbank — a sand-and-rock point at
    the Queensland / NSW border. Sand bottom (engineered daily by
    the Tweed Sand Bypass), reef-rock on the inside, side-shore
    SE trade. The take-off is the most-watched 50 m of water in
    surfing — lineup density at the WSL event regularly exceeds
    100 surfers competing for the same wave. Errors here typically
    cost gear (board hits another surfer) rather than personal injury,
    but in-water collision is the dominant practical hazard.

