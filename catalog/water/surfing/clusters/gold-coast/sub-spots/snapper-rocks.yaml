description:
  en: |
    Gold Coast's flagship point break. Hosts the WSL Quiksilver Pro
    season opener annually. The wave-of-the-day from Snapper can
    connect through Greenmount + Rainbow Bay + Kirra for 1.5 km
    of rideable wall.

