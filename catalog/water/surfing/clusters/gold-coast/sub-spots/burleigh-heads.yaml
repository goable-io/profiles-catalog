description:
  en: |
    A separate point break from the Superbank, with its own swell
    window and crowd dynamic. Burleigh is the GC's classic
    longboard-and-mid-length venue (the wave's medium-to-long-wall
    geometry favours those styles). Hosts the Burleigh Boardriders
    Pro stops.

