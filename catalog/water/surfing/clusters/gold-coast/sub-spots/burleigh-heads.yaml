tier_rationale:
  en: |
    Burleigh Heads point — a separate point break 12 km north of the
    Superbank, in front of Burleigh Heads National Park. Rocky reef
    bottom on the take-off, sand-and-rock through the wall. Less
    crowded than Snapper / Kirra (locals are protective but not
    aggressive), and works on a slightly different swell window
    (E rather than SE).

