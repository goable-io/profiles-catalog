description:
  en: |
    The Gold Coast (Queensland, Australia) hosts the world's most
    famous right-hand point-break sequence — the Superbank from
    Snapper Rocks through Greenmount, Coolangatta, Rainbow Bay,
    Kirra, sometimes producing 1.5 km rideable walls. Hosts the
    Quiksilver Pro Gold Coast (WSL CT season opener). Burleigh
    Heads, 12 km north, is the classic stand-alone point. SE/E
    swell window, summer cyclone season (December-April) delivers
    the biggest swells; consistent SW/S autumn-winter trade.

