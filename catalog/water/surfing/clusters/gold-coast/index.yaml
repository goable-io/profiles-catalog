gates:
  - metric: wave_height_m
    condition: gt
    value: 7
    reason_code: HEAVY_POINT_CLOSEOUT
    description: Above 7m the Gold Coast points close out; cyclone-swell big days move the lineup to D-Bah or up to Lennox.

  - metric: wind_speed_kn
    condition: gt
    value: 35
    reason_code: HIGH_WIND
    description: Sustained onshore wind above 35 knots destroys point-break shape; cyclone-passage outflow events drive most.

  - metric: visibility_km
    condition: lt
    value: 1
    reason_code: LOW_VISIBILITY
    description: Visibility below 1 km is unsafe.

sustainability:
  carbon_neutral: true
  equipment_dependency: low
  typical_season_weeks: 44
  carrying_capacity_sensitivity: high
  notes: |
    The Gold Coast is one of the most heavily-surfed coasts on Earth —
    Snapper Rocks lineup density at the WSL event is internationally
    documented. Gold Coast City Council manages the Superbank as a
    formal "sand-bypass" engineering project (sand pumped daily from
    the Tweed River mouth to maintain the bank's geometry), giving
    the wave its global consistency.

