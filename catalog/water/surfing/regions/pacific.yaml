display_name:
  en: Surfing — Pacific
  it: Surf — Pacifico
  es: Surf — Pacífico
  fr: Surf — Pacifique
  de: Surfen — Pazifik
description:
  en: |
    Pacific-basin surfing is the global benchmark — Hawaii's North Shore is
    the modern home of high-performance surfing and the WSL Championship
    Tour winter finale; the Australian east coast (Gold Coast, Bells)
    delivers the southern-hemisphere CT stops; California's reef and point
    breaks (Trestles, Mavericks, NorCal) round out the seasonal calendar.
    Long-period North Pacific groundswell (12-22s typical, 8-14 m possible
    at Waimea / Mavericks) sets the volume reference; trade-wind off-shore
    delivery is the consistency reference. Water 18-28°C across the
    productive latitudes — no wetsuit needed in summer at most spots
    except NorCal (cold California Current upwelling).

