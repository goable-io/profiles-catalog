gates:
  - metric: wave_height_m
    condition: gt
    value: 10
    reason_code: EXTREME_PACIFIC_SURF
    description: Wave height above 10m is unsafe for recreational surfing; Pacific big-wave spots (Waimea, Mavericks, Jaws) operate via tow-in only.

  - metric: wind_speed_kn
    condition: gt
    value: 35
    reason_code: HIGH_WIND
    description: Strong wind above 35 knots — typically squall or front passage — destroys wave shape and creates dangerous conditions.

  - metric: visibility_km
    condition: lt
    value: 1
    reason_code: LOW_VISIBILITY
    description: Visibility below 1 km is unsafe; Pacific squalls can drop it sharply.

sustainability:
  carbon_neutral: true
  equipment_dependency: medium
  typical_season_weeks: 38
  carrying_capacity_sensitivity: high
  notes: |
    Pacific surf venues include some of the most heavily-trafficked breaks
    on Earth (Pipeline, Snapper Rocks, Lower Trestles). Local crowd-pressure
    management is by community etiquette rather than formal zoning, with
    notable exceptions: Pipeline's lifeguard-enforced winter rotation,
    Bells Beach reserve protected status, Trestles state-park access
    cap. International-flight transport drives the bulk of per-trip
    footprint for most Pacific destinations.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "WSL Championship Tour Pacific-leg venue dossier (Hawaii / Australia / California)"
    - "NOAA North Pacific swell climatology"
    - "Caldwell & Aucan 2007, Hawaiian swell forecasting"
    - "Australian Bureau of Meteorology east-coast surf forecast methodology"
  notes: |
    Regional overrides vs global surfing: wave_height optimal shifted to 2.0m
    (vs 1.2m global, reflecting Pacific groundswell norms); wave_period weight
    raised from 0.15 to 0.22 (long-period North Pacific swell is the
    defining quality factor); upper wave gate raised to 10m (advanced
    pacific big-wave reef breaks routinely surfed at 5-8 m by elite
    paddle-in community); water temp sweet-spot warmer (22°C) reflecting
    Hawaii / Australian / SoCal latitudes. NorCal sub-spots will fall
    below this comfort band — their cluster YAML overrides locally.
