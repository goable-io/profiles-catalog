gates:
  - metric: wave_height_m
    condition: gt
    value: 7
    reason_code: EXTREME_REEF_SURF
    description: Wave height above 7m on Indian-Ocean reef breaks creates closeout sections and severe hold-down risk over shallow coral; Bali big-day spots gate operations here.

  - metric: wind_speed_kn
    condition: gt
    value: 30
    reason_code: SW_MONSOON_ONSHORE
    description: SW monsoon onshore wind above 30 knots — typical wet-season afternoons — destroys wave shape on most Bali / Mentawai reef breaks.

  - metric: visibility_km
    condition: lt
    value: 1
    reason_code: LOW_VISIBILITY
    description: Visibility below 1 km is unsafe; tropical squalls drive most low-vis events.

sustainability:
  carbon_neutral: true
  equipment_dependency: low
  typical_season_weeks: 28
  carrying_capacity_sensitivity: high
  notes: |
    Indian-Ocean surf destinations are highly crowd-sensitive: iconic
    Bali reef breaks (Uluwatu, Padang) routinely see 100+ surfers
    simultaneously in peak season, leading to in-water collision
    documented as a fatality factor. Reef ecosystems are stressed by
    surfer density, sunscreen chemistry, and adjacent tourism
    infrastructure. Long-haul flight is the dominant per-trip carbon
    footprint for most international visitors.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "Surf Resource Sustainability Index (SRSI) Indian Ocean regional analysis"
    - "Surfline Indonesia + Maldives swell-forecast methodology"
    - "Mentawai Islands tourism + community management plans (Padang district)"
    - "Australian Bureau of Meteorology Indian Ocean swell propagation models"
  notes: |
    Regional overrides vs global surfing: wave_height optimal shifted to 1.2m
    (vs 1.2m global — coincidence; reef breaks like clean 1-2 m more than
    big), wave_period weight raised to 0.25 (Southern-Ocean long-period
    groundswell is the defining quality factor); wind weight slightly
    raised to 0.12 (clean SE trade is the season's deliverable, dirty
    SW monsoon is the season's killer); water temp sweet-spot 27°C; upper
    wave gate at 7m (reef-bottom severity).
