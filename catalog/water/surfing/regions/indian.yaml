description:
  en: |
    Indian-Ocean surfing is dominated by Southern Ocean groundswell
    travelling north into the trade-wind belt, producing the world's most
    consistent reef-break setups: Bali (Bukit peninsula and west coast),
    Mentawai Islands (chartered boat-based surf), Maldives (atoll passes),
    Sri Lanka (Arugam Bay). The defining season is the SE trade window
    April-October (Australian and Indian Ocean winter) when reef breaks
    work daily for 6 months straight. Warm tropical water (26-29°C) — no
    wetsuit required. Reef-bottom hazards and tropical-disease exposure
    (staph infections from coral cuts in wet season) are the dominant
    physical risks.

