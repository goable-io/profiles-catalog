region: atlantic
display_name:
  en: Surfing — Atlantic
  it: Surf — Atlantico
  es: Surf — Atlántico
  fr: Surf — Atlantique
  de: Surfen — Atlantik
description:
  en: |
    Atlantic surfing is defined by long-period groundswell (10-16s) generated
    by distant North Atlantic storms. Optimal wave height for recreational
    surfing is 1.2-2.0m; advanced riders regularly surf 2.5-4.0m. The
    Nazaré submarine canyon (5000m deep, 500m from shore) amplifies swell
    to world-record heights. Hossegor, Mundaka, and Peniche host WSL CT
    events due to consistent bank and reef formation. Cold water (12-18°C)
    requires 4/3mm to 5/4mm wetsuit year-round north of Portugal.

