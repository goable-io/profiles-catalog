gates:
  - metric: wave_height_m
    condition: gt
    value: 8
    reason_code: EXTREME_SURF
    description: Wave height above 8m is unsafe for recreational Atlantic surfing.

  - metric: wind_speed_kn
    condition: gt
    value: 30
    reason_code: HIGH_WIND
    description: Strong onshore wind above 30 knots creates disorganised, dangerous conditions.

  - metric: visibility_km
    condition: lt
    value: 1
    reason_code: LOW_VISIBILITY
    description: Visibility below 1 km is unsafe.

sustainability:
  carbon_neutral: true
  equipment_dependency: medium
  typical_season_weeks: 36
  carrying_capacity_sensitivity: medium
  notes: |
    Atlantic surf season is consistent year-round: autumn-winter for large
    swell (1.5-4m), spring-summer for smaller cleaner waves. Cold water
    demands more equipment (thick wetsuit, boots, gloves) increasing material
    footprint. World-class breaks like Nazaré and Mundaka draw international
    crowds that stress local infrastructure; surf tourism is the primary
    economic driver in several Atlantic coastal towns.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "Mach et al. 2021, surf resource scoring framework, J. Coastal Research"
    - "Scarfe et al. 2009, research-based surfing literature review"
    - "Mendes & Cascão 2023, Nazaré wave amplification, Ocean Engineering"
    - "WSL Championship Tour venue scoring criteria 2023"
  notes: |
    Regional overrides vs global surfing: wave_height optimal shifted to 1.8m
    (vs 1.2m global, reflecting Atlantic groundswell norms); wave_period weight
    increased from 0.15 to 0.20 (balanced by wave_height reduction 0.45→0.40)
    to emphasise long-period swell quality; wave gate raised from 6m to 8m for
    advanced Atlantic conditions; water temp curve calibrated for colder Atlantic.
