      - { x: 10, s: 0.40 }

gates:
  - metric: wave_height_m
    condition: gt
    value: 7
    reason_code: OVERSIZED_SHOREBREAK
    description: Shorebreak above 7m generates closeout conditions and impact zones that exceed safe bodyboarding limits.

  - metric: wind_speed_kn
    condition: gt
    value: 35
    reason_code: WIND_DEGRADED_WAVES
    description: Onshore wind above 35 knots destroys wave shape and creates dangerous chop on take-off.

  - metric: water_temperature_c
    condition: lt
    value: 6
    reason_code: HYPOTHERMIA_RISK
    description: Water temperature below 6°C creates rapid hypothermia onset during prone-position sessions even in full neoprene.

  - metric: visibility_km
    condition: lt
    value: 0.3
    reason_code: LOW_VISIBILITY
    description: Visibility below 300m makes spotting other surfers, reef hazards, and rescue craft unsafe.

sustainability:
  carbon_neutral: true
  equipment_dependency: medium
  typical_season_weeks: 28
  carrying_capacity_sensitivity: medium
  notes: |
    Wave-powered with zero direct emissions per session. Bodyboard
    (PE/EPS core), fins, leash, and wetsuit have modest material
    footprint with 5-10 year lifespan. Bodyboard cores are difficult
    to recycle. Carrying capacity sensitivity is medium and shorebreak-
    specific: iconic shorebreaks (Sandy Beach Hawaii, Puerto Escondido,
    Itacoatiara) experience peak-swell overcrowding that creates
    in-water collision risk independent of wave size.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "International Bodyboarding Corporation (IBC) competition condition standards"
    - "Surfing Australia bodyboard discipline safety guidelines"
    - "Surf Life Saving water condition classifications"
  notes: |
    Wave_period is more heavily weighted than for general surfing because
    bodyboarding pockets need both height AND adequate period (12-15s
    optimal) for rotational manoeuvres. Wind tolerance gate is set at 35
    kn vs surfing's typical 40 kn — shorebreak orientation is more
    sensitive to onshore breeze. L1f additions: breaker_type for
    distinguishing barrel/spilling/dumping conditions critical to
    bodyboarding suitability.
