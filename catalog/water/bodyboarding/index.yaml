slug: bodyboarding
spot_kind: base
version: "1.0.0"
category: water
display_name:
  en: Bodyboarding
  it: Bodyboard
  es: Bodyboard
  fr: Bodyboard
  de: Bodyboarden
description:
  en: |
    Wave riding lying prone on a foam board, using swim fins for
    propulsion and direction. Compared to surfing, bodyboarding favours
    steeper, hollower waves (heavy shorebreak, reefbreak) and slightly
    smaller swell sizes since the rider's centre of gravity is lower
    and rotational manoeuvres need more wave pocket than open face. Wind
    sensitivity is similar to surfing but with tighter wave-quality
    weighting — clean conditions matter more than absolute size.

dimensions:
  - name: wave_height
    metric: wave_height_m
    weight: 0.35
    curve:
      - { x: 0.0, s: 0.00 }
      - { x: 0.4, s: 0.30 }
      - { x: 0.8, s: 0.85 }
      - { x: 1.3, s: 1.00 }
      - { x: 2.0, s: 0.90 }
      - { x: 3.0, s: 0.55 }
      - { x: 4.5, s: 0.15 }
      - { x: 6.0, s: 0.00 }

  - name: wave_period
    metric: wave_period_s
    weight: 0.20
    curve:
      - { x: 4,  s: 0.20 }
      - { x: 7,  s: 0.65 }
      - { x: 10, s: 0.95 }
      - { x: 13, s: 1.00 }
      - { x: 18, s: 0.85 }

  - name: wind_speed
    metric: wind_speed_kn
    weight: 0.15
    curve:
