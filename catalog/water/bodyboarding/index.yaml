      - { x: 20, s: 0.30 }
      - { x: 30, s: 0.05 }

  - name: water_temp
    metric: water_temperature_c
    weight: 0.10
    curve:
      - { x: 8,  s: 0.10 }
      - { x: 14, s: 0.50 }
      - { x: 18, s: 0.85 }
      - { x: 22, s: 1.00 }
      - { x: 28, s: 1.00 }

  - name: visibility
