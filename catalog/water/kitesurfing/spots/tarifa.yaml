slug: kitesurfing-spot-tarifa
version: "1.0.0"
category: water
extends: kitesurfing-atlantic
region: atlantic
display_name:
  en: Kitesurfing — Tarifa
  it: Kitesurf — Tarifa
  es: Kitesurf — Tarifa
  fr: Kitesurf — Tarifa
  de: Kitesurfen — Tarifa
description:
  en: |
    Tarifa (Spain) is Europe's premier kite destination and one of the
    world's most consistent kite spots. Located at the confluence of the
    Atlantic and Mediterranean, it channels two dominant winds: Levante
    (easterly, 15-35kn, strongest in summer, offshore from Spain mainland)
    and Poniente (westerly, 10-25kn, cleaner quality). The Strait of
    Gibraltar acts as a venturi, accelerating both to exceptional consistency.
    Flat water in the lagoon at Los Lances; ocean chop and small swell outside.
    Wind blows > 300 days/year. Tidal range 0.6-1.0m (smaller than open
    Atlantic due to strait geometry).

dimensions:
  - name: wind_speed
    metric: wind_speed_kn
    weight: 0.40
    curve:
      - { x: 0,  s: 0.00 }
      - { x: 12, s: 0.25 }
      - { x: 18, s: 0.75 }
      - { x: 24, s: 1.00 }
      - { x: 30, s: 0.90 }
      - { x: 38, s: 0.50 }
      - { x: 48, s: 0.10 }
      - { x: 55, s: 0.00 }
    modifiers:
      gust_factor_penalty:
        threshold: 1.40
        penalty_coefficient: 0.12

  - name: wind_direction
    metric: wind_direction_deg
    weight: 0.20
    modifiers:
      direction_preference:
        - { from: 60,  to: 120, multiplier: 1.0 }
        - { from: 240, to: 300, multiplier: 1.0 }
        - { from: 120, to: 180, multiplier: 0.4 }
        - { from: 180, to: 240, multiplier: 0.3 }
        - { from: 300, to: 360, multiplier: 0.6 }
        - { from: 0,   to: 60,  multiplier: 0.5 }

  - name: wave
    metric: wave_height_m
    weight: 0.15
    curve:
      - { x: 0.0, s: 0.80 }
      - { x: 0.5, s: 1.00 }
      - { x: 1.2, s: 0.90 }
      - { x: 2.0, s: 0.65 }
      - { x: 3.0, s: 0.30 }
      - { x: 4.5, s: 0.05 }
      - { x: 5.5, s: 0.00 }

  - name: visibility
    metric: visibility_km
    weight: 0.10
    curve:
      - { x: 0, s: 0.0 }
      - { x: 1, s: 0.0 }
      - { x: 2, s: 0.6 }
      - { x: 5, s: 1.0 }

  - name: air_temp_comfort
    metric: apparent_temp_c
    weight: 0.10
    curve:
      - { x: -5, s: 0.0 }
      - { x: 5,  s: 0.4 }
      - { x: 15, s: 0.9 }
      - { x: 26, s: 1.0 }
      - { x: 36, s: 0.7 }
      - { x: 42, s: 0.3 }

  - name: water_temp
    metric: water_temperature_c
    weight: 0.05
    curve:
      - { x: 12, s: 0.0 }
      - { x: 16, s: 0.5 }
      - { x: 20, s: 0.9 }
      - { x: 23, s: 1.0 }
      - { x: 26, s: 1.0 }

gates:
  - metric: wind_speed_kn
    condition: gt
    value: 55
    reason_code: GALE_FORCE_WIND
    description: Extreme Levante above 55 knots is unsafe. Tarifa can sustain stronger wind than most spots due to venturi effect.

  - metric: precipitation_mm_h
    condition: gt
    value: 10
    reason_code: HEAVY_RAIN
    description: Heavy rain reduces visibility and indicates front passage; Levante typically stops.

  - metric: visibility_km
    condition: lt
    value: 1
    reason_code: LOW_VISIBILITY
    description: Visibility below 1 km is unsafe.

sustainability:
  carbon_neutral: true
  equipment_dependency: high
  typical_season_weeks: 48
  carrying_capacity_sensitivity: high
  notes: |
    Tarifa operates nearly year-round due to the Strait venturi effect. High
    kite density at Los Lances beach (IKO-recognised school concentration).
    Local carrying capacity is critically managed by the Tarifa municipality
    with designated zones for schools, freestyle, and wave riding. The beach
    is part of Parque Natural del Estrecho; kite density monitoring is
    essential. Peak season (July-August) sees 200+ kites/day on Los Lances.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  review_status: provisional
  reviewed_by: []
  sources:
    - "García-Herrera et al. 2001, Wind climate at the Strait of Gibraltar, J. Applied Meteorology"
    - "Junta de Andalucía wind atlas, Tarifa station long-term climatology 1995-2020"
    - "IKO (International Kiteboarding Organization) venue risk assessment framework"
    - "Parque Natural del Estrecho management plan 2022-2028"
  notes: |
    Spot overrides vs kitesurfing-atlantic: wind curve shifted higher (sweet
    spot 24kn vs 22kn; still 0.9 at 30kn; gate raised to 55kn due to venturi);
    gust threshold relaxed to 1.40 (Levante/Poniente are consistent, not
    frontal — gust patterns are manageable at higher factors); wind direction
    weight increased to 0.20 (direction is critical: Levante E=offshore for
    Spain, Poniente W=offshore for Morocco); Levante (E, 60-120°) and
    Poniente (W, 240-300°) both score 1.0; other directions score poorly.
