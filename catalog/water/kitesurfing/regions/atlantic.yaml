slug: kitesurfing-atlantic
version: "1.0.0"
category: water
extends: kitesurfing
region: atlantic
display_name:
  en: Kitesurfing — Atlantic
  it: Kitesurf — Atlantico
  es: Kitesurf — Atlántico
  fr: Kitesurf — Atlantique
  de: Kitesurfen — Atlantik
description:
  en: |
    Atlantic kitesurfing is driven by synoptic weather systems: persistent
    trade winds and extratropical lows generate 15-28 knot conditions with
    real groundswell (1.0-3.0m, 10-16s period). The Tarifa corridor (Levante/
    Poniente) delivers some of Europe's most reliable kite wind. Gust factors
    are higher than the Mediterranean due to frontal passages (1.3-1.5x).
    Tidal range 2-4m impacts launch windows at many spots. Cold water requires
    5/4mm wetsuit outside July-September.

dimensions:
  - name: wind_speed
    metric: wind_speed_kn
    weight: 0.40
    curve:
      - { x: 0,  s: 0.00 }
      - { x: 10, s: 0.20 }
      - { x: 15, s: 0.65 }
      - { x: 22, s: 1.00 }
      - { x: 28, s: 0.85 }
      - { x: 35, s: 0.40 }
      - { x: 45, s: 0.00 }
    modifiers:
      gust_factor_penalty:
        threshold: 1.35
        penalty_coefficient: 0.18

  - name: wind_direction
    metric: wind_direction_deg
    weight: 0.15
    modifiers:
      direction_preference:
        - { from: 180, to: 270, multiplier: 1.0 }
        - { from: 90,  to: 180, multiplier: 0.7 }
        - { from: 0,   to: 90,  multiplier: 0.3 }

  - name: wave
    metric: wave_height_m
    weight: 0.15
    curve:
      - { x: 0.0, s: 0.50 }
      - { x: 0.5, s: 0.75 }
      - { x: 1.0, s: 1.00 }
      - { x: 2.0, s: 0.90 }
      - { x: 3.5, s: 0.45 }
      - { x: 5.0, s: 0.10 }
      - { x: 6.5, s: 0.00 }

  - name: visibility
    metric: visibility_km
    weight: 0.10
    curve:
      - { x: 0, s: 0.0 }
      - { x: 1, s: 0.0 }
      - { x: 2, s: 0.6 }
      - { x: 5, s: 1.0 }

  - name: air_temp_comfort
    metric: apparent_temp_c
    weight: 0.10
    curve:
      - { x: -5, s: 0.0 }
      - { x: 5,  s: 0.4 }
      - { x: 15, s: 0.9 }
      - { x: 25, s: 1.0 }
      - { x: 35, s: 0.7 }
      - { x: 40, s: 0.3 }

  - name: water_temp
    metric: water_temperature_c
    weight: 0.05
    curve:
      - { x: 5,  s: 0.0 }
      - { x: 12, s: 0.3 }
      - { x: 16, s: 0.7 }
      - { x: 20, s: 1.0 }
      - { x: 26, s: 1.0 }

  - name: sun
    metric: sun_altitude_deg
    weight: 0.05
    curve:
      - { x: 0,  s: 0.0 }
      - { x: 10, s: 0.7 }
      - { x: 30, s: 1.0 }

gates:
  - metric: wind_speed_kn
    condition: gt
    value: 45
    reason_code: GALE_FORCE_WIND
    description: Wind above 45 knots is unsafe for kitesurfing.

  - metric: precipitation_mm_h
    condition: gt
    value: 10
    reason_code: HEAVY_RAIN
    description: Heavy rain reduces visibility and indicates storm conditions.

  - metric: visibility_km
    condition: lt
    value: 1
    reason_code: LOW_VISIBILITY
    description: Visibility below 1 km is unsafe.

sustainability:
  carbon_neutral: true
  equipment_dependency: high
  typical_season_weeks: 24
  carrying_capacity_sensitivity: high
  notes: |
    Atlantic season is concentrated (June-September for warm water; Tarifa
    corridor viable year-round with appropriate wetsuit). Trade wind corridors
    (Canary Islands, Morocco) are experiencing growing pressure from kite
    tourism; carrying capacity sensitivity is high at established spots.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  review_status: provisional
  reviewed_by: []
  sources:
    - "Pereira da Silva et al. 2018, Guincho wind study"
    - "García-Herrera et al. 2001, Tarifa wind climatology, J. Applied Meteorology"
    - "Alves 2006, Observations of swell generated by distant storms, J. Geophys. Res."
  notes: |
    Regional overrides vs global kitesurfing: wind sweet spot unchanged at
    22kn but upper taper extended (28kn still 0.85 vs global's 0.70 at 30kn);
    wave weight increased from 0.10 to 0.15 (balanced against wind reduction
    from 0.45 to 0.40) to reflect Atlantic groundswell importance; gust
    threshold tightened from 1.4 to 1.35 for frontal systems.
