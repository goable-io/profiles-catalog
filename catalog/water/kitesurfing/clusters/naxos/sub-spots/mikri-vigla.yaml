tier_rationale:
  en: |
    Headland separating two bays — Limanaki (north, flatter, shallower)
    and Parthena (south, more wave). Side-on cross Meltemi (N/NNE) blows
    parallel to the headland keeping kiters running along the coast.
    Sand bottom on both bays, with a small rocky outcrop at the headland
    tip itself that is the recurring hazard for downwind drift. Depth
    transitions from ankle to chest at 30-50 m offshore. Two on-beach
    kite schools provide rescue but coverage is thinner than Tarifa or
    Stagnone. Failure mode is a downwind drift onto the rocky outcrop —
    recoverable but consequential.

