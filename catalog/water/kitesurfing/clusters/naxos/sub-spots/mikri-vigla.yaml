description:
  en: |
    The iconic Naxos kite headland. Twin bays let riders pick flat
    (Limanaki) or chop (Parthena) based on wind strength and personal
    preference. The Flisvos and Mikri Vigla Kite-PRO schools operate
    here. Strong-Meltemi specialist destination — gear sizing is
    typically one step smaller than Lo Stagnone for the same forecast.

