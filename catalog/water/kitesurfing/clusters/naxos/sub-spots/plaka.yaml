tier_rationale:
  en: |
    Long sand beach south of Mikri Vigla, the more spread-out and
    less-crowded Naxos kite zone. Side-on Meltemi (cross from the N),
    sand bottom for the full beach length, no significant downwind
    hazards in the kite zone. Lower school density than Mikri Vigla
    means longer rescue-boat response time, but also fewer in-water
    collisions. Beginner-friendly section near the north end; the
    south end gets cleaner Meltemi acceleration as it leaves the
    Mikri Vigla headland.

