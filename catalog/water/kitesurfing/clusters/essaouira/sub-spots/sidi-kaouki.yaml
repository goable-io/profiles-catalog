description:
  en: |
    The freeride/wave-intermediate option in the Essaouira cluster.
    Less crowded than the main bay, more wave content for the
    strapless/surfboard riders. Best for self-organising intermediate
    groups with their own gear and experience. Surf shops in the
    village provide rentals.

