tier_rationale:
  en: |
    Long open beach 25 km south of Essaouira town, exposed to full
    Atlantic swell. Side-on Alizé delivery similar to the main bay but
    with 0.5–1.5 m larger wave content from the un-sheltered geometry.
    Sand bottom for the kite zone, with rocky sections at the southern
    end. Two on-beach kite schools (much lower density than the main
    bay), so rescue response is slower. Wider beach allows more
    spacious launches; downwind drift on shifted Alizé pushes riders
    south toward the rock section — manageable for intermediates with
    awareness.

