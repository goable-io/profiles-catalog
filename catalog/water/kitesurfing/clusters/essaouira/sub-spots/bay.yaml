description:
  en: |
    The school-and-beginner end of the Essaouira cluster. Plage
    d'Essaouira fronts the medina and Mogador peninsula. Reliable Alizé
    delivery June–September. Local kite-school cooperative manages
    beach-zone allocation between kite, windsurf, surf, and bathers.

