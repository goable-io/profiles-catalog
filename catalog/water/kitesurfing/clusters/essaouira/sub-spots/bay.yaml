tier_rationale:
  en: |
    The main Essaouira bay, sheltered from open-Atlantic swell by the
    Mogador peninsula and the offshore Île de Mogador. Side-on Alizé
    (N/NE) blows clean across the bay parallel to shore. Sand bottom,
    chest-deep at 30 m offshore. Wave smaller than the open-coast
    sub-spots (1.2 m typical summer). High kite-school density on
    Plage d'Essaouira — Ocean Vagabond and Explora are the local
    cooperative anchor schools with concurrent rescue-boat coverage.
    Failure mode is a downwind drift toward the harbour entrance.

