tier_rationale:
  en: |
    Wave-specialist village 15 km north of Essaouira. Side-shore Alizé
    blows along a coast with full Atlantic swell exposure, a reef
    section that produces a left-hand point wave, and rocky downwind
    geography. Wave heights regularly 2–3.5 m on classic NW swell days
    combined with N Alizé. The wave kite zone is in the bay between
    the point and the village; downwind drift exits onto rocks. Used
    by experienced wave kiters who know the rocks and the rescue plan.
    No commercial rescue boat in the immediate area — village-based
    operators run wave-day trips with personal-safety briefings.

