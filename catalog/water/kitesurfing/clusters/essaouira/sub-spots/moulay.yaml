description:
  en: |
    The wave end of the Essaouira cluster. Moulay is one of Morocco's
    classic wave-kitesurf destinations alongside Boujdour and Dakhla's
    Foum Labouir. Best September–April for swell, with summer Alizé
    sometimes overpowering the wave shape. Strapless surfboard is the
    dominant local style.

