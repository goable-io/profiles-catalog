display_name:
  en: Kitesurfing — Essaouira
  it: Kitesurf — Essaouira
  es: Kitesurf — Esauira
  fr: Kitesurf — Essaouira
  de: Kitesurfen — Essaouira
description:
  en: |
    Essaouira (Morocco's Atlantic coast) gets the strongest summer-thermal
    NE/N wind in Morocco, locally called "Alizé" — a sea-breeze
    acceleration in the funnel between the Anti-Atlas mountains and the
    Atlantic Ocean. Daily 20-30+ knot afternoons June–September, with
    May and October as good shoulder months. Three sub-zones span 50 km
    of coast: the main town bay (the school zone), Sidi Kaouki to the
    south (more wave, lower density), and Moulay Bouzerktoun to the
    north (the wave-specialist destination).

dimensions:
  - name: wind_speed
    metric: wind_speed_kn
    weight: 0.40
    curve:
      - { x: 0,  s: 0.00 }
      - { x: 10, s: 0.20 }
      - { x: 15, s: 0.65 }
      - { x: 22, s: 1.00 }
      - { x: 30, s: 0.85 }
      - { x: 38, s: 0.40 }
      - { x: 45, s: 0.00 }
    modifiers:
      gust_factor_penalty:
        threshold: 1.35
        penalty_coefficient: 0.18

  - name: wind_direction
    metric: wind_direction_deg
    weight: 0.15
    modifiers:
      direction_preference:
        - { from: 350, to: 360, multiplier: 1.0 }
        - { from: 0,   to: 50,  multiplier: 1.0 }
        - { from: 50,  to: 120, multiplier: 0.6 }
        - { from: 250, to: 350, multiplier: 0.6 }
        - { from: 120, to: 250, multiplier: 0.3 }

  - name: wave
    metric: wave_height_m
    weight: 0.15
    curve:
      - { x: 0.0, s: 0.50 }
      - { x: 0.5, s: 0.80 }
      - { x: 1.2, s: 1.00 }
      - { x: 2.0, s: 0.85 }
      - { x: 3.0, s: 0.50 }
      - { x: 4.5, s: 0.15 }
      - { x: 6.0, s: 0.00 }

  - name: visibility
    metric: visibility_km
    weight: 0.10
    curve:
      - { x: 0, s: 0.0 }
      - { x: 1, s: 0.0 }
      - { x: 2, s: 0.6 }
      - { x: 5, s: 1.0 }

  - name: air_temp_comfort
    metric: apparent_temp_c
    weight: 0.10
    curve:
      - { x: -5, s: 0.0 }
      - { x: 5,  s: 0.4 }
      - { x: 15, s: 0.9 }
      - { x: 25, s: 1.0 }
      - { x: 35, s: 0.7 }
      - { x: 40, s: 0.3 }

  - name: water_temp
    metric: water_temperature_c
    weight: 0.05
    curve:
