    curve:
      - { x: 0,  s: 0.0 }
      - { x: 10, s: 0.7 }
      - { x: 30, s: 1.0 }

gates:
  - metric: wind_speed_kn
    condition: gt
    value: 42
    reason_code: STORM_ALIZE
    description: Sustained Alizé above 42 knots forces all Essaouira camps to close — direction is acceptable but pure strength exceeds rig safety margins.

  - metric: precipitation_mm_h
    condition: gt
    value: 8
    reason_code: HEAVY_RAIN
    description: Rare on the central Moroccan coast during summer Alizé; when it occurs it signals Atlantic-front passage.

  - metric: visibility_km
    condition: lt
    value: 1
    reason_code: LOW_VISIBILITY
    description: Visibility below 1 km — usually from Atlantic fog (low cloud) on calm winter mornings — is unsafe.

sustainability:
  carbon_neutral: true
  equipment_dependency: high
  typical_season_weeks: 22
  carrying_capacity_sensitivity: medium
  notes: |
    Essaouira coast is partly within the Réserve Biologique de Souss-Massa
    buffer for migratory shorebirds. Moulay Bouzerktoun is uncrowded
    and depends on small village-side kite-school operations. The main
    bay is mass-tourism dense in summer (Essaouira festival weeks
    overlap with peak Alizé).

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "Direction de la Météorologie Nationale (Morocco) Essaouira wind records"
    - "Fédération Royale Marocaine de Kitesurfing (FRMK) spot documentation"
    - "Morocco Atlantic coast Alizé climatology (Stefanidis et al. 2019)"
  notes: |
    Cluster aggregates main Essaouira bay, Sidi Kaouki (25 km S), and
    Moulay Bouzerktoun (15 km N) — all sharing the Alizé thermal-funnel
    summer regime.
