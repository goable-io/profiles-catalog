tier_rationale:
  en: |
    Headland at the northwest end of the Valdevaqueros bay. The shore
    transitions from sand into rock and seaweed-covered reef in the
    final 100 m of the point. When combined with Atlantic groundswell
    (Poniente weeks), wave height can exceed 2.5 m, and kiters are
    pushed onto rock if a kite fails downwind. No on-beach rescue
    services at the point itself — the nearest help is the kite-school
    fleet at Valdevaqueros, several minutes upwind. Reserved for advanced
    riders comfortable in waves with hazardous downwind features.

