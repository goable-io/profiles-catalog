description:
  en: |
    The wave-riding end of the Tarifa cluster, working best on Poniente
    with Atlantic groundswell. Punta Paloma is the only Tarifa sub-spot
    where wave height regularly exceeds 1.5 m; on big Poniente days it
    becomes a strapless/foil destination for the local advanced
    community. The downwind rock section and absence of close rescue
    coverage make it a serious step up in consequence from Balneario or
    Valdevaqueros.

