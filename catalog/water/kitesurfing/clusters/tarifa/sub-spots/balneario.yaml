tier_rationale:
  en: |
    Open beach south of town with deep water from roughly 20 m offshore.
    Sand bottom, no rocks or reef. Side-on Levante (E) and Poniente (W)
    keep kiters parallel to shore, not pushed out. Rescue craft available
    from local kite schools during operating hours. Worst-case consequence
    of a session error: lost gear or a swim back — recoverable.

