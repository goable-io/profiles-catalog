description:
  en: |
    The most popular Tarifa kite spot, on a wide open beach just south of
    the old town. Wind is side-on for both Levante (E) and Poniente (W),
    keeping kiters running parallel to the coast in both regimes. Deep
    water requires a swim back if the kite is lost, mitigated by IKO
    school rescue services during the day. The sandy bottom and absence
    of submerged hazards mark this as the beginner-and-intermediate-
    friendly Tarifa option.

