tier_rationale:
  en: |
    Wide open beach 20 km northwest of Tarifa, on the Atlantic side of
    the Sierra de la Plata. Wind is cleaner than Valdevaqueros (less
    rotor from the sierra) but Atlantic swell reaches the beach more
    directly, with regular 1-2 m wave heights. Sand bottom along the
    full beach length, no rocks. Far fewer kite schools (so less rescue
    coverage), but also far fewer kites in the water — collision risk is
    low. Errors are still recoverable for a competent intermediate but
    the swim back is longer and colder than at Los Lances.

display_name:
  en: Kitesurfing — Bolonia
  it: Kitesurf — Bolonia
  es: Kitesurf — Bolonia
  fr: Kitesurf — Bolonia
  de: Kitesurfen — Bolonia

description:
  en: |
    The escape valve for the Tarifa peak season. Lower kite density,
    cleaner wind, more wave, and the famous Roman ruins of Baelo Claudia
    on the shore. Better for intermediate riders who want space and
    moderate wave than for first-week students. Onshore Levante here is
    less gusty than at Valdevaqueros because Bolonia sits past the
    sierra-lee zone.

