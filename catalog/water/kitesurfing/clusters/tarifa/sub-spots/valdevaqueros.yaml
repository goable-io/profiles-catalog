tier_rationale:
  en: |
    Long open beach 10 km northwest of Tarifa town, the busiest kite
    launch in southern Spain. Levante is more onshore here than at
    Balneario (gusts can be stronger in the lee of the Sierra de la
    Plata), making body-drag returns harder if a kite is lost downwind.
    Sand bottom and rescue craft from on-beach schools keep this
    moderate-risk, but the higher kite density (peak 300+ kites
    simultaneously in summer) raises in-water collision probability.

