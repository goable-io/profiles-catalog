description:
  en: |
    The iconic Tarifa kite beach — the one in every photo. Long, wide,
    consistent Levante delivery, but kite density during July-August
    peak weekends is the highest of any European spot and the dominant
    "Tarifa Valdevaqueros" risk factor is other kiters, not the wind or
    water. Better space and cleaner Levante in shoulder season
    (May, September, October).

