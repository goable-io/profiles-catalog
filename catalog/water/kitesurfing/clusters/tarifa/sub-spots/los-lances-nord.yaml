tier_rationale:
  en: |
    Northern end of Playa de los Lances, the broad sandy bay between
    Tarifa town and Punta Paloma. Knee- to waist-deep shallow water
    extends 80-150 m offshore — body-draggable distance with no risk of
    being pushed beyond rescue range. Side-on Levante orientation keeps
    kiters parallel to shore. Highest concentration of kite schools in
    the area, so multiple rescue boats operate concurrently. Errors here
    typically result in a wet walk back, not loss of equipment.

