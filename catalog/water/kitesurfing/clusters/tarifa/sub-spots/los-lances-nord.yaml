  de: Kitesurfen — Tarifa Los Lances Nord

description:
  en: |
    Beginner-friendly end of Los Lances beach. The long shallow shelf is
    the main reason Tarifa works as a beginner destination at all — most
    kite schools use this zone for first lessons and body-drag practice.
    Less crowded than Balneario at peak (schools spread along the long
    beach), and the shallow water tolerates a much wider margin of error.

