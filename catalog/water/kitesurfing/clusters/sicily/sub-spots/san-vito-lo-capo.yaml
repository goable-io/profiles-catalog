tier_rationale:
  en: |
    Open Tyrrhenian bay on the NW Sicilian headland, exposed to Maestrale
    (NW) and Libeccio (SW) thermals. Sand bottom for the full bay; depth
    transitions from ankle to chest at ~40 m offshore. Beach-launched
    with on-shore Maestrale dominant in the summer thermal window — the
    Monte Monaco massif behind the village funnels wind cleanly. Less
    school density than Lo Stagnone (fewer schools, fewer rescue boats),
    so consequence of a kite failure is a longer swim. Sirocco days
    bring 1–1.5 m wave for advanced wave riders.

