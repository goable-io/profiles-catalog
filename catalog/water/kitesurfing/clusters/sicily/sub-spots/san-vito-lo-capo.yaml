description:
  en: |
    The wave/freeride counterpart to Lo Stagnone within the Sicily
    cluster. Lower crowd density and bigger water than the lagoon, with
    the famous white-sand crescent beach and the Zingaro nature reserve
    immediately east. Best May–September. Compatible with the cluster's
    Tyrrhenian thermal regime; not a beginner destination.

