description:
  en: |
    The Mediterranean's flagship kite-school destination. Lo Stagnone
    overtook Le Morne and Punta Trettu in instructor-training volume
    during the 2020s. Best May–October with peak reliability July–August.
    Highly crowded in peak; book the smaller schools or come October for
    space. Lagoon ringed by Marsala saltpans, windmills, and the ruins
    of Phoenician Mozia.

