tier_rationale:
  en: |
    Europe's largest kitesurf lagoon: 2,000 hectares of knee-to-waist deep
    water (0.5–1.5 m) between Marsala and the four Egadi-direction salt
    islands (Mozia, San Pantaleo, Santa Maria, La Schola). Sandy
    flat-stable bottom with eel-grass patches. Side-on thermal Maestrale
    (NW) blows clean across the lagoon June–September with daily 14–22
    kn afternoons. ≥15 IKO-registered kite schools operate from the
    Birgi shore providing continuous rescue boat coverage. Failure mode
    is a wet walk back through ankle-deep salt-pan water.

