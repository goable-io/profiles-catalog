tier_rationale:
  en: |
    Quieter sister spot 5 km south of Bloubergstrand, slightly cleaner
    SE Cape Doctor as the wind clears the Bloubergstrand peninsula's
    minor lee. Sand bottom, similar swell exposure and water-temperature
    profile to Bloubergstrand. Lower school density — better for
    advanced riders who want space and cleaner wind, slightly higher
    consequence on rescue response.

