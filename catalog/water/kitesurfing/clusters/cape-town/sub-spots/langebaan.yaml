tier_rationale:
  en: |
    16 km-long tidal lagoon 120 km north of Cape Town inside the West
    Coast National Park. Side-on Cape Doctor SE blows clean down the
    lagoon's main axis. Shallow (knee-to-waist for the kite zones,
    deepening at the north end), sand-and-shell bottom, no rocks, no
    open-ocean swell. Cape Sport Center and other operators provide
    school coverage at the lagoon entry. Water temperature 15–20°C —
    warmer than the Cape Town Atlantic shore by 3–5°C because the
    lagoon is shallow and partially isolated from upwelling. Failure
    mode is a wet walk to the nearest shore segment.

