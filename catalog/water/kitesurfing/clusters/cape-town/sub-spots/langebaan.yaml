  de: Kitesurfen — Langebaan-Lagune

description:
  en: |
    The flatwater complement to the Cape Town wave coast. Langebaan is
    a destination in its own right — many international kite holidays
    base here for the November–March season. Inside the West Coast
    National Park, so beach access is regulated and motor-vehicle
    intrusion is limited.

