tier_rationale:
  en: |
    Iconic Cape Town kite venue — Big Bay / Bloubergstrand on Table Bay
    with full Table Mountain backdrop. Side-on Cape Doctor (SE) blows
    the full bay parallel to shore. Sand bottom, deep water from 30 m
    offshore, full Atlantic swell exposure (1.5–3 m typical summer).
    Multiple on-beach kite schools provide rescue boats. Cold water
    (12–17°C) is the recurring physical hazard — failures-with-gear-loss
    become hypothermia risk in 30–60 min in 4/3 mm wetsuit, faster in
    cold-front conditions.

