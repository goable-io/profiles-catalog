tier_rationale:
  en: |
    Jericoacoara village bay — the iconic Brazilian kite postcard with
    the Pedra Furada arch and the Pôr do Sol dune backdrop. Side-on
    E/SE alísio blows the bay parallel to shore. Sand bottom for the
    full bay, gradual deepening. Wave 0.5–1.2 m typical with occasional
    larger days. Multiple kite-camps operate from the village shore;
    rescue coverage is dense within the bay but the village's remote
    location adds friction for off-bay incidents.

