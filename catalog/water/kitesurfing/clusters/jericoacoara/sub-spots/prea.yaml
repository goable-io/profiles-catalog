  es: Kitesurf — Preá (Jericoacoara)
  fr: Kitesurf — Preá (Jericoacoara)
  de: Kitesurfen — Preá (Jericoacoara)

description:
  en: |
    Sister spot to Jericoacoara village, less crowded with slightly
    lighter trade. The standard starting point for the iconic Preá–Jeri
    downwinder (a 15 km point-to-point shore-parallel run). Camps offer
    organized downwinders with buggy support. Best for intermediate
    cruising and downwinder progression.

