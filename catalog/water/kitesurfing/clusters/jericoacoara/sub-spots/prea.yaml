tier_rationale:
  en: |
    15 km east of Jeri (downwind on the dominant alísio), Preá is the
    extended-bay zone often used as the start of the long downwind run
    back to Jericoacoara village. Cleaner trade than the village
    funnel (~2 kn lighter on average), sand bottom, smaller wave. Lower
    school density than the village bay; most kite-camps offer Preá as
    the day-trip alternative. Failure mode is a downwind drift toward
    Jericoacoara — operators run buggy retrievals.

