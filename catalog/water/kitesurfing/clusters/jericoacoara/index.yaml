gates:
  - metric: wind_speed_kn
    condition: gt
    value: 45
    reason_code: STORM_FORCE_TRADE
    description: Sustained trade above 45 kn at Jericoacoara — rare even in peak — gates operations.

  - metric: precipitation_mm_h
    condition: gt
    value: 12
    reason_code: WET_SEASON_RAIN
    description: NE Brazil wet season (Feb–May) interrupts the kite season.

  - metric: visibility_km
    condition: lt
    value: 1
    reason_code: LOW_VISIBILITY
    description: Visibility below 1 km, rare on the Ceará trade coast, is unsafe.

sustainability:
  carbon_neutral: true
  equipment_dependency: high
  typical_season_weeks: 32
  carrying_capacity_sensitivity: high
  notes: |
    Jericoacoara is inside the Parque Nacional de Jericoacoara — vehicle
    access is restricted, kite use is concentrated in designated zones,
    and concurrent kite-count caps are enforced at peak. Access is via
    4x4 from Jijoca de Jericoacoara; the carbon footprint includes both
    international flight to Fortaleza + the off-road shuttle.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "ICMBio Parque Nacional de Jericoacoara management plan"
    - "CBKite Jericoacoara spot documentation"
    - "INMET northern-Ceará wind frequency records"
  notes: |
    Cluster aggregates Jeri main bay and Preá 15 km east. Trade
    sweet-spot shifted slightly stronger (23 kn vs Cumbuco's 22) to
    reflect the village-bay funnel acceleration.
