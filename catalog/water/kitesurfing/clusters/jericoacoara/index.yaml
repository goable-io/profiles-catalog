      - { x: 10, s: 0.25 }
      - { x: 15, s: 0.70 }
      - { x: 23, s: 1.00 }
      - { x: 30, s: 0.85 }
      - { x: 38, s: 0.40 }
      - { x: 45, s: 0.00 }
