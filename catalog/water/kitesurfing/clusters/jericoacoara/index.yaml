display_name:
  en: Kitesurfing — Jericoacoara (Ceará)
  it: Kitesurf — Jericoacoara (Ceará)
  es: Kitesurf — Jericoacoara (Ceará)
  fr: Kitesurf — Jericoacoara (Ceará)
  de: Kitesurfen — Jericoacoara (Ceará)
description:
  en: |
    Jericoacoara (national park, NE Brazil, ~300 km NW of Fortaleza)
    sits inside a coastal dune-and-lagoon system, accessed only via 4x4
    track or boat. Same Ceará trade-wind regime as Cumbuco but with
    stronger acceleration in the village bay and even more reliability
    (310+ wind days per year). Two sub-spots: the main Jeri bay
    (village frontage) and Preá 15 km east (the freestyle-and-downwind
    starting venue).

