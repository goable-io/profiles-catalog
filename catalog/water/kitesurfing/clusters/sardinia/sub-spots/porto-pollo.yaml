description:
  en: |
    Northern Sardinia's flagship wind venue, regularly hosting PWA and
    IKA event stops. Best on Mistral (NW) when the strait acceleration
    delivers 20–30 kn for hours; lighter Levante and Scirocco days too.
    Eastern bay (La Sciumara) is the windsurf zone, western Porto Liscia
    is the kite zone — separated by Isola dei Gabbiani to prevent
    in-water traffic conflicts.

