tier_rationale:
  en: |
    Twin bays separated by the sand isthmus of Isola dei Gabbiani in the
    Bocche di Bonifacio strait between Sardinia and Corsica. The western
    bay (Porto Liscia) is the kitesurf zone and is open to the strong
    Mistral funnelling through the strait — wind regularly exceeds 25 kn
    and gust factor in afternoon thermal-peak can reach 1.4. Sand bottom,
    open deep water past 50 m offshore. School presence and rescue
    coverage from the on-beach centers. Failure mode is a downwind drift
    into the channel; recoverable for prepared intermediates but a
    consequential swim for beginners.

