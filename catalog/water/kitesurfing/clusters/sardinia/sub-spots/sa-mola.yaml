description:
  en: |
    The wave end of Sardinian kitesurfing. Sa Mola is the kite-friendly
    section of the broader Capo Mannu / Putzu Idu surf-and-wave zone.
    Works April–November on consistent Maestrale Atlantic shifts.
    Reserved for advanced wave kiters; not a learning venue.

