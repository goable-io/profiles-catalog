tier_rationale:
  en: |
    Exposed point break on the west coast of Sardinia between Capo Mannu
    and Su Pallosu, with the Atlantic-shifted Maestrale pushing direct
    overhead swell onto a rocky-and-reef bottom in the inner section.
    Wave height routinely reaches 2–3 m on classic Maestrale days, with
    period 7–10 s — beyond the parent profile's standard kite wave
    tolerance. Wind is side-offshore in dominant Maestrale, meaning a
    failed kite or rope-loss puts the rider drifting downwind into the
    open Mar di Sardegna with no immediate rescue infrastructure. Used
    by experienced wave kiters who know the rocks and the rescue plan.

