tier_rationale:
  en: |
    South-coast beach kitesurfing at the long sandy Spiaggia di Su Giudeu
    and adjacent Cala Cipolla. Onshore-component Maestrale (NW funnelled
    south of the Sulcis hills) plus Scirocco (SE) give bidirectional
    side-on options across the year. Sand bottom, shallow water for the
    first 30 m, then a steady deepening — failures are recoverable as a
    swim back if the rider doesn't lose the kite to the breaking wave
    line. Lifeguards in summer; sparse rescue in shoulder season. Wave
    heights 0.5–1.5 m typical, occasionally 2 m+ on Scirocco storms.

