description:
  en: |
    The south-Sardinia counterpart to Porto Pollo: open beach with two
    wind regimes (Maestrale NW funnelled south, Scirocco SE). Less
    crowded than the north, popular with intermediates and freestyle.
    Best March–November with peak reliability May–September.

