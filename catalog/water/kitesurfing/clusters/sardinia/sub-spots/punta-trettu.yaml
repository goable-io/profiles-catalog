description:
  en: |
    Europe's poster lagoon for kite learning. Knee-deep flat water,
    consistent thermal Maestrale May–October, school density that makes
    rescue near-instant. Has hosted multiple IKO instructor-training
    weeks. Crowd-managed by the Punta Trettu Kite Center consortium —
    peak July–August weekends can have 200+ kites concurrently across
    the lagoon.

