tier_rationale:
  en: |
    Tidal lagoon in the Saline di San Giovanni Suergiu, sheltered by the
    Sant'Antioco isthmus from the open sea. Water depth is knee- to
    waist-high (0.8–1.4 m) for 200+ m offshore — body-draggable distance
    with zero deep-water exposure. Sand-and-silt bottom, no rocks, no
    reef. Side-on Maestrale (NW) and Mistral channelled through the
    isthmus give predictable 14–22 kn afternoon thermals. Multiple
    on-beach kite schools provide concurrent rescue boats. Failure mode
    is a wet walk back to shore.

