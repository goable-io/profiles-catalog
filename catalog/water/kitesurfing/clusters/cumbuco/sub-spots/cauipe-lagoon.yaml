description:
  en: |
    Brazil's flagship freestyle-and-foil flatwater venue. Hosts King of
    the Air freestyle qualifier rounds and various Brazilian national
    events. Lagoon size makes overcrowding rare even at peak. Camps
    shuttle riders from Cumbuco village (15-20 min by buggy).

