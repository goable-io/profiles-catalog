tier_rationale:
  en: |
    Freshwater coastal lagoon 8 km west of Cumbuco, formed where the
    Rio Cauipe meets the dunes. Depth knee-to-waist (0.5–1.2 m) for
    most of the lagoon, sand bottom, no rocks. Side-on E trade clears
    the dunes and blows down the lagoon's long axis. Daily kite-camp
    shuttle drops riders for half-day sessions; rescue is by buggy from
    the dune access. Butter-flat — preferred freestyle and foil
    training venue.

