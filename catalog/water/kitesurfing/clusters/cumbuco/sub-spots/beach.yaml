tier_rationale:
  en: |
    Open Atlantic beach in front of Cumbuco village, the main kite-zone
    for the Brazilian alísio trade. Side-on E/SE wind blows the full
    beach parallel to shore. Sand bottom, gradual deepening (knee-to-
    chest at 50 m offshore). Wave 0.5–1.5 m typical, occasionally larger
    on enhanced trade events. Multiple kite-camp operators provide
    rescue coverage; the bay is large enough that overcrowding is rare.
    Failure mode is a downwind drift along the coast — recoverable.

