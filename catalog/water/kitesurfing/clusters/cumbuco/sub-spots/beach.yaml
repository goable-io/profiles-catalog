  fr: Kitesurf — Plage de Cumbuco
  de: Kitesurfen — Cumbuco Beach

description:
  en: |
    The original Brazilian kitesurf destination beach. Trade-wind
    delivery is the most consistent in the Atlantic basin. Kite-camp
    density is high but bay is long enough to spread out. Best
    August–November for peak trade strength.

