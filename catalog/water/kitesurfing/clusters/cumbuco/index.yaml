slug: kitesurfing-spot-cumbuco
spot_kind: cluster
version: "1.0.0"
category: water
extends: kitesurfing-atlantic
region: atlantic
sub_spots:
  - kitesurfing-spot-cumbuco-beach
  - kitesurfing-spot-cumbuco-cauipe-lagoon
display_name:
  en: Kitesurfing — Cumbuco (Ceará)
  it: Kitesurf — Cumbuco (Ceará)
  es: Kitesurf — Cumbuco (Ceará)
  fr: Kitesurf — Cumbuco (Ceará)
  de: Kitesurfen — Cumbuco (Ceará)
description:
  en: |
    Cumbuco (Ceará, NE Brazil, ~30 km west of Fortaleza) gets the most
    reliable trade-wind kite season in South America: SE/E alísio
    blows 300+ days a year, July–February at 18–28 knots, August–
    November at peak strength. Two sub-zones: the open Atlantic beach
    in front of Cumbuco village (the main kite zone), and the Lagoa do
    Cauipe — a coastal freshwater lagoon 8 km west that becomes a
    butter-flat dream when the trade blows side-on across it.

dimensions:
  - name: wind_speed
    metric: wind_speed_kn
    weight: 0.40
    curve:
      - { x: 0,  s: 0.00 }
      - { x: 10, s: 0.25 }
      - { x: 15, s: 0.70 }
      - { x: 22, s: 1.00 }
      - { x: 28, s: 0.85 }
      - { x: 35, s: 0.45 }
      - { x: 42, s: 0.00 }
    modifiers:
      gust_factor_penalty:
        threshold: 1.30
        penalty_coefficient: 0.15

  - name: wind_direction
    metric: wind_direction_deg
    weight: 0.15
    modifiers:
      direction_preference:
        - { from: 90,  to: 160, multiplier: 1.0 }
        - { from: 60,  to: 90,  multiplier: 0.7 }
        - { from: 160, to: 220, multiplier: 0.5 }
        - { from: 0,   to: 60,  multiplier: 0.3 }
        - { from: 220, to: 360, multiplier: 0.2 }

  - name: wave
    metric: wave_height_m
    weight: 0.10
    curve:
      - { x: 0.0, s: 0.85 }
      - { x: 0.3, s: 1.00 }
      - { x: 0.8, s: 0.95 }
      - { x: 1.5, s: 0.70 }
      - { x: 2.5, s: 0.30 }
      - { x: 4.0, s: 0.05 }

  - name: visibility
    metric: visibility_km
    weight: 0.10
    curve:
      - { x: 0, s: 0.0 }
      - { x: 1, s: 0.0 }
      - { x: 2, s: 0.6 }
      - { x: 5, s: 1.0 }

  - name: air_temp_comfort
    metric: apparent_temp_c
    weight: 0.10
    curve:
      - { x: 20, s: 0.8 }
      - { x: 26, s: 1.0 }
      - { x: 32, s: 0.9 }
      - { x: 38, s: 0.6 }

  - name: water_temp
    metric: water_temperature_c
    weight: 0.10
    curve:
      - { x: 22, s: 0.6 }
      - { x: 26, s: 1.0 }
      - { x: 29, s: 1.0 }

  - name: sun
    metric: sun_altitude_deg
    weight: 0.05
    curve:
      - { x: 0,  s: 0.0 }
      - { x: 10, s: 0.7 }
      - { x: 30, s: 1.0 }

gates:
  - metric: wind_speed_kn
    condition: gt
    value: 42
    reason_code: STORM_FORCE_TRADE
    description: NE-Brazil trade above 42 knots — uncommon but recorded — gates operations.

  - metric: precipitation_mm_h
    condition: gt
    value: 12
    reason_code: WET_SEASON_RAIN
    description: NE Brazil wet season (February–May) brings tropical-convective rain that interrupts kite windows; the kite season runs around this.

  - metric: visibility_km
    condition: lt
    value: 1
    reason_code: LOW_VISIBILITY
    description: Visibility below 1 km, rare on the Ceará trade-wind coast, is unsafe.

sustainability:
  carbon_neutral: true
  equipment_dependency: high
  typical_season_weeks: 32
  carrying_capacity_sensitivity: high
  notes: |
    Cumbuco bay and the Lagoa do Cauipe are within state-protected
    coastal-and-lagoon conservation areas. Lagoa do Cauipe in particular
    has formal kite-zone allocation; peak season (Aug–Nov) sees 200+
    kites concurrently across the lagoon. International-flight transport
    (Fortaleza FOR) is the dominant per-trip footprint.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "Brazilian Kitesurfing Confederation (CBKite) Ceará spot documentation"
    - "INMET (Brazilian meteorological office) Fortaleza trade-wind records"
    - "Cumbuco kite-school cooperative operational notes"
  notes: |
    Cluster aggregates Cumbuco beach + Lagoa do Cauipe (8 km west of
    the beach), both served by Cumbuco-based kite camps. Trade-wind
    direction-preference shifted SE-easterly to match Ceará coastal
    alísio orientation. region tag `atlantic` covers the equatorial
    Brazilian Atlantic.
