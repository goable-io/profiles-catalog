description:
  en: |
    The destination kite-resort of West Africa. Camps on the lagoon
    shore offer all-inclusive packages with on-site boards/kites.
    Operates March–November with peak July–August (strongest trade,
    hottest air). Lagoon size makes overcrowding rare even at peak.
    Most-camp-density zone is the west shore opposite Dakhla city.

