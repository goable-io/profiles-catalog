tier_rationale:
  en: |
    Main Dakhla lagoon — the world's largest sheltered flat-water kite
    venue, ~40 km long and 10 km wide. Depth knee-to-waist (0.5–1.4 m)
    for the kite zones, sand-and-shell bottom, no rocks or reef. Side-on
    NNE trade blows the full length of the lagoon. Dakhla kite-camp
    consortium (≥15 operators) provides continuous rescue boat
    coverage. The peninsula desert blocks open-ocean swell entirely —
    the lagoon is a glass-flat venue even on 25 kn afternoons. Failure
    mode is a wet walk through ankle-deep tidal-flat water back to the
    camp dock.

