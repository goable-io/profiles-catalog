tier_rationale:
  en: |
    Open-Atlantic wave kitesurfing on the western (ocean) side of the
    Dakhla peninsula — distinct from the lagoon. Side-shore NNE trade
    blows parallel to a long sand-and-occasional-rock beach with full
    Atlantic swell exposure (1.5–4 m typical). Rescue from the
    peninsula side is logistically slow — camps shuttle wave-day groups
    with on-vehicle support but in-water rescue boats don't operate
    here. Reserved for experienced wave kiters; the lagoon is the
    learning venue, this is the destination for the wave specialist.

