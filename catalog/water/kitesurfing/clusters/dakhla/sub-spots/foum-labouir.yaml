description:
  en: |
    The wave end of the Dakhla cluster. Atlantic-facing beach on the
    ocean side of the peninsula, accessed by a 20-30 min camp shuttle
    from the lagoon camps. Best October–April for swell consistency;
    summer reliability is lower but trade still delivers. Strapless
    surfboard-style kiting is the dominant local style.

