tier_rationale:
  en: |
    The famous "Speed Spot" or PK25 — a 1 km tidal flatwater strip on
    the south end of the lagoon that becomes glass-still slick at low
    tide with the trade blowing dead side-shore. Hosts several world
    kite-speed records (over 50 knots GPS). At low tide it functions as
    a tier-1 lagoon; at high tide the strip submerges and becomes
    open-water connecting to the main lagoon. Tier 2 captures the
    high-tide profile: open water, slightly farther from rescue camps
    than the main lagoon zone.

