  de: Kitesurfen — Dakhla Speed Spot (PK25)

description:
  en: |
    The speed-running specialist destination within Dakhla. Optimal on
    the late-afternoon-low-tide window when the slick forms and the
    trade peaks. Used by GPS-speed competitors during the annual record
    weeks. Lower camp density than the main lagoon — most operations
    shuttle riders out from the camps for half-day sessions.

