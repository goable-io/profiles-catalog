  es: Kitesurf — Dajla
  fr: Kitesurf — Dakhla
  de: Kitesurfen — Dakhla
description:
  en: |
    Dakhla (Western Sahara coast) sits inside a 40 km×10 km Atlantic
    lagoon shielded from open-ocean swell by a desert peninsula. The NNE
    trade is the most reliable and strongest in the African Atlantic
    band — 280+ wind days per year averaging 20-25 knots. Three distinct
    sub-zones: the main lagoon (the world's largest flat-water kite
    venue), the famous Speed Spot strip at PK25, and Foum Labouir on the
    open-Atlantic side for advanced wave kiters. Peak season March–November.

