gates:
  - metric: wind_speed_kn
    condition: gt
    value: 45
    reason_code: STORM_FORCE_WIND
    description: Wind above 45 knots — uncommon at Dakhla — is unsafe across all sub-zones.

  - metric: precipitation_mm_h
    condition: gt
    value: 8
    reason_code: HEAVY_RAIN
    description: Heavy rain is extremely rare in the Western Sahara coastal band; when it occurs it indicates a Saharan front passage with associated dust and gusty conditions.

  - metric: visibility_km
    condition: lt
    value: 1
    reason_code: SAHARAN_DUST_LOW_VIS
    description: Visibility below 1 km — usually from Calima (Saharan dust) — is unsafe and routinely closes Dakhla camps for the day.

sustainability:
  carbon_neutral: true
  equipment_dependency: high
  typical_season_weeks: 36
  carrying_capacity_sensitivity: medium
  notes: |
    Dakhla camps are remote desert kite resorts. International flight
    access from Casablanca / Paris drives most of the per-trip carbon
    footprint. Lagoon ecosystem includes a Ramsar-designated wetland
    further south (Cintra Bay); the kite zone proper is outside but
    adjacent to it.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "Dakhla kite-camp consortium operational documentation"
    - "Direction de la Météorologie Nationale (Morocco) Dakhla wind records"
    - "Stefanidis et al. 2019, Atlantic NW African trade-wind climatology"
  notes: |
    Cluster aggregates the lagoon (main flatwater), Speed Spot (the
    famous 1km flatwater strip at PK25), and Foum Labouir (open Atlantic
    wave). All within 30 km of each other on the Dakhla peninsula.
