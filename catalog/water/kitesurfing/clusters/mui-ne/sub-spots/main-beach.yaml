description:
  en: |
    The kite-resort hub of South-East Asia. Mui Ne's modern kite scene
    was built in the 2010s on European wintering kiters seeking
    reliable wind during Mediterranean off-season. Peak January–March.
    Crowded at the main school zone, less so further along the
    resort strip.

