tier_rationale:
  en: |
    The main Mui Ne kite-resort frontage — 3+ km of sand beach along
    the resort strip. Side-onshore NE monsoon blows clean across the
    beach. Sand bottom, gradual deepening, shorebreak 0.3–0.8 m
    typical. School density is the highest in SE Asia kite community.
    Resort-managed beach-zone allocation between kite, swim, and resort
    activities. Failure mode is a downwind drift along the resort
    shore — recoverable, resort kite staff and lifeguards present.

