description:
  en: |
    The escape valve for the Mui Ne kite cluster. Less crowded, cleaner
    wind, slightly fewer schools. Best for intermediate progression
    and freestyle. Often the starting point for Mui Ne → Hòa Thắng
    downwinder runs along the coast.

