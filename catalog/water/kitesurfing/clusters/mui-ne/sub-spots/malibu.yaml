tier_rationale:
  en: |
    Malibu Beach 3 km east of Mui Ne main strip — a lower-density
    alternative for the local kite community. Cleaner NE monsoon (a
    minor headland upwind smooths the airflow), shore-parallel side-on
    direction. Sand bottom. Lower school density than the main beach —
    fewer rescue boats but also lower in-water collision pressure.
    Used by intermediates and downwinder-trip starters.

