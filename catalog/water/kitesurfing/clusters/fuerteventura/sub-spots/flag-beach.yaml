description:
  en: |
    The school-and-beginner end of the Fuerteventura cluster. Northern
    Corralejo dune-park frontage with very high school density. Best
    for first-week riders and intermediate freestyle. Note seasonally:
    summer trade-wind is cleaner here than at Sotavento because the
    Lobos channel funnels and smooths the airflow.

