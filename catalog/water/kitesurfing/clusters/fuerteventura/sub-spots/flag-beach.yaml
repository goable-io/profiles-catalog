tier_rationale:
  en: |
    The Corralejo school-cluster beach, locally known as Flag Beach
    (Playa Bajo Negro / Bajos del Río). Side-on NE trade with cleaner
    wind than the Sotavento section because the Lobos and Lanzarote
    channel creates a quasi-Venturi acceleration. Sand bottom for the
    full 800 m of beach length. Six-plus IKO schools operate from the
    car-park area providing high rescue coverage and concurrent boat
    presence. Wave is smaller than Sotavento (channel-protected) but
    occasional N-swell wraps around Lobos and produces 1 m+ days.

