tier_rationale:
  en: |
    Long 5+ km sand beach on the SE coast at Costa Calma–Jandía. The
    inshore tidal lagoon at low tide is shallow (knee-to-waist) for
    100–200 m, giving an effective lagoon for body-drag and learning
    sessions. At high tide the lagoon submerges and the spot becomes
    open-ocean with chest-deep water from the shore. Side-on NE trade
    delivers 18–28 kn afternoons consistently. Sand bottom, no rocks.
    Multiple on-beach kite schools provide rescue boats. PWA Windsurf
    World Cup venue. Failure-mode profile shifts with the tide — tier 2
    at high tide, closer to tier 1 at low tide.

