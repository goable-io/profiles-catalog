description:
  en: |
    The flagship Fuerteventura wind venue. Hosts the PWA Windsurf World
    Cup most years. NE trade wind reliability across the full
    April-October window plus 70% reliability in winter. Tidal-lagoon
    effect at low tide is unique to the Canaries within Europe.

