description:
  en: |
    The wave end of the Fuerteventura cluster. Big-day specialist's spot
    when N or NW swell hits the island. Best October–March for swell
    consistency; the rest of the year delivers smaller but kiteable
    waves with the same trade-wind reliability. Low school density,
    expert local community.

