tier_rationale:
  en: |
    NW coast wave-specialist destination — Playa del Castillo and the
    surrounding beach-and-reef section. NE trade is side-offshore here
    (blowing from the island toward the open Atlantic), meaning kite
    failures put riders drifting downwind into 1000+ m of open ocean
    with no immediate rescue. Wave is the largest of the three
    Fuerteventura sub-spots, regularly 1.5–3 m on winter swells. Rock
    and reef sections along parts of the coast — the kite zone proper
    is the long sand beach, but downwind drift exits onto cliff-and-reef
    geography. Reserved for advanced wave kiters.

