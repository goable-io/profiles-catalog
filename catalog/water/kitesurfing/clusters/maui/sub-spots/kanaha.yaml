description:
  en: |
    The competition venue for kitesurfing's modern era. Hosts the IKA
    Hydrofoil World Tour stops most years. Strong-trade, big-air
    specialist destination. Local etiquette and the formal county
    kite-zone hours (typically 11:00–17:30) are strict.

