tier_rationale:
  en: |
    Kanaha Beach Park on Maui's north shore east of Kahului airport —
    the historical home of competitive kitesurfing. Side-on NE trade
    blows 18–28 knots most afternoons. Outer reef break ~300 m offshore
    serves as a swell breakwater for the inner kite zone; the inner
    section is chest-deep on sand with occasional reef rocks. Multiple
    kite schools operate from the park, providing concurrent rescue
    coverage. Failure mode is a downwind drift across the reef toward
    Kahului harbour entrance — recoverable for prepared intermediates.

