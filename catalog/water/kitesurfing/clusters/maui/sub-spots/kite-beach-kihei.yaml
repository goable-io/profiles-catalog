tier_rationale:
  en: |
    South-shore Maui kite zone at the end of Sugar Beach in Kihei. The
    NE trade clears the Iao Valley and continues across the Maalaea
    bight, delivering lighter and cleaner wind than Kanaha (typically
    15–22 kn vs Kanaha's 18–28 kn). Side-on, sand bottom, deep water
    from 30 m offshore. Lower swell exposure than the north shore
    (north-shore swell wraps around partially). School coverage is
    moderate. Failure mode is a downwind drift across the bay —
    recoverable.

