description:
  en: |
    The lighter-wind, school-friendly Maui sub-spot. Best for
    intermediate-and-below visitors who find Kanaha's wind strength
    too much. Same NE trade as Kanaha but attenuated by the Iao
    Valley clearance. Local kite community uses it primarily as the
    light-day alternative.

