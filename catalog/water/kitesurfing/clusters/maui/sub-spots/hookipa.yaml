description:
  en: |
    The reef-and-wave end of the Maui cluster. Primary identity is the
    surf and windsurf venue; kite use is the minority practice and
    formally restricted. Only included as a sub-spot because (a) it's
    Maui's iconic kite-able reef break and (b) the spatial resolver
    needs an entry for the Pa'ia coast within the cluster. Visitors
    must not kite here without local guidance.

