tier_rationale:
  en: |
    Hoʻokipa Beach Park — primarily Maui's windsurf/surf shrine, the
    home reef of the Pe'ahi big-wave community for training. Kite use
    is restricted by county regulation to specific late-afternoon hours
    and is strongly discouraged for visiting riders. Reef bottom for the
    full break, no sand entry at the break itself, sharp coral. Wave
    height routinely 2–4 m with up to 6 m on winter NW swells. Used
    only by experienced local kite riders on selected windows when the
    surf is small enough and the wind is clean.

