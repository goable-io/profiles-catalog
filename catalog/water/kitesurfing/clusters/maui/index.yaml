slug: kitesurfing-spot-maui
spot_kind: cluster
version: "1.0.0"
category: water
extends: kitesurfing-pacific
region: pacific
country_code: US
sub_spots:
  - kitesurfing-spot-maui-kanaha
  - kitesurfing-spot-maui-kite-beach-kihei
  - kitesurfing-spot-maui-hookipa
display_name:
  en: Kitesurfing — Maui
  it: Kitesurf — Maui
  es: Kitesurf — Maui
  fr: Kitesurf — Maui
  de: Kitesurfen — Maui
description:
  en: |
    Maui (Hawaiian Islands, North Pacific) is the historical birthplace
    of competitive kitesurfing and remains the most consistent
    high-performance kite venue on Earth: NE trade wind blows 80-90%
    of April–October afternoons at 18–28 knots, channelled and
    accelerated by the Iao Valley between the West Maui mountains and
    Haleakalā. Three sub-zones: Kanaha on the north shore (the
    competition venue), Kite Beach Kihei on the south (lighter trade,
    school-friendly), and Hoʻokipa on the north shore east (the reef
    expert's destination).

dimensions:
  - name: wind_speed
    metric: wind_speed_kn
    weight: 0.40
    curve:
      - { x: 0,  s: 0.00 }
      - { x: 10, s: 0.25 }
      - { x: 15, s: 0.70 }
      - { x: 22, s: 1.00 }
      - { x: 30, s: 0.85 }
      - { x: 38, s: 0.40 }
      - { x: 45, s: 0.00 }
    modifiers:
      gust_factor_penalty:
        threshold: 1.30
        penalty_coefficient: 0.15

  - name: wind_direction
    metric: wind_direction_deg
    weight: 0.15
    modifiers:
      direction_preference:
        - { from: 30,  to: 90,  multiplier: 1.0 }
        - { from: 0,   to: 30,  multiplier: 0.75 }
        - { from: 90,  to: 150, multiplier: 0.65 }
        - { from: 150, to: 360, multiplier: 0.25 }

  - name: wave
    metric: wave_height_m
    weight: 0.15
    curve:
      - { x: 0.0, s: 0.50 }
      - { x: 0.5, s: 0.80 }
      - { x: 1.2, s: 1.00 }
      - { x: 2.5, s: 0.85 }
      - { x: 4.0, s: 0.45 }
      - { x: 5.5, s: 0.10 }
      - { x: 8.0, s: 0.00 }

  - name: visibility
    metric: visibility_km
    weight: 0.10
    curve:
      - { x: 0, s: 0.0 }
      - { x: 1, s: 0.0 }
      - { x: 2, s: 0.6 }
      - { x: 5, s: 1.0 }

  - name: air_temp_comfort
    metric: apparent_temp_c
    weight: 0.10
    curve:
      - { x: 16, s: 0.6 }
      - { x: 22, s: 0.95 }
      - { x: 26, s: 1.0 }
      - { x: 32, s: 0.95 }
      - { x: 38, s: 0.6 }

  - name: water_temp
    metric: water_temperature_c
    weight: 0.05
    curve:
      - { x: 20, s: 0.6 }
      - { x: 23, s: 0.9 }
      - { x: 26, s: 1.0 }
      - { x: 30, s: 1.0 }

  - name: sun
    metric: sun_altitude_deg
    weight: 0.05
    curve:
      - { x: 0,  s: 0.0 }
      - { x: 10, s: 0.7 }
      - { x: 30, s: 1.0 }

gates:
  - metric: wind_speed_kn
    condition: gt
    value: 45
    reason_code: STORM_FORCE_TRADE
    description: Maui NE trade above 45 knots — happens 1–3 days per year on enhanced trade-and-front events — is unsafe across all sub-zones.

  - metric: precipitation_mm_h
    condition: gt
    value: 12
    reason_code: WINDWARD_SQUALL
    description: Hawaiian windward squalls (the iconic afternoon Kanaha rainbow weather) bring rapid wind shifts and lightning risk.

  - metric: visibility_km
    condition: lt
    value: 1
    reason_code: LOW_VISIBILITY
    description: Visibility below 1 km — squall-driven on Maui — is unsafe.

sustainability:
  carbon_neutral: true
  equipment_dependency: high
  typical_season_weeks: 32
  carrying_capacity_sensitivity: high
  notes: |
    Kanaha Beach Park and Ho'okipa Beach Park are county-managed
    public reserves with formal kite-zone hours/areas to protect
    nesting honu (green turtle) sites and reef ecosystem. Kite use
    is regulated and seasonally restricted in posted zones.
    International-flight transport drives the bulk of per-trip
    carbon footprint.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "Maui County Beach Park kite-zone use plan"
    - "NOAA Honolulu Forecast Office trade-wind climatology"
    - "Pacific Whale Foundation seasonal reef-zone advisories"
  notes: |
    Cluster aggregates Kanaha + Kite Beach Kihei + Hoʻokipa, all on
    Maui's NE-trade-exposed coasts but with distinct micro-climates and
    physical risk profiles.
