description:
  en: |
    The Caribbean's flagship kite venue. Hosts the IKA Cabarete Race
    Week and various freestyle events. Crowd density at peak (Jan-Mar)
    is extreme — local etiquette and zone-rotation are essential. Best
    for intermediate and freestyle riders comfortable in high in-water
    density. Beginners typically use La Boca (next sub-spot west).

