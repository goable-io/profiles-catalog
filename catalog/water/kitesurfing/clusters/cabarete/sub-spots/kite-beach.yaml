tier_rationale:
  en: |
    The original Cabarete Kite Beach — 1 km of sand fronting the densest
    kite-school cluster in the Caribbean. Side-on E/NE trade blows clean
    across the bay parallel to shore. Sand bottom, chest-deep at 40 m
    offshore. Reef break ~200 m offshore on the bay-mouth side functions
    as a swell breakwater, keeping the inside chest-deep zone manageable
    even on 1-1.5 m days. School coverage is the highest in the
    Caribbean kite community — concurrent rescue boats at all hours
    of the daily wind window.

