tier_rationale:
  en: |
    Western end of the Cabarete bay where the Rio Yasica meets the sea —
    the local "La Boca" (the mouth). Outflow from the river creates a
    fan of slightly shallower, flatter water at the river mouth proper
    that works as a learning zone. East of the mouth the geometry is
    similar to Kite Beach but with lower kite density (most schools
    operate from Kite Beach proper). Sand bottom. Cleaner E trade
    delivery because the bay's western point of land partially
    shelters the in-water collision pressure from the central Kite
    Beach zone.

