description:
  en: |
    Primary identity is Cabarete's surf reef. Kite use is opportunistic
    on calm-surf days when the trade still blows — typically December
    and shoulder months when groundswell is smaller. Visiting kiters
    should consult local surf-and-kite operators before attempting.

