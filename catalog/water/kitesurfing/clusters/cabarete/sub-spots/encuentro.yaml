tier_rationale:
  en: |
    Reef-break point west of Cabarete town that primarily functions as
    the regional surf venue, occasionally kiteable on selected NE/E
    trade days when surf is sub-2 m. Reef bottom in the lineup area, no
    sand entry near the break — downwind drift puts a kite-with-failure
    onto rocks. No rescue infrastructure at the spot. Used only by the
    advanced local wave-kite community on selected windows.

