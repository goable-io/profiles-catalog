slug: windsurfing-spot-tarifa
version: "1.0.0"
category: water
extends: windsurfing-atlantic
region: atlantic
display_name:
  en: Windsurfing — Tarifa
  it: Windsurf — Tarifa
  es: Windsurf — Tarifa
  fr: Windsurf — Tarifa
  de: Windsurfen — Tarifa
description:
  en: |
    Tarifa (Cádiz, Spain) sits at the southern tip of the Iberian
    peninsula where Atlantic and Mediterranean meet through the Strait
    of Gibraltar. The orographic funnel between the Sierra de la Plata
    and the African Rif accelerates wind to typically 25-40 knots, with
    Levante (easterly, side-onshore at Valdevaqueros and Los Lances) and
    Poniente (westerly, side-offshore) as the two dominant regimes.
    Reliability is the value proposition: 250-300 windy days per year.
    Wave conditions are short-period chop at Los Lances, cleaner swell
    at Punta Paloma when Poniente combines with Atlantic groundswell.

dimensions:
  - name: wind_speed
    metric: wind_speed_kn
    weight: 0.45
    curve:
      - { x: 0,  s: 0.00 }
      - { x: 10, s: 0.30 }
      - { x: 15, s: 0.70 }
      - { x: 22, s: 1.00 }
      - { x: 32, s: 1.00 }
      - { x: 40, s: 0.80 }
      - { x: 48, s: 0.40 }
      - { x: 55, s: 0.00 }
    modifiers:
      gust_factor_penalty:
        threshold: 1.4
        penalty_coefficient: 0.12

  - name: wind_direction
    metric: wind_direction_deg
    weight: 0.15
    modifiers:
      direction_preference:
        - { from: 220, to: 290, multiplier: 1.0 }
        - { from: 70,  to: 130, multiplier: 0.95 }
        - { from: 290, to: 360, multiplier: 0.6 }
        - { from: 0,   to: 70,  multiplier: 0.5 }
        - { from: 130, to: 220, multiplier: 0.3 }

  - name: wave
    metric: wave_height_m
    weight: 0.12
    curve:
      - { x: 0.0, s: 0.65 }
      - { x: 0.5, s: 0.95 }
      - { x: 1.0, s: 1.00 }
      - { x: 2.0, s: 0.85 }
      - { x: 3.5, s: 0.45 }
      - { x: 5.0, s: 0.10 }

  - name: visibility
    metric: visibility_km
    weight: 0.08
    curve:
      - { x: 0, s: 0.0 }
      - { x: 1, s: 0.2 }
      - { x: 2, s: 0.7 }
      - { x: 5, s: 1.0 }

  - name: air_temp_comfort
    metric: apparent_temp_c
    weight: 0.08
    curve:
      - { x: 0,  s: 0.2 }
      - { x: 10, s: 0.6 }
      - { x: 18, s: 0.95 }
      - { x: 26, s: 1.0 }
      - { x: 35, s: 0.6 }

  - name: water_temp
    metric: water_temperature_c
    weight: 0.07
    curve:
      - { x: 12, s: 0.1 }
      - { x: 16, s: 0.5 }
      - { x: 19, s: 0.8 }
      - { x: 22, s: 1.0 }
      - { x: 26, s: 1.0 }

  - name: sun
    metric: sun_altitude_deg
    weight: 0.05
    curve:
      - { x: 0,  s: 0.0 }
      - { x: 10, s: 0.7 }
      - { x: 30, s: 1.0 }

gates:
  - metric: wind_speed_kn
    condition: lt
    value: 10
    reason_code: INSUFFICIENT_WIND_TARIFA
    description: Tarifa's value proposition is high-wind days; below 10 knots most rental and school operations do not run.

  - metric: wind_speed_kn
    condition: gt
    value: 55
    reason_code: STORM_FORCE_LEVANTE
    description: Sustained Levante above 55 knots represents storm-force events; sailing is unsafe and most local schools enforce a wind cap.

  - metric: wave_height_m
    condition: gt
    value: 5
    reason_code: HEAVY_SEAS
    description: Wave height above 5m at the Tarifa beaches makes launch and recovery unsafe even for experienced sailors.

  - metric: visibility_km
    condition: lt
    value: 1
    reason_code: STRAIT_NAVIGATION
    description: Visibility below 1km in the Strait of Gibraltar makes operating near commercial shipping lanes unsafe.

sustainability:
  carbon_neutral: true
  equipment_dependency: high
  typical_season_weeks: 40
  carrying_capacity_sensitivity: high
  notes: |
    Tarifa runs a near year-round season due to Levante reliability,
    drawing peak crowds in July-August when 1500-2500 sails can be on
    the water across Los Lances + Valdevaqueros + Punta Paloma on a
    single afternoon. The beach is part of the Parque Natural del
    Estrecho with protected sand-dune systems behind the launch zones;
    motorised vehicle access to dune zones is now restricted. Strait
    of Gibraltar shipping lane proximity adds operational complexity.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "Pereira & Belo-Pereira 2018, Strait of Gibraltar wind climatology"
    - "AEMET (Spanish meteorological agency) Tarifa station historical record"
    - "Real Federación Española de Vela (RFEV) site documentation"
    - "Parque Natural del Estrecho management plan"
  notes: |
    Spot overrides vs windsurfing-atlantic: wind sweet spot shifted
    higher (22-32 kn vs Atlantic base 18-28) — Tarifa is famous for
    delivering this range reliably; gust factor tolerance slightly
    raised (sailors here are equipped for it); minimum wind gate of
    10 kn (commercial activity does not run below this); upper gate
    extended to 55 kn (regular sailors push higher here than at most
    Atlantic spots). Direction preference: bidirectional (Levante
    220-290 + Poniente 70-130 both score 1.0) reflecting the dual
    wind regime — this is unique to the Strait location.
