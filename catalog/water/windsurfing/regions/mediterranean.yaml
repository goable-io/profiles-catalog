slug: windsurfing-mediterranean
version: "1.0.0"
category: water
extends: windsurfing
region: mediterranean
display_name:
  en: Windsurfing — Mediterranean
  it: Windsurf — Mediterraneo
  es: Windsurf — Mediterráneo
  fr: Planche à voile — Méditerranée
  de: Windsurfen — Mittelmeer
description:
  en: |
    Mediterranean windsurfing relies on thermal and katabatic winds: Maestrale,
    Mistral, Meltemi, Tramontane. Sweet spot is 10-18 knots with very
    consistent gust patterns (factor 1.1-1.25x), making it ideal for slalom
    and freeride. Capo Mannu (Sardinia) and Leucate (France) are world-class
    venues due to their thermal reliability. Short-period waves (4-7s, 0.3-0.8m)
    suit bump-and-jump style. Flat lagoon spots (Tarquinia, Leucate) excel for
    formula/slalom.

dimensions:
  - name: wind_speed
    metric: wind_speed_kn
    weight: 0.45
    curve:
      - { x: 0,  s: 0.00 }
      - { x: 8,  s: 0.20 }
      - { x: 12, s: 0.70 }
      - { x: 16, s: 0.95 }
      - { x: 20, s: 1.00 }
      - { x: 26, s: 0.70 }
      - { x: 34, s: 0.15 }
      - { x: 38, s: 0.00 }
    modifiers:
      gust_factor_penalty:
        threshold: 1.25
        penalty_coefficient: 0.22

  - name: wind_direction
    metric: wind_direction_deg
    weight: 0.15
    modifiers:
      direction_preference:
        - { from: 180, to: 270, multiplier: 1.0 }
        - { from: 90,  to: 180, multiplier: 0.7 }
        - { from: 270, to: 360, multiplier: 0.6 }
        - { from: 0,   to: 90,  multiplier: 0.3 }

  - name: wave
    metric: wave_height_m
    weight: 0.10
    curve:
      - { x: 0.0, s: 0.80 }
      - { x: 0.5, s: 1.00 }
      - { x: 1.0, s: 0.85 }
      - { x: 2.0, s: 0.55 }
      - { x: 3.5, s: 0.10 }
      - { x: 5.0, s: 0.00 }

  - name: visibility
    metric: visibility_km
    weight: 0.10
    curve:
      - { x: 0, s: 0.0 }
      - { x: 1, s: 0.0 }
      - { x: 2, s: 0.6 }
      - { x: 5, s: 1.0 }

  - name: air_temp_comfort
    metric: apparent_temp_c
    weight: 0.10
    curve:
      - { x: -5, s: 0.0 }
      - { x: 5,  s: 0.4 }
      - { x: 18, s: 0.9 }
      - { x: 28, s: 1.0 }
      - { x: 38, s: 0.6 }
      - { x: 42, s: 0.2 }

  - name: water_temp
    metric: water_temperature_c
    weight: 0.05
    curve:
      - { x: 14, s: 0.0 }
      - { x: 18, s: 0.5 }
      - { x: 22, s: 0.9 }
      - { x: 26, s: 1.0 }
      - { x: 30, s: 1.0 }

  - name: sun
    metric: sun_altitude_deg
    weight: 0.05
    curve:
      - { x: 0,  s: 0.0 }
      - { x: 10, s: 0.7 }
      - { x: 30, s: 1.0 }

gates:
  - metric: wind_speed_kn
    condition: gt
    value: 38
    reason_code: GALE_FORCE_WIND
    description: Tramontane/Mistral above 38 knots is unsafe for windsurfing.

  - metric: precipitation_mm_h
    condition: gt
    value: 10
    reason_code: HEAVY_RAIN
    description: Heavy rain reduces visibility and indicates storm conditions.

  - metric: visibility_km
    condition: lt
    value: 1
    reason_code: LOW_VISIBILITY
    description: Visibility below 1 km is unsafe.

sustainability:
  carbon_neutral: true
  equipment_dependency: high
  typical_season_weeks: 30
  carrying_capacity_sensitivity: high
  notes: |
    Mediterranean season peaks May-September. Thermal reliability enables
    efficient trip planning with minimal wasted sessions. Capo Mannu and
    Leucate see high concentration of visitors; beach access and parking
    infrastructure pressure is significant at these world-class locations.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "Papanastasiou et al. 2010, Mediterranean wind climatology"
    - "IWA World Windsurfing Association venue assessment guidelines 2022"
    - "Caldeira et al. 2019, windsurf condition analysis, Algarve coast"
  notes: |
    Regional overrides vs global windsurfing: sweet spot narrowed to 16-20kn
    (thermal peak) vs 18-25kn global; gust threshold tightened from 1.3 to
    1.25 (Med afternoon thermals can be very choppy near shore); upper gate
    lowered from 40kn to 38kn; water/air temp curves adjusted for warmer basin.
