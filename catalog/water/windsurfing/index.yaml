slug: windsurfing
version: "1.0.0"
category: water
display_name:
  en: Windsurfing
  it: Windsurf
  es: Windsurf
  fr: Planche à voile
  de: Windsurfen
description:
  en: |
    Windsurfing requires sustained side-onshore wind of 10-25 knots with
    a strict gust penalty. Moderate wave conditions are acceptable; heavy
    chop or storm swell is disqualifying. Visibility and air comfort
    influence session quality.

dimensions:
  - name: wind_speed
    metric: wind_speed_kn
    weight: 0.45
    curve:
      - { x: 0, s: 0.00 }
      - { x: 8, s: 0.20 }
      - { x: 12, s: 0.70 }
      - { x: 18, s: 1.00 }
      - { x: 25, s: 0.90 }
      - { x: 32, s: 0.40 }
      - { x: 40, s: 0.00 }
    modifiers:
      gust_factor_penalty:
        threshold: 1.3
        penalty_coefficient: 0.20

  - name: wind_direction
    metric: wind_direction_deg
    weight: 0.15
    modifiers:
      direction_preference:
        - { from: 180, to: 270, multiplier: 1.0 }
        - { from: 90, to: 180, multiplier: 0.7 }
        - { from: 270, to: 360, multiplier: 0.6 }
        - { from: 0, to: 90, multiplier: 0.3 }

  - name: wave
    metric: wave_height_m
    weight: 0.10
    curve:
      - { x: 0.0, s: 0.70 }
      - { x: 0.5, s: 1.00 }
      - { x: 1.5, s: 0.90 }
      - { x: 2.5, s: 0.60 }
      - { x: 4.0, s: 0.20 }
      - { x: 6.0, s: 0.00 }

  - name: visibility
    metric: visibility_km
    weight: 0.10
    curve:
      - { x: 0, s: 0.0 }
      - { x: 1, s: 0.0 }
      - { x: 2, s: 0.6 }
      - { x: 5, s: 1.0 }

  - name: air_temp_comfort
    metric: apparent_temp_c
    weight: 0.10
    curve:
      - { x: -5, s: 0.0 }
      - { x: 5, s: 0.4 }
      - { x: 15, s: 0.9 }
      - { x: 25, s: 1.0 }
      - { x: 35, s: 0.7 }
      - { x: 40, s: 0.3 }

  - name: water_temp
    metric: water_temperature_c
    weight: 0.05
    curve:
      - { x: 5, s: 0.0 }
      - { x: 12, s: 0.3 }
      - { x: 18, s: 0.8 }
      - { x: 22, s: 1.0 }
      - { x: 30, s: 1.0 }

  - name: sun
    metric: sun_altitude_deg
    weight: 0.05
    curve:
      - { x: 0, s: 0.0 }
      - { x: 10, s: 0.7 }
      - { x: 30, s: 1.0 }

gates:
  - metric: wind_speed_kn
    condition: gt
    value: 40
    reason_code: GALE_FORCE_WIND
    description: Wind above 40 knots is unsafe for windsurfing.

  - metric: precipitation_mm_h
    condition: gt
    value: 10
    reason_code: HEAVY_RAIN
    description: Heavy rain reduces visibility and indicates storm conditions.

  - metric: visibility_km
    condition: lt
    value: 1
    reason_code: LOW_VISIBILITY
    description: Visibility below 1 km is unsafe.

sustainability:
  carbon_neutral: true
  equipment_dependency: high
  typical_season_weeks: 28
  carrying_capacity_sensitivity: high
  notes: |
    Wind-powered activity with zero direct emissions per session.
    Equipment footprint is high (mast, boom, sail, board, harness, wetsuit)
    but amortised over 8-12 year lifespan. Launch areas require dedicated
    access zones similar to kitesurfing; IWA recommends 20m clearance per
    board in active water — high carrying capacity sensitivity.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  reviewed_by: []
  sources:
    - "International Windsports Association (IWA) safety guidelines"
    - "Caldeira et al. 2019, windsurf condition analysis, Algarve coast"
  notes: |
    Provisional profile v1.0. Gust penalty threshold is stricter than
    kitesurfing (1.3 vs 1.4) because a heavy sail and mast make gusty
    conditions more physically demanding. Expert review pending.
