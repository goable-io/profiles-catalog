tier_rationale:
  en: |
    Same Bolonia beach as the kite cluster, used by the smaller Tarifa
    wave-windsurf community. Cleaner wind than Valdevaqueros (past the
    Sierra-lee rotor zone) and direct Atlantic swell reaching the beach.
    Sand bottom along the full length. Lower school density than at the
    in-town beaches, so rescue coverage is sparser; the failure mode for
    a windsurfer here is a longer swim with slower gear drag than for
    kiters. Errors still recoverable for a competent intermediate.

