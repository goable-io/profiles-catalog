description:
  en: |
    The wave-sailing end of the Tarifa cluster. Works on Poniente plus
    Atlantic groundswell, typically October-April. A specialist's spot
    — the local wave-windsurf community treats it the way the local
    wave-kite community treats it: known hazards, considered conditions,
    not a place for visitors to try out new gear.

