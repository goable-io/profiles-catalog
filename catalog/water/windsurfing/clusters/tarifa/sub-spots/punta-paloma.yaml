tier_rationale:
  en: |
    Same point as kite Punta Paloma — downwind rock and reef section,
    wave-influenced when Poniente combines with Atlantic groundswell.
    For windsurfers the consequence is more severe than for kiters in
    one specific failure mode: a broken mast or rigging at this point
    puts the sailor head-first downwind onto rock with much slower
    swim-back capability than a kiter can manage. Used by wave
    windsurfers familiar with the point on selected Poniente swell days.

