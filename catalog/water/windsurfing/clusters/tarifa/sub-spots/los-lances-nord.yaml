description:
  en: |
    The beginner-friendly windsurf zone of the Tarifa cluster. Shallow
    water from the school launch and broad sand beach make this the
    standard entry-point for windsurf lessons in southern Spain. Less
    appealing for advanced sailors (limited wave content, busy with
    schools and kiters), but the only Tarifa sub-spot with Tier 1
    physical safety.

