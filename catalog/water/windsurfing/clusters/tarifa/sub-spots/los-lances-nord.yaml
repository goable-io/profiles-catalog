tier_rationale:
  en: |
    Northern end of Playa de los Lances. Shallow shelf of 80-150 m
    works less well for windsurf than for kite (waterstart requires
    more depth than body-drag practice), but the shallow zone IS used
    by beginner windsurfers for upper-body planning practice and uphaul
    recovery without exposure to deep water. Sand bottom, side-on
    Levante, dense school coverage in the immediate area. Failure mode
    is a wet walk back to the beach — most recoverable Tarifa windsurf
    sub-spot.

