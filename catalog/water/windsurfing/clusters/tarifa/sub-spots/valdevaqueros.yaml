tier_rationale:
  en: |
    Valdevaqueros's wind acceleration in the lee of the Sierra de la
    Plata produces the strongest reliable Levante on the Spanish coast
    — regularly 30-35 knots in summer. For windsurfing this means slalom
    and freeride gear gets pushed hard. Risks: gusty Levante can spike
    sail load past safe rig limits (broken masts and torn sails are
    normal here); high windsurfer + kiter density at peak makes
    line-of-sight collisions a concern. Sand bottom and on-beach school
    presence keep absolute consequences moderate.

