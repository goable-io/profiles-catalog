description:
  en: |
    The strong-wind end of the Tarifa cluster for windsurfers. Sail size
    drops 2-3 sq m vs Balneario in equivalent forecast because the
    Sierra-lee acceleration is real. Speedrun sailors and slalom riders
    are the dominant community. Best in shoulder season (May, September)
    when kite density is lower.

