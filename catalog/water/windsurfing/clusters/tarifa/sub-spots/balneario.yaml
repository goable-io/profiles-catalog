tier_rationale:
  en: |
    Same Balneario beach as the kitesurfing cluster, used by the Tarifa
    windsurf community on Levante (E) and Poniente (W) afternoons. Deep
    water from 20 m offshore, sand bottom, side-on prevailing wind.
    Windsurf-specific risk: drift-off if mast breaks or sail rips at
    25 kn+ — the swim back is the same distance as for kiters but slower
    because the rider is also dragging gear. Rescue boats from local
    windsurf schools (slightly fewer than kite schools but still present
    during operating hours).

display_name:
  en: Windsurfing — Tarifa Balneario
  it: Windsurf — Tarifa Balneario
  es: Windsurf — Tarifa Balneario
  fr: Windsurf — Tarifa Balneario
  de: Windsurfen — Tarifa Balneario

description:
  en: |
    Tarifa's windsurf entry point. Beach launch with side-on
    bidirectional wind (Levante or Poniente). The windsurf community
    here is smaller and older than the kite community but consistently
    represented. Water-start practice happens close to shore; speed runs
    further out are inside the inshore zone (no need to commit to deep
    open water). Same operational season as kitesurfing-tarifa-balneario.

