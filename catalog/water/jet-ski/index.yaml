slug: jet-ski
spot_kind: base
version: "1.0.0"
category: water
display_name:
  en: Jet Ski / Personal Watercraft
  it: Moto d'acqua
  es: Moto acuática
  fr: Jet-ski
  de: Jetski
description:
  en: |
    Personal watercraft (jet ski) operation requires moderate sea state and
    good visibility. The craft handles rough conditions better than non-motorised
    activities but operator safety and comfort degrade rapidly above 2.5m waves
    or in poor visibility. Precipitation gate is stricter due to reduced grip
    and visibility.

dimensions:
  - name: wave
    metric: wave_height_m
    weight: 0.25
    curve:
      - { x: 0.0, s: 0.90 }
      - { x: 0.5, s: 1.00 }
      - { x: 1.5, s: 0.80 }
      - { x: 2.0, s: 0.50 }
      - { x: 2.5, s: 0.20 }
      - { x: 3.5, s: 0.00 }

  - name: visibility
    metric: visibility_km
    weight: 0.25
    curve:
      - { x: 0, s: 0.0 }
      - { x: 1, s: 0.0 }
      - { x: 2, s: 0.5 }
      - { x: 5, s: 0.9 }
      - { x: 8, s: 1.0 }

  - name: wind_speed
    metric: wind_speed_kn
    weight: 0.15
    curve:
      - { x: 0, s: 0.80 }
      - { x: 8, s: 1.00 }
      - { x: 18, s: 0.90 }
      - { x: 25, s: 0.60 }
      - { x: 30, s: 0.30 }
      - { x: 35, s: 0.00 }

  - name: air_temp_comfort
    metric: apparent_temp_c
    weight: 0.15
    curve:
      - { x: 0, s: 0.0 }
      - { x: 10, s: 0.4 }
      - { x: 20, s: 0.9 }
      - { x: 28, s: 1.0 }
      - { x: 40, s: 0.7 }

  - name: water_temp
    metric: water_temperature_c
    weight: 0.10
    curve:
      - { x: 5, s: 0.0 }
      - { x: 15, s: 0.5 }
      - { x: 20, s: 0.9 }
      - { x: 25, s: 1.0 }
      - { x: 32, s: 1.0 }

  - name: precipitation
    metric: precipitation_mm_h
    weight: 0.10
    curve:
      - { x: 0, s: 1.00 }
      - { x: 2, s: 0.80 }
      - { x: 5, s: 0.40 }
      - { x: 8, s: 0.10 }
      - { x: 10, s: 0.00 }

gates:
  - metric: wave_height_m
    condition: gt
    value: 3.0
    reason_code: HIGH_SEAS
    description: Waves above 3m are unsafe for personal watercraft operation.

  - metric: wind_speed_kn
    condition: gt
    value: 35
    reason_code: STRONG_WIND
    description: Wind above 35 knots creates unsafe spray and navigation conditions.

  - metric: visibility_km
    condition: lt
    value: 1
    reason_code: LOW_VISIBILITY
    description: Visibility below 1 km is unsafe for high-speed watercraft.

  - metric: precipitation_mm_h
    condition: gt
    value: 8
    reason_code: HEAVY_RAIN
    description: Heavy rain severely reduces visibility and grip on personal watercraft.

sustainability:
  carbon_neutral: false
  equipment_dependency: high
  typical_season_weeks: 24
  carrying_capacity_sensitivity: high
  notes: |
    Motorised activity with significant direct emissions per session
    (typical 2-stroke or 4-stroke engine: 8-20 kg CO2 per hour of operation).
    Equipment footprint is high (craft, engine, fuel, trailer, storage).
    Noise, wash, and fuel contamination affect surrounding marine fauna.
    Excluded from the suitability calibration research dataset.
    Included in the sustainability environmental tracking dataset to document
    motorised activity pressure, emissions volume, and comparative impact
    against non-motorised alternatives in the same coastal zones.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "Personal Watercraft Industry Association (PWIA) operator safety guidelines"
    - "Asplund 2000, personal watercraft injuries, Physician and Sportsmedicine"
  notes: |
    Provisional profile v1.0. carbon_neutral: false. Precipitation gate is
    stricter than other profiles (8mm/h vs 10-15mm/h) due to the combination
    of high speed, open cockpit exposure, and reduced grip at the handlebars.
    This profile is sustainability_eligible for environmental impact tracking.
