slug: bouldering
spot_kind: base
version: "1.0.0"
category: land
display_name:
  en: Outdoor Bouldering
  it: Boulder Outdoor
  es: Bulder
  fr: Bloc en Extérieur
  de: Bouldern
description:
  en: |
    Climbing short, hard problems on natural rock without ropes, using
    crash pads for protection. Friction is the dominant condition factor:
    cool, dry air with low humidity gives the best grip on granite,
    sandstone, and gneiss. High temperatures sweat hands and shoes;
    wet rock is generally a hard gate (both unsafe and contributes to
    holds breaking). Wind below 25 knots is preferred — strong wind on
    spotter-dependent highballs adds fall-direction unpredictability.

dimensions:
  - name: temperature
    metric: apparent_temp_c
    weight: 0.35
    curve:
      - { x: -5, s: 0.30 }
      - { x: 2,  s: 0.85 }
      - { x: 6,  s: 1.00 }
      - { x: 12, s: 1.00 }
      - { x: 18, s: 0.85 }
      - { x: 24, s: 0.50 }
      - { x: 30, s: 0.20 }
      - { x: 36, s: 0.00 }

  - name: precipitation
    metric: precipitation_mm_h
    weight: 0.25
    curve:
      - { x: 0,   s: 1.00 }
      - { x: 0.2, s: 0.30 }
      - { x: 0.5, s: 0.10 }
      - { x: 1,   s: 0.00 }

  - name: wind_speed
    metric: wind_speed_kn
    weight: 0.10
    curve:
      - { x: 0,  s: 0.90 }
      - { x: 5,  s: 1.00 }
      - { x: 15, s: 0.85 }
      - { x: 25, s: 0.50 }
      - { x: 40, s: 0.10 }

  - name: sun
    metric: sun_altitude_deg
    weight: 0.10
    curve:
      - { x: 0,  s: 0.00 }
      - { x: 8,  s: 0.65 }
      - { x: 25, s: 1.00 }

  - name: visibility
    metric: visibility_km
    weight: 0.05
    curve:
      - { x: 0,  s: 0.20 }
      - { x: 0.5, s: 0.50 }
      - { x: 2,  s: 0.85 }
      - { x: 5,  s: 1.00 }

  - name: uv_safety
    metric: uv_index
    weight: 0.05
    curve:
      - { x: 0,  s: 1.00 }
      - { x: 3,  s: 1.00 }
      - { x: 6,  s: 0.85 }
      - { x: 9,  s: 0.55 }
      - { x: 11, s: 0.30 }

  - name: humidity_proxy
    metric: water_temperature_c
    weight: 0.10
    curve:
      - { x: -5, s: 1.00 }
      - { x: 5,  s: 1.00 }
      - { x: 15, s: 0.80 }
      - { x: 22, s: 0.55 }
      - { x: 28, s: 0.30 }

gates:
  - metric: precipitation_mm_h
    condition: gt
    value: 0.5
    reason_code: WET_ROCK_RISK
    description: Active precipitation makes rock holds slippery and weakens certain rock types (sandstone, conglomerate) — both unsafe and damaging to the resource.

  - metric: wind_speed_kn
    condition: gt
    value: 45
    reason_code: SPOTTER_HAZARD
    description: Sustained wind above 45 knots makes spotting falls and predicting fall direction unsafe, particularly on highballs.

  - metric: apparent_temp_c
    condition: gt
    value: 38
    reason_code: EXTREME_HEAT
    description: Apparent temperature above 38°C makes finger grip on holds unsustainable and creates heat exposure for ground belayers.

sustainability:
  carbon_neutral: true
  equipment_dependency: medium
  typical_season_weeks: 30
  carrying_capacity_sensitivity: high
  notes: |
    Human-powered with zero direct emissions per session. Equipment
    (crash pads, shoes, chalk) is modest but chalk residue and pad-
    crushed vegetation accumulate at popular boulders. Carrying capacity
    sensitivity is high: iconic sites (Fontainebleau, Hueco Tanks, Magic
    Wood, Rocklands) suffer from chalk wash, soil compaction at landing
    zones, and erosion on approach paths. Access is increasingly gated
    by federations and land managers via permits.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "UIAA Mountain Medicine Commission climbing condition guidelines"
    - "IFSC (International Federation of Sport Climbing) competition condition standards"
    - "Schöffl et al. 2018, climbing-specific climatology and friction studies"
  notes: |
    Temperature gets the highest single weight because friction-on-rock
    is dominated by skin and rubber temperature, not by traditional
    comfort metrics. The humidity_proxy via water_temperature_c is a
    crude stand-in: L1e additions will introduce a direct relative_
    humidity_pct metric. L1e will also add rockfall_risk_index for
    after-rain freeze-thaw cycles in alpine bouldering areas.
