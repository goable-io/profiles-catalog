description:
  en: |
    Tre Cime di Lavaredo (UNESCO World Heritage site, Italian Dolomites)
    is one of the most photographed mountain landscapes in Europe and
    a flagship Alpine trekking destination. The classic loop from
    Rifugio Auronzo (2320m) to Rifugio Locatelli (2438m) and back
    typically takes 4-5 hours. Conditions favour cool stable summer
    weather with low afternoon convection risk; the loop is exposed
    above tree-line throughout and offers no escape route during
    thunderstorms. The optimal season is mid-June to mid-September.
    Visitor density is extreme during peak summer windows; permit and
    parking access has been progressively restricted since 2023.

  it: |
    Tre Cime di Lavaredo (Patrimonio UNESCO, Dolomiti italiane) è uno
    dei paesaggi montani più fotografati d'Europa e una meta di
    trekking alpino di riferimento. Il giro classico dal Rifugio
    Auronzo (2320m) al Rifugio Locatelli (2438m) richiede tipicamente
    4-5 ore. Il sentiero è interamente sopra il limite degli alberi e
    non offre vie di fuga durante temporali. Stagione ottimale metà
    giugno - metà settembre. Densità di visitatori estrema nei picchi
    estivi.

