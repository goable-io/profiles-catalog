gates:
  - metric: visibility_km
    condition: lt
    value: 0.5
    reason_code: EXPOSED_RIDGE_WHITEOUT
    description: Tre Cime trail is entirely above tree-line; visibility below 500m makes navigation hazardous and the iconic views (the principal reason for the trek) impossible to appreciate.

  - metric: precipitation_mm_h
    condition: gt
    value: 6
    reason_code: HEAVY_PRECIPITATION_EXPOSED
    description: Heavy active precipitation on the Tre Cime loop creates flash-flood risk in side gullies and rapid hypothermia exposure above 2400m; afternoon thunderstorm cells often deliver this intensity in July-August.

  - metric: wind_speed_kn
    condition: gt
    value: 45
    reason_code: HIGH_WIND_EXPOSED_RIDGE
    description: Sustained wind above 45 knots on the Lavaredo saddles creates fall risk for trekkers carrying camera gear and pack.

  - metric: apparent_temp_c
    condition: lt
    value: -10
    reason_code: HYPOTHERMIA_EXPOSURE
    description: At Tre Cime altitudes, apparent temperatures below -10°C combined with wet conditions create immediate hypothermia risk on the open ridge.

sustainability:
  carbon_neutral: true
  equipment_dependency: low
  typical_season_weeks: 14
  carrying_capacity_sensitivity: high
  notes: |
    The Tre Cime loop is human-powered with zero direct emissions per
    session. However, the 7km toll road to Rifugio Auronzo is a major
    indirect emission source (estimated 800,000+ vehicle visits per
    summer pre-restrictions; toll capacity now limits this). Carrying
    capacity sensitivity is VERY HIGH: trail erosion is measurable, the
    iconic photo zones suffer vegetation trampling, and wildlife
    (ibex, golden eagle, marmot) shows documented displacement from
    historical zones. Goable score should factor a "destination
    overuse" advisory during peak windows (12:00-15:00 July-August)
    even when meteorological conditions are excellent. Permit/parking
    restrictions introduced 2023 are administrative carrying-capacity
    mechanisms outside Goable's scoring scope.

