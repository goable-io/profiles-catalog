tier_rationale:
  en: |
    The Sextner Innerkofler / Toblin via ferrata starting from Rifugio
    Locatelli — a WWI-era fixed-rope route involving short tunnels,
    exposed ledges, and ~150 m of altitude on protected steel cable.
    Requires harness, ferrata lanyard, and helmet (rentable at huts).
    Consequence of a fall is held by the lanyard but with significant
    impact force; route is technically scrambling rather than climbing.
    Cellular coverage variable in the tunnels; one fixed rescue line
    runs through the cluster.

display_name:
  en: Trekking — Tre Cime Ferrata Innerkofler
  it: Trekking — Ferrata Innerkofler Tre Cime
  es: Trekking — Vía Ferrata Innerkofler Tre Cime
  fr: Trekking — Via Ferrata Innerkofler Tre Cime
  de: Wandern — Klettersteig Innerkofler Drei Zinnen

description:
  en: |
    Historic WWI-era ferrata above Rifugio Locatelli, connecting
    artillery positions on Monte Paterno / Paternkofel. Spectacular
    views of the north faces of the Tre Cime. Requires ferrata kit
    + ability to move on steel cable in exposure. Most active in
    mid-July to early September.

