gates:
  - metric: visibility_km
    condition: lt
    value: 0.3
    reason_code: ALPINE_WHITEOUT
    description: Visibility below 300m in alpine terrain creates immediate route-finding hazard; high-altitude rescue often impossible.

  - metric: precipitation_mm_h
    condition: gt
    value: 12
    reason_code: HEAVY_PRECIPITATION_ALPINE
    description: Heavy active precipitation in alpine terrain triggers flash floods in gullies and rapidly degrades trail surface.

  - metric: wind_speed_kn
    condition: gt
    value: 50
    reason_code: ALPINE_HIGH_WIND
    description: Sustained wind above 50 knots at alpine altitude makes ridge traverses and exposed sections dangerous.

  - metric: apparent_temp_c
    condition: lt
    value: -20
    reason_code: EXTREME_COLD_ALPINE
    description: Apparent temperature below -20°C in alpine terrain creates immediate frostbite risk.

sustainability:
  carbon_neutral: true
  equipment_dependency: low
  typical_season_weeks: 22
  carrying_capacity_sensitivity: high
  notes: |
    Alpine trekking is human-powered with zero direct emissions, but
    high-use trails (Tour du Mont Blanc, Haute Route, Dolomiti Alta Via)
    show measurable trail erosion, with mountain hut operations adding
    indirect emissions (helicopter resupply in some valleys). Carrying
    capacity sensitivity is high on iconic routes during the short June-
    September window; permit systems are increasingly common (e.g., GR20
    Corsica) and Goable can surface these as informational alerts in
    spot profiles. Wildlife disturbance peaks in summer when alpine
    mammals (chamois, ibex, marmot) are most active.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  review_status: draft
  reviewed_by: []
  sources:
    - "UIAA Alpine Skill Set technical standards"
    - "MeteoSwiss alpine weather classification (typical orographic convection patterns)"
    - "European Avalanche Warning Services (EAWS) shoulder-season trekking guidance"
  notes: |
    Regional overrides vs global trekking: temperature sweet spot lowered
    from 18°C to 14°C (lapse rate to summit altitude); visibility weight
    raised from 0.15 to 0.20 (route-finding criticality); wind gate
    lowered from 50kn to 50kn but with steeper degradation curve; added
    explicit ALPINE_WHITEOUT gate with stricter visibility floor.
    Afternoon-thunderstorm bias is the most-requested L1d enhancement:
    once lightning_proximity_score is wired in, this profile gains a
    time-of-day-aware penalty rising sharply post-13:00 local during
    June-August.
