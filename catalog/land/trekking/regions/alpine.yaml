slug: trekking-alpine
version: "0.1.0"
category: land
extends: trekking
region: alpine
display_name:
  en: Trekking — Alpine
  it: Trekking — Alpino
  es: Senderismo — Alpino
  fr: Randonnée — Alpine
  de: Wandern — Alpin
description:
  en: |
    Alpine trekking covers high-mountain hiking above ~1500m elevation
    across the Alps, Pyrenees, Carpathians, and Caucasus. Conditions
    differ from generic trekking: cooler optimal temperatures (lapse rate
    reduces summit temps by 6-9°C per 1000m vs valley), stronger winds on
    ridges, rapid weather changes typical of orographic convection,
    lightning risk peaking in afternoon thunderstorms (esp. June-August),
    and snow possible year-round above 2500m. Earlier morning starts are
    strongly preferred; afternoon thunderstorm risk is a defining feature
    of alpine summer trekking weather.

