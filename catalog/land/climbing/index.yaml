slug: climbing
version: "0.1.0"
category: land
display_name:
  en: Rock Climbing
  it: Arrampicata
  es: Escalada
  fr: Escalade
  de: Klettern
description:
  en: |
    Rock climbing covers sport climbing, traditional climbing, and bouldering
    on natural rock outdoors. Conditions favour dry rock (precipitation
    history matters more than current state), moderate temperatures with
    low humidity for friction, low wind on exposed routes, and full
    daylight. Wet rock dramatically increases injury risk; freezing
    temperatures degrade tendons and rope handling. Lightning on alpine
    rock is an absolute no-go. Profile uses currently-implemented
    MetricEnum; L1d adds lightning_proximity and L1e adds rockfall_risk
    (freeze-thaw cycle proxy for via ferrata and alpine multipitch).

dimensions:
  - name: temperature
    metric: apparent_temp_c
    weight: 0.25
    curve:
      - { x: -5, s: 0.05 }
      - { x: 2,  s: 0.40 }
      - { x: 8,  s: 0.85 }
      - { x: 14, s: 1.00 }
      - { x: 22, s: 0.95 }
      - { x: 30, s: 0.55 }
      - { x: 38, s: 0.15 }

  - name: precipitation
    metric: precipitation_mm_h
    weight: 0.25
    curve:
      - { x: 0,   s: 1.00 }
      - { x: 0.1, s: 0.50 }
      - { x: 0.5, s: 0.15 }
      - { x: 2,   s: 0.00 }

  - name: visibility
    metric: visibility_km
    weight: 0.15
    curve:
      - { x: 0,  s: 0.00 }
      - { x: 1,  s: 0.30 }
      - { x: 3,  s: 0.75 }
      - { x: 10, s: 1.00 }

  - name: wind_speed
    metric: wind_speed_kn
    weight: 0.15
    curve:
      - { x: 0,  s: 1.00 }
      - { x: 8,  s: 0.95 }
      - { x: 16, s: 0.70 }
      - { x: 25, s: 0.30 }
      - { x: 35, s: 0.00 }

  - name: sun
    metric: sun_altitude_deg
    weight: 0.10
    curve:
      - { x: 0,  s: 0.00 }
      - { x: 10, s: 0.65 }
      - { x: 25, s: 1.00 }

  - name: uv_safety
    metric: uv_index
    weight: 0.10
    curve:
      - { x: 0,  s: 1.00 }
      - { x: 3,  s: 1.00 }
      - { x: 6,  s: 0.85 }
      - { x: 9,  s: 0.55 }
      - { x: 11, s: 0.30 }

gates:
  - metric: precipitation_mm_h
    condition: gt
    value: 2
    reason_code: WET_ROCK
    description: Active precipitation makes rock slippery; many sandstone areas (Elbsandstein, Fontainebleau) are damaged by climbing on wet rock.

  - metric: visibility_km
    condition: lt
    value: 0.5
    reason_code: LOW_VISIBILITY
    description: Visibility below 500m on multi-pitch routes creates route-finding and communication risk.

  - metric: wind_speed_kn
    condition: gt
    value: 35
    reason_code: HIGH_WIND_EXPOSED
    description: Sustained wind above 35 knots makes rope handling and communication unsafe on exposed routes.

  - metric: apparent_temp_c
    condition: lt
    value: -5
    reason_code: EXTREME_COLD
    description: Below -5°C apparent, tendons stiffen and grip deteriorates dramatically; frostbite risk on belay.

sustainability:
  carbon_neutral: true
  equipment_dependency: medium
  typical_season_weeks: 30
  carrying_capacity_sensitivity: high
  notes: |
    Human-powered activity with zero direct emissions per session.
    Equipment footprint is moderate (rope with 5-10 year lifespan,
    harness, shoes, helmet, hardware). Carrying capacity sensitivity is
    HIGH on bouldering and sport climbing — rock surface degradation,
    chalk accumulation, vegetation trampling at the base, raptor
    disturbance during nesting season (March-July in EU). Many areas
    have seasonal closures for raptor protection that profiles should
    encode as advisory alerts.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  reviewed_by: []
  sources:
    - "UIAA (International Climbing and Mountaineering Federation) safety guidance"
    - "ENSA (École nationale de ski et d'alpinisme) outdoor climbing weather criteria"
  maturity: provisional
  notes: |
    Profile uses currently-implemented MetricEnum. L1d will add
    lightning_proximity (hard-gated for alpine multipitch),
    precipitation_form (snow gates differently than rain), wbgt_c for
    summer heat stress. L1e adds rockfall_risk_index (freeze-thaw cycle
    count, critical for via ferrata and alpine climbing).
