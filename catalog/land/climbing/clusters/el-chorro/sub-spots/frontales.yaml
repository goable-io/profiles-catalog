tier_rationale:
  en: |
    Sun-exposed slabby and vertical limestone wall above the village,
    F4-F7a range. The introductory crag of El Chorro — most schools
    and visiting groups start here. Bolting is consistent and recent;
    approach is a 10-minute walk from village parking. Falls onto bolts
    are clean. Routine sport-climbing risks (lowering, communication,
    holds) apply.

display_name:
  en: Climbing — El Chorro Frontales
  it: Arrampicata — El Chorro Frontales
  es: Escalada — El Chorro Frontales
  fr: Escalade — El Chorro Frontales
  de: Klettern — El Chorro Frontales

description:
  en: |
    The starter crag of El Chorro. Easy approach, sun-warmed limestone
    in autumn-spring, plenty of grades 5-6c+ for groups and learning.
    Crowded on European holiday weeks but spreads across multiple
    sectors. Best aspect rotation: morning shade in autumn, all-day
    sun in winter, mornings only in early summer.

