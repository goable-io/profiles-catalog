tier_rationale:
  en: |
    Steep limestone tufa wall in the Garganta del Chorro, with routes in
    the F6c-F8c range. Well-bolted by local equippers (FAA-coordinated)
    with stainless hardware and chain anchors. South-facing — full sun
    from late morning, becomes climbable from October to April. Falls
    are clean steep falls onto bolts (no ledges to hit). Approach by
    bridge across the Garganta; cell coverage moderate. Climbing
    consequences are routine bolted-sport-route risks: lowering errors,
    rope-end accidents, holds breaking on hard moves.

