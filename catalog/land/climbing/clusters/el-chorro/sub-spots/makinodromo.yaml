description:
  en: |
    Steep tufa wall on the east side of the Garganta del Chorro. The
    high-end sport climbing showcase of the area, with routes in the
    F7a-F8c sweet spot and several F9 testpieces. Well-bolted with
    stainless hardware. South aspect makes it a winter venue (October-
    April); too hot May-September.

