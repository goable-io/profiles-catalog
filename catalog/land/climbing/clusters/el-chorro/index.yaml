gates:
  - metric: precipitation_mm_h
    condition: gt
    value: 0.5
    reason_code: WET_LIMESTONE_RUNOFF
    description: Active precipitation makes El Chorro limestone unsafely slick; post-rain runoff persists on overhanging routes for 24-48h.

  - metric: apparent_temp_c
    condition: gt
    value: 40
    reason_code: EXTREME_HEAT_GORGE
    description: Apparent temperature above 40°C in the gorge — common July-August at south-facing sectors — makes both climbing and belaying unsafe.

  - metric: wind_speed_kn
    condition: gt
    value: 45
    reason_code: HIGH_WIND_GORGE
    description: Sustained Levante or Poniente above 45 knots in the Desfiladero creates rope-drag and communication hazards on multipitch routes.

sustainability:
  carbon_neutral: true
  equipment_dependency: medium
  typical_season_weeks: 45
  carrying_capacity_sensitivity: high
  notes: |
    El Chorro experiences peak European climber crowding October-April
    (climbers escape colder northern climates). Junta de Andalucía
    introduced access permits for the Desfiladero de los Gaitanes
    (Caminito del Rey side) to manage traffic; some crags now require
    booking. Bolting standards and re-bolting maintained by local
    federation (FAA - Federación Andaluza de Montañismo). Wildlife
    sensitivities: griffon vulture and Bonelli's eagle nesting closes
    select crags January-July seasonally.

verdict_buckets:
  unsafe: 0
