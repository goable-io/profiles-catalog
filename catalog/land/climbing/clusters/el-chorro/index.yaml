description:
  en: |
    El Chorro (Málaga province, Andalucía) is a year-round sport-climbing
    destination with limestone and conglomerate cliffs across the Desfiladero
    de los Gaitanes (Caminito del Rey gorge). 2000+ routes from F4 to F9a
    on south-, west-, north-, and east-facing aspects, enabling all-season
    climbing by aspect rotation. The defining condition is temperature: the
    same crag is unclimbable in July afternoon sun and superb in shaded
    morning. Wet weather is rare (Mediterranean climate, ~300mm annual
    rainfall) but post-rain runoff can persist on limestone for 24-48h.

