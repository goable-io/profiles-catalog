  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "Federación Andaluza de Montañismo (FAA) El Chorro access and bolting documentation"
    - "Junta de Andalucía Caminito del Rey management plan"
    - "Rockfax El Chorro guidebook (Hewitt, 2023) seasonal condition guidance"
    - "AEMET Málaga climatological records 1981-2020"
  notes: |
    Spot overrides vs global climbing: temperature dominant (0.35 weight)
    because aspect-rotation is the key strategic decision at El Chorro;
    precipitation gate tightened to 0.5 mm/h (limestone runoff
    persistence); humidity_proxy via water_temperature_c added to flag
    August heat-humidity stagnation; year-round season (45 weeks) is the
    longest of any climbing spot in the catalog.
