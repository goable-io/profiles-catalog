gates:
  - metric: visibility_km
    condition: lt
    value: 0.4
    reason_code: ALPINE_WHITEOUT
    description: Visibility below 400m in Engadin alpine touring terrain makes route-finding unsafe.

  - metric: wind_speed_kn
    condition: gt
    value: 38
    reason_code: BERNINA_HIGH_WIND
    description: Sustained wind above 38 knots at Bernina massif altitudes accelerates wind-slab formation.

  - metric: apparent_temp_c
    condition: lt
    value: -30
    reason_code: ENGADIN_DEEP_COLD
    description: Apparent temperature below -30°C is routine in the Upper Engadin winter (the basin records the lowest temperatures in the Alps).

  - metric: precipitation_mm_h
    condition: gt
    value: 8
    reason_code: HEAVY_SNOWFALL_AVALANCHE_LOADING
    description: Heavy active snowfall loads slopes acutely; consult SLF Graubünden bulletin.

sustainability:
  carbon_neutral: false
  equipment_dependency: high
  typical_season_weeks: 22
  carrying_capacity_sensitivity: medium
  notes: |
    Engadin season runs December-May; the high-altitude lifts
    (Corvatsch, Diavolezza) operate the full window. Rhaetian
    Railway is the standard low-emission access. The Pontresina-
    based Swiss Mountain Guides Association office is the regional
    hub.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "Swiss Mountain Guides Association (SBV) Engadin / Pontresina office"
    - "SLF Graubünden avalanche bulletin standards"
    - "Bernina massif touring guidebook (CAS / Swiss Alpine Club, 2015)"
  notes: |
    Cluster aggregates 3 lift-served touring bases in the Upper
    Engadin / Pontresina area, all within 15 km of each other.
    Region tag: alpine. Cold-gate at -30°C reflects the basin's
    documented winter cold records. v1.1.0: snow_surface_quality
    (0.25) and swe_mm (0.10) added, atmospheric weights rescaled by
    0.65 to preserve their relative split.
