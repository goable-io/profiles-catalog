description:
  en: |
    The Upper Engadin (Graubünden, eastern Swiss Alps) — St. Moritz +
    Pontresina + Sils — is the dry-continental-climate ski-touring
    region of Switzerland. Lower snowfall but more stable snowpack
    than the western Alps; cold-and-clear winter regime gives long
    visibility windows ideal for high-altitude touring. The Bernina
    massif (Piz Bernina, Piz Palü) is the touring focus, accessed
    from Corvatsch, Diavolezza, and Piz Lagalb lift bases.

