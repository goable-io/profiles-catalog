tier_rationale:
  en: |
    Corvatsch (3303 m summit, 2702 m mid-station start for touring)
    is the western Engadin's main touring base. Access to Piz
    Murtèl, Piz Corvatsch summit, and the Roseg / Tschierva glacier
    approaches. North-facing 35-45° slopes, glacier travel kit
    required for the upper sections. Avalanche risk consult SLF
    Graubünden daily.

