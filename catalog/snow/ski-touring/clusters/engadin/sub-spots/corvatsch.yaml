  de: Skitourengehen — Corvatsch

description:
  en: |
    The western Engadin touring hub. Corvatsch lift access opens
    the Murtèl + Tschierva glacier zones for the half-day touring
    classic. Hosts the Engadin Snow Patrouille endurance event in
    early March.

