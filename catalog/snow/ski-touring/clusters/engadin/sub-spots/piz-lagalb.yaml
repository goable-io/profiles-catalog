tier_rationale:
  en: |
    Piz Lagalb (2959 m) is the third Bernina-area lift-served
    touring base, opposite Diavolezza across the Bernina Pass road.
    The summit gives access to non-glaciated south-and-east faces
    suitable for touring without crevasse-rescue kit. Open slopes
    30-40°, avalanche-managed by standard SLF observations. The
    cluster's intermediate-friendly base.

