tier_rationale:
  en: |
    Diavolezza (2978 m) is the eastern Engadin touring base, with
    direct access to the Bernina massif glacier system —
    Piz Palü standard route, Bellavista, Vedretta di Morteratsch
    descent. Heavily-glaciated terrain with serac-fall hazard on the
    upper Pers glacier sections. The classic "Diavolezza glacier
    descent" (Morteratsch glacier, 1100 m vertical) is the cluster's
    poster route — usually skied roped-up due to crevasses below
    Bellavista.

