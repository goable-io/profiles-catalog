slug: ski-touring-spot-tromso
spot_kind: cluster
version: "1.1.0"
category: snow
extends: ski-touring-arctic
region: arctic
country_code: NO
sub_spots:
  - ski-touring-spot-tromso-tromsdalstind
  - ski-touring-spot-tromso-kvaloya-stortinden
  - ski-touring-spot-tromso-senja-sukkertoppen
display_name:
  en: Ski Touring — Tromsø
  it: Sci alpinismo — Tromsø
  es: Esquí de travesía — Tromsø
  fr: Ski de randonnée — Tromsø
  de: Skitourengehen — Tromsø
description:
  en: |
    The Tromsø area (Troms, northern Norway, 69.6°N) is the
    operational hub for arctic ski-touring in Scandinavia. From
    Tromsø town you access three distinct sub-areas: Tromsdalstind
    + the immediate Tromsø Alps, Kvaløya island peaks (15 min by
    road), and Senja island (90 min + ferry). All within the
    arctic-touring season window (mid-March to mid-May). The town
    is the airport hub for Lyngen + Lofoten visiting parties as
    well, so peak weeks see significant guide-and-client volume.

