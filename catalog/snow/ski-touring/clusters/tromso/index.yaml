gates:
  - metric: visibility_km
    condition: lt
    value: 0.4
    reason_code: ARCTIC_WHITEOUT
    description: Visibility below 400m makes Tromsø-area route-finding unsafe.

  - metric: wind_speed_kn
    condition: gt
    value: 38
    reason_code: HIGH_WIND_ARCTIC
    description: Sustained wind above 38 knots accelerates wind-slab formation; coastal arctic wind events are frequent.

  - metric: apparent_temp_c
    condition: lt
    value: -32
    reason_code: EXTREME_COLD_ARCTIC
    description: Apparent temperature below -32°C creates immediate frostbite risk.

  - metric: precipitation_mm_h
    condition: gt
    value: 8
    reason_code: HEAVY_SNOWFALL_AVALANCHE_LOADING
    description: Heavy active snowfall loads slopes acutely; consult Snøskredvarsel Tromsø + Lofoten/Vesterålen bulletins.

sustainability:
  carbon_neutral: true
  equipment_dependency: high
  typical_season_weeks: 10
  carrying_capacity_sensitivity: medium
  notes: |
    Tromsø is the international gateway for arctic ski touring —
    Tromsø Airport handles 100k+ ski-touring visitors per spring
    season. Car-and-ferry access drives the bulk of intra-area
    transport. Reindeer-husbandry zones cross most touring valleys;
    operators coordinate with Tromsø + Karesuvanto Sámi pastoral
    districts.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "NOTF Tromsø + Senja region documentation"
    - "Snøskredvarsel Tromsø + Lofoten/Vesterålen bulletin standards"
    - "Tromsø Outdoor Festival ski-touring program documentation"
  notes: |
    Cluster aggregates 3 sub-spots covering the Tromsø Alps,
    Kvaløya island, and Senja island. Region tag: arctic. Sister
    cluster to ski-touring-spot-lyngen — many parties combine the
    two over a multi-week trip. v1.1.0: snow_surface_quality (0.25)
    and swe_mm (0.10) added, atmospheric weights rescaled by 0.65 to
    preserve their relative split.
