tier_rationale:
  en: |
    Kvaløya island (15 min by road from Tromsø) hosts the local
    Stortinden peak (843 m) — a sea-to-summit-to-sea descent of
    800 m vertical. Open coastal terrain with direct fjord
    backdrop, steeper north faces (35-45°) on the descent route.
    Non-glaciated. Lower-altitude peaks of the Tromsø cluster
    typically have warmer base temperatures and faster melt-out in
    late April. Boat-and-road accessible.

