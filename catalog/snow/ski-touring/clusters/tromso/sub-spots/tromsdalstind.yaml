tier_rationale:
  en: |
    Tromsdalstind (1238 m) rises directly above Tromsø city — the
    "city peak" that gives the town its iconic backdrop. Standard
    ascent: 4-5 hours from the Tromsdalen trailhead (15 min from
    the airport). Open above-treeline slopes 30-40°, no glaciated
    terrain, well-established route with local guide presence
    daily. The standard first-day acclimatisation peak for Tromsø-
    based touring parties.

