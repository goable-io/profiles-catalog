tier_rationale:
  en: |
    Senja island (90 min + ferry from Tromsø) hosts Sukkertoppen
    (961 m) — one of Norway's most photographed sea-to-summit ski
    descents. Steep east-facing 40-50° bowls drop 900 m directly
    into the fjord. Snow stability variable due to coastal climate
    + strong solar exposure. Cornice + wind-loaded slab hazard on
    the summit ridge. Reserved for advanced ski-tourers; full
    arctic kit + glacier-rescue redundancy recommended.

