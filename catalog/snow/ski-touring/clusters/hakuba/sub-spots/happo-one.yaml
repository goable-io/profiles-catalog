tier_rationale:
  en: |
    Happo-One resort's backcountry zone — the most-skied BC area
    in the Hakuba valley, accessed from the top of the Happo
    gondola via the formal sign-out gate. Routes climb to the
    Karamatsu-dake + Mt. Goryu side-country (2700-2800 m). Mixed
    open above-treeline bowls + glaciated remnants on the highest
    Karamatsu approach. Wind-loaded slab is the dominant
    avalanche-risk character of the zone.

