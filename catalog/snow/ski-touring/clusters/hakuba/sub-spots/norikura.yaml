tier_rationale:
  en: |
    Hakuba Norikura Onsen resort's adjacent backcountry — small
    quiet resort with a low-density BC gate that gives access to
    tree-skiing zones on the lower flanks of Norikura-dake. Lower-
    altitude touring (1500-1900 m) with shorter routes, more
    forgiving avalanche character than the higher Tsugaike / Happo
    zones. The Hakuba cluster's intermediate-friendly BC option.

