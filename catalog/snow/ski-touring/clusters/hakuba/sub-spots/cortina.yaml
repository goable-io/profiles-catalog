tier_rationale:
  en: |
    Hakuba Cortina resort + its adjacent Norikura side-country zone.
    Cortina is the northernmost Hakuba resort and consistently
    records the deepest snow (130-150 m annual peak depths in the
    typical season). Backcountry touring zones via the resort
    gates lead to open tree skiing + Norikura-side approaches.
    Same HAN-coordinated avalanche risk profile as Tsugaike.

