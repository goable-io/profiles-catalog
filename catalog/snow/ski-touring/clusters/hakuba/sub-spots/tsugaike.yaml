tier_rationale:
  en: |
    Tsugaike Kogen resort's backcountry zone — accessed via a
    formal HAN-coordinated sign-out gate at the top of the resort
    lift system. Touring routes climb to the Tsugaike Norikura
    + Otenjo summits (2100-2300 m). Mixed open bowls + treeline
    descents. Avalanche risk is the dominant hazard, especially
    on lee bowls below the ridge after lake-effect storms.
    Reserved for advanced backcountry skiers with HAN-checked
    avalanche kit.

