gates:
  - metric: visibility_km
    condition: lt
    value: 0.4
    reason_code: JAPOW_WHITEOUT
    description: Visibility below 400m during a lake-effect dump makes Hakuba terrain selection unsafe; storms drop visibility to <50m for hours.

  - metric: wind_speed_kn
    condition: gt
    value: 42
    reason_code: HIGH_WIND_RIDGE
    description: Sustained wind above 42 knots on the Northern Alps ridges accelerates wind-slab formation on the leeward bowls.

  - metric: apparent_temp_c
    condition: lt
    value: -28
    reason_code: EXTREME_COLD
    description: Apparent temperature below -28°C is rare in Hakuba but does occur during continental cold-air outbreaks; same kit-failure risks as Alpine.

  - metric: precipitation_mm_h
    condition: gt
    value: 15
    reason_code: LAKE_EFFECT_DUMP
    description: Lake-effect snowfall above 15 mm/h water equivalent loads slopes acutely; HAN bulletin gates touring during these storms.

sustainability:
  carbon_neutral: true
  equipment_dependency: high
  typical_season_weeks: 12
  carrying_capacity_sensitivity: high
  notes: |
    Hakuba peak January-February tourist season is dominated by
    international skiers (Australian + Singaporean visitor base
    historically + growing North American + European presence
    post-2020). International-flight transport drives the per-trip
    carbon footprint. Backcountry-access gates at each resort are
    HAN-coordinated; sign-out + transceiver-check required at most.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "Hakuba Avalanche Network (HAN) bulletin standards"
    - "Hakuba Mountain Guide Association (HMGA) resort backcountry inventory"
    - "Iwasaka & Hyodo 2017, Sea of Japan effect snowfall climatology"
  notes: |
    Cluster aggregates 4 resort-adjacent backcountry zones in the
    Hakuba valley. Region tag: sea-of-japan. Inherits the lake-
    effect-snow-favoring curves of the ski-touring-sea-of-japan
    region variant. v1.1.0: snow_surface_quality (0.25) and swe_mm
    (0.10) added, atmospheric weights rescaled by 0.65 to preserve
    their relative split.
