display_name:
  en: Ski Touring — Hakuba
  it: Sci alpinismo — Hakuba
  es: Esquí de travesía — Hakuba
  fr: Ski de randonnée — Hakuba
  de: Skitourengehen — Hakuba
description:
  en: |
    Hakuba (Nagano, Japanese Northern Alps) is Japan's flagship
    ski-touring destination, sitting in the western lake-effect
    snowfall belt that delivers 10-15 m annual snowfall to its
    peaks. Five resorts (Happo-One, Hakuba 47, Goryu, Iwatake,
    Tsugaike, Cortina) cluster along a 15 km valley, with backcountry
    touring zones accessed from each. Peak season January-March
    (deepest powder window). Avalanche risk consult Hakuba
    Avalanche Network (HAN) bulletin daily.

