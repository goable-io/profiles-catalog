tier_rationale:
  en: |
    Mont Gelé (3023 m) is the steep-skiing-end of the Verbier
    cluster. Accessed by an old tram (recently restored to access-
    only operation). Multiple steep north and east faces (40-50°)
    with rock-band exposure. Lift-tram has been historically used
    only by the local advanced community and FWT competitors.
    Reserved for experienced steep skiers; not a touring beginner
    venue.

