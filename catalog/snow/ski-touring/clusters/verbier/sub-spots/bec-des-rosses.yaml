tier_rationale:
  en: |
    The Bec des Rosses (3222 m) is the spire above the Mont Fort
    valley, home to the FWT Verbier Xtreme finale. North face
    50-55° steep, exposed couloirs separating rock spines, mandatory
    boot-pack ascent of 45 min from the Mont Fort tram. Reserved
    exclusively for advanced steep skiers and FWT competitors. Most
    sessions involve a guide and a multi-pitch rappel for the
    upper section.

