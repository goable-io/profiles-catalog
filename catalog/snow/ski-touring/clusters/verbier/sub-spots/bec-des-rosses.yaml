description:
  en: |
    The Freeride World Tour finale venue. Bec des Rosses is one of
    the most photographed lines in extreme skiing — a 600-m boot-pack
    + 700-m descent over 50° couloirs and rock-spine separation.
    Reserved for the FWT-level elite and visiting steep specialists.

