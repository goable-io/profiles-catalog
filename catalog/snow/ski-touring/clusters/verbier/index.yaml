description:
  en: |
    Verbier (Valais, Swiss Alps) is one of the founding venues of
    competitive freeride and a flagship alpine ski-touring base in
    the Western Alps. The Quatre Vallées lift system delivers 200+ m
    of vertical to the high-alpine zones where the classic touring
    runs start: Mont Fort (3328 m) with FWT venue Bec des Rosses,
    Mont Gelé (3023 m), Tortin (the iconic off-piste descent). Peak
    season January-April; spring corn snow window April-May. Avalanche
    risk consult: Swiss SLF avalanche bulletin (Valais West region).

