gates:
  - metric: visibility_km
    condition: lt
    value: 0.4
    reason_code: ALPINE_WHITEOUT
    description: Visibility below 400m in Verbier alpine touring terrain makes route-finding and slope-judgment unsafe.

  - metric: wind_speed_kn
    condition: gt
    value: 42
    reason_code: HIGH_WIND_RIDGE
    description: Sustained wind above 42 knots on the Mont Fort / Bec des Rosses ridges accelerates wind-slab formation.

  - metric: apparent_temp_c
    condition: lt
    value: -28
    reason_code: EXTREME_COLD_ALPINE
    description: Below -28°C creates immediate frostbite risk; equipment failure rates rise.

  - metric: precipitation_mm_h
    condition: gt
    value: 8
    reason_code: HEAVY_SNOWFALL_AVALANCHE_LOADING
    description: Heavy active snowfall loads slopes acutely; consult SLF Valais West bulletin before any descent.

sustainability:
  carbon_neutral: false
  equipment_dependency: high
  typical_season_weeks: 18
  carrying_capacity_sensitivity: medium
  notes: |
    Verbier touring depends on lift-assist from the Quatre Vallées
    network (electric — Swiss grid mix, partly hydro-renewable).
    Bec des Rosses + Mont Fort hosts the FWT World Tour finale
    annually, which concentrates international visitors into a
    1-week window with significant event-related logistical footprint.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "Freeride World Tour Verbier venue dossier (annual finale)"
    - "Swiss Mountain Guides Association (SBV) Verbier touring guide"
    - "SLF Valais West avalanche bulletin standards"
  notes: |
    Cluster aggregates 4 sub-zones on the Verbier mountain — all
    accessed from the Mont Fort cable car or the Tortin chairlift.
    Region tag: alpine. v1.1.0: snow_surface_quality (0.25) and
    swe_mm (0.10) added, atmospheric weights rescaled by 0.65 to
    preserve their relative split.
