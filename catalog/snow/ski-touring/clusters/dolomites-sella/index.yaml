description:
  en: |
    The Sella + Alta Badia Dolomites cluster covers the Sella
    Ronda lift-circuit area + adjacent classic descents (Marmolada
    north face, Lagazuoi, Tofane). Distinct from Western Alps ski
    touring: lower-altitude peaks (2500-3300 m), drier southern-
    Alpine snowpack, dramatic vertical-walled rock scenery, mature
    lift infrastructure that supports the famous Sella Ronda
    one-day touring traverse. Avalanche risk consult: Meteomont
    AINEVA bulletin for Dolomiti province.

