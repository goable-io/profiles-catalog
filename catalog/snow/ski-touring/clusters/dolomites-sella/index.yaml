gates:
  - metric: visibility_km
    condition: lt
    value: 0.4
    reason_code: DOLOMITES_WHITEOUT
    description: Visibility below 400m in Dolomiti touring terrain makes route-finding through the iconic vertical-rock landscape unsafe.

  - metric: wind_speed_kn
    condition: gt
    value: 42
    reason_code: HIGH_WIND_DOLOMITES_RIDGE
    description: Sustained wind above 42 knots on Dolomiti ridges (especially Marmolada and Tofane summits) accelerates wind-slab formation on the leeward bowls.

  - metric: apparent_temp_c
    condition: lt
    value: -25
    reason_code: COLD_DOLOMITES
    description: Apparent temperature below -25°C is rare in the southern Alps but does occur during continental cold-air outbreaks.

  - metric: precipitation_mm_h
    condition: gt
    value: 8
    reason_code: HEAVY_SNOWFALL_AVALANCHE_LOADING
    description: Heavy active snowfall loads slopes acutely; consult Meteomont AINEVA Dolomiti bulletin.

sustainability:
  carbon_neutral: false
  equipment_dependency: high
  typical_season_weeks: 18
  carrying_capacity_sensitivity: high
  notes: |
    Dolomiti cluster heavily lift-dependent (Sella Ronda is a lift-
    circuit by design). Italian grid mix powers the lifts. UNESCO
    World Heritage status across most of the cluster's terrain
    drives strict no-helicopter / no-off-road rules. Marmolada
    glacier is in documented retreat; touring routes change
    year-to-year.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "Club Alpino Italiano (CAI) Dolomiti ski-touring guidebook (Cordoba, 2018)"
    - "Meteomont AINEVA Dolomiti bulletin standards"
    - "UNESCO Dolomiti World Heritage management plan"
  notes: |
    Cluster aggregates Sella Ronda (the lift-circuit traverse),
    Marmolada north face (classic glaciated descent), Lagazuoi
    (Cinque Torri-area touring), Tofane BC. All within 30 km of
    each other in the Belluno + Bolzano provincial border. Region
    tag: alpine.
