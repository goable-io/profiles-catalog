tier_rationale:
  en: |
    Marmolada (3343 m) is the highest peak in the Dolomites and
    home to one of the most committing north-face descents in the
    Italian Alps. The north face drops 1200 m at sustained 40-50°
    angles over the Marmolada glacier (in active retreat). Glacier
    travel kit + ice-axe + crampons mandatory; rock-fall hazard
    documented during warmer-spring windows. Reserved for advanced
    ski-tourers with full alpine kit; the 2022 Marmolada serac
    collapse fatalities are a recent reminder of the glacier's
    instability.

