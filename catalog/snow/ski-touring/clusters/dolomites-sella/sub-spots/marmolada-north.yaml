description:
  en: |
    The big-descent reference of the Dolomites. Marmolada's north
    face delivers 1200 m of glaciated steep skiing in dramatic
    Dolomiti rock-spire scenery. Best March-April after spring
    snowpack stabilises; the glacier-collapse history makes
    timing-with-temperature critical.

