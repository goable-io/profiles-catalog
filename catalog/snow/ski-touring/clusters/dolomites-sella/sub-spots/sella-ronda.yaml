tier_rationale:
  en: |
    The Sella Ronda alpine-touring variant of the famous lift-
    circuit. Mostly lift-served piste with off-piste touring add-ons
    at each col (Pordoi, Sella, Gardena, Campolongo). Standard day
    is 6-8 hours covering 25 km of the Sella massif circumference.
    No glaciated terrain on the standard route, avalanche-managed
    by lift-service infrastructure. The most beginner-friendly
    "epic-touring-day" in the Dolomiti — a forgiving introduction
    to multi-pass alpine touring.

