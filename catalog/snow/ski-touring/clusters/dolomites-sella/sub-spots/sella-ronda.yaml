description:
  en: |
    The lift-circuit-meets-touring classic. Sella Ronda traverses
    the Sella massif via 4 mountain passes with optional touring
    skin-ups at each col. Best for intermediate-and-above touring
    groups wanting an "epic-feeling" day with manageable consequence.

