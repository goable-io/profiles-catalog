tier_rationale:
  en: |
    Lagazuoi (2778 m) sits above the Passo Falzarego, accessed by
    cable car from the pass. Touring routes from the summit
    descend the Armentarola long-piste-and-off-piste run (one of
    the most-skied off-piste runs in Italy, 8 km vertical drop).
    Non-glaciated terrain, exposure to standard alpine avalanche
    risk on the open bowls below the summit, returnable to lift
    service at the base. WWI museum on the summit ridge gives the
    area its tourist-and-historic character.

