description:
  en: |
    The Cortina-side touring reference. Tofane delivers technical
    1000+ m descents in the Dolomiti's most photogenic scenery.
    Hosts the FIS Audi Ski World Cup women's downhill at Olympia
    delle Tofane piste, giving the area its World-Cup-skiing
    profile.

