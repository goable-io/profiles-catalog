tier_rationale:
  en: |
    The Tofane massif (Tofana di Mezzo 3244 m) above Cortina
    d'Ampezzo is the touring base for several classic 1000+ m
    descents — Cinque Torri area, Tofana North-East face, Bus
    de Tofana couloir. Mixed glaciated + non-glaciated terrain
    depending on the line. Cortina lift system gives access from
    the valley. Avalanche risk consult Meteomont AINEVA Dolomiti
    daily. Reserved for advanced ski-tourers — the Tofana classics
    are technical descents.

