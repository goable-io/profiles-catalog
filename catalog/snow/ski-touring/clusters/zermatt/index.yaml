description:
  en: |
    Zermatt (Valais, Swiss Alps) sits at the foot of the Matterhorn
    and provides European ski-touring's highest lift-served start
    point — Klein Matterhorn at 3883 m. The Theodul Glacier and
    Stockhorn-Gornergrat zones offer glacier-touring classics with
    summit lines on 4000-m peaks. Avalanche risk consult: SLF Valais
    East bulletin. Peak season December-April; high-altitude lift
    service runs year-round.

