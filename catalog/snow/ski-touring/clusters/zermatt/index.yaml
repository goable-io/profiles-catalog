gates:
  - metric: visibility_km
    condition: lt
    value: 0.4
    reason_code: ALPINE_WHITEOUT
    description: Visibility below 400m on Zermatt's high-altitude touring terrain makes glacier travel unsafe.

  - metric: wind_speed_kn
    condition: gt
    value: 38
    reason_code: HIGH_WIND_HIGH_ALTITUDE
    description: Sustained wind above 38 knots at 3500+ m makes ridge / col crossings unsafe and accelerates wind-slab formation.

  - metric: apparent_temp_c
    condition: lt
    value: -30
    reason_code: EXTREME_COLD_HIGH_ALTITUDE
    description: Apparent temperature below -30°C is common at 4000 m peaks in winter — equipment-failure rates rise sharply.

  - metric: precipitation_mm_h
    condition: gt
    value: 8
    reason_code: HEAVY_SNOWFALL_AVALANCHE_LOADING
    description: Heavy active snowfall loads slopes acutely; consult SLF Valais East bulletin.

sustainability:
  carbon_neutral: false
  equipment_dependency: high
  typical_season_weeks: 30
  carrying_capacity_sensitivity: medium
  notes: |
    Zermatt is famously car-free; access via the Tasch-Zermatt train
    or electric taxi. Lift-system electricity from Swiss grid mix
    (significant hydro). Klein Matterhorn lift (the highest cable
    car in Europe) is a year-round operational expenditure.
    Matterhorn pyramid is a UNESCO World Heritage natural site.

