tier_rationale:
  en: |
    The Schwarzsee zone (2583 m base) offers ski-touring approaches
    to the Matterhorn massif's east face without committing to
    glaciated terrain. Lift-assisted start from Furi → Schwarzsee
    chairlift; touring routes from there to Hornli Hut + back.
    Open above-tree-line slopes 30-40°, no crevasse exposure,
    avalanche-managed by standard SLF observations. The cluster's
    intermediate-friendly touring option.

display_name:
  en: Ski Touring — Schwarzsee (Matterhorn east)
  it: Sci alpinismo — Schwarzsee
  es: Esquí de travesía — Schwarzsee
  fr: Ski de randonnée — Schwarzsee
  de: Skitourengehen — Schwarzsee

description:
  en: |
    The Matterhorn east-side touring base. Schwarzsee delivers open
    above-tree-line slopes with the most-photographed mountain on
    Earth as the backdrop. Best for intermediate touring days when
    full glaciated terrain is too committing.

