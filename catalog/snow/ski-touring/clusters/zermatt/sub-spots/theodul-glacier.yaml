tier_rationale:
  en: |
    The Theodul Glacier covers the broad plateau between the Swiss
    and Italian sides of the Matterhorn massif, 3000-3500 m
    elevation. Glacier touring with crevassed sections — full
    glacier kit (rope, harness, crevasse rescue) required. Multiple
    summit lines accessed from the plateau: Theodulhorn, Klein
    Matterhorn (lift-assisted), Castor + Pollux (long days). Standard
    summit days are 6-9 hours with experienced guides.

