tier_rationale:
  en: |
    Stockhorn (3405 m) and the adjacent Findelgletscher zone,
    accessed via the Gornergrat railway + Stockhorn cable car.
    North-facing high-altitude bowls with serac-fall hazard on the
    upper Findel glacier sections, exposure to crevassed terrain.
    Classic descent: Stockhorn summit to Findeln (1500 m vertical).
    Best for advanced ski-tourers with glacier travel experience.

