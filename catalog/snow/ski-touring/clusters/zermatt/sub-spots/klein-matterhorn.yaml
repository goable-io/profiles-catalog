description:
  en: |
    The lift-served gateway to the easiest 4000-m summit in the Alps
    (Breithorn). Klein Matterhorn delivers altitude-and-glacier
    experience in a single half-day with full lift support.
    Standard touring intro for clients new to altitude skiing.

