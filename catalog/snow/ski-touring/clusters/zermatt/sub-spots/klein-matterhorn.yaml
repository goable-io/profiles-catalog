tier_rationale:
  en: |
    Klein Matterhorn (3883 m) — Europe's highest lift terminal —
    gives instant access to high-altitude ski-touring summit days.
    Breithorn (4164 m) via short skin from the lift is the most-
    accessible 4000-m summit on the planet. Glacier travel required,
    altitude-onset risk (no acclimatisation possible from lift),
    cold gate at -30°C is the routine winter operating band.
    Despite the lift access, the terrain is committing — guided
    parties dominate the lineup.

