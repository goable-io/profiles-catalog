  fr: Ski de randonnée — Alpes de Lyngen
  de: Skitourengehen — Lyngen-Alpen
description:
  en: |
    The Lyngen Alps (Troms, northern Norway, 69°N) are the
    European reference for "ski-the-line-from-sea-to-summit" arctic
    touring. Peaks 1200-1800 m rise directly from the Lyngenfjord
    fjord, giving 1500+ m vertical descents that end at the shore.
    Boat-supported access from Tromsø, with mid-March to mid-May
    as the standard season (light return + spring snowpack
    stabilisation). Avalanche risk consult Snøskredvarsel daily.
    Reindeer-husbandry zones across most valleys — operators
    coordinate with Sápmi pastoral districts.

