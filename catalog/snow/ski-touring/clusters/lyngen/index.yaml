gates:
  - metric: visibility_km
    condition: lt
    value: 0.4
    reason_code: ARCTIC_WHITEOUT
    description: Visibility below 400m in Lyngen terrain — common during incoming Atlantic fronts — makes route-finding unsafe.

  - metric: wind_speed_kn
    condition: gt
    value: 38
    reason_code: HIGH_WIND_LYNGEN_RIDGE
    description: Sustained wind above 38 knots on Lyngen ridges accelerates wind-slab formation; Atlantic-front passages routinely exceed this.

  - metric: apparent_temp_c
    condition: lt
    value: -32
    reason_code: EXTREME_COLD_ARCTIC
    description: Apparent temperature below -32°C creates immediate frostbite risk; standard arctic touring kit is rated to this band.

  - metric: precipitation_mm_h
    condition: gt
    value: 8
    reason_code: HEAVY_SNOWFALL_AVALANCHE_LOADING
    description: Heavy active snowfall loads slopes acutely; consult Snøskredvarsel Lyngenfjorden bulletin.

sustainability:
  carbon_neutral: true
  equipment_dependency: high
  typical_season_weeks: 10
  carrying_capacity_sensitivity: low
  notes: |
    Lyngen touring is boat-supported (small marine-diesel vessels;
    growing electric-boat alternatives operate from Tromsø).
    Reindeer-husbandry-zone seasonal restrictions apply to most
    valleys — operators coordinate with Lyngen + Karesuvanto Sámi
    pastoral districts. International-flight access (Tromsø Airport)
    dominates per-trip carbon footprint.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "Norwegian Ski Touring Federation (NOTF) Lyngen region documentation"
    - "Snøskredvarsel Lyngenfjorden bulletin standards"
    - "Lyngen Alpine Guides (lokal-tilbyder consortium) operational documentation"
    - "Hagen et al. 2018, snow climatology of the Lyngen Alps"
  notes: |
    Cluster aggregates 4 iconic Lyngen Alps summits — all accessed
    by boat from Tromsø or by road to Lyseidet / Furuflaten /
    Storfjorden trailheads. Region tag: arctic. Sun-weight
    reflects the light-window scheduling constraint of arctic
    touring. v1.1.0: snow_surface_quality (0.25) and swe_mm (0.10)
    added, atmospheric weights rescaled by 0.65 to preserve their
    relative split.
