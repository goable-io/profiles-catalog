tier_rationale:
  en: |
    Lakselvtinden (1100 m) is the southern-Lyngen alternative — a
    rounded summit with open north and east faces 30-40°. Non-
    glaciated, established route from Furuflaten trailhead, 4-5
    hours to the summit. Less iconic than Ullstinden but lower
    crowd density and a friendlier descent angle. Boat or road
    return depending on the chosen exit.

