tier_rationale:
  en: |
    Ullstinden (1175 m) is one of the most-photographed Lyngen
    peaks — direct sea-to-summit-to-sea descent off the western
    side. Open above-treeline slopes 30-40°, no glacier crossing
    on the standard route. Standard ascent: 4-5 hours from Lyseidet
    trailhead. Standard descent: 1100 m vertical to the fjord with
    boat pickup at the shore. The cluster's poster route — most-
    photographed Lyngen line and the standard first-day for visiting
    parties.

