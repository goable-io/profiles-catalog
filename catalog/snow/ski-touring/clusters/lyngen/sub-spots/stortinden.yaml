tier_rationale:
  en: |
    Stortinden (1538 m) is the highest peak in the central Lyngen
    Alps. Glaciated upper section (small remnant glacier in the
    summit bowl), 1400 m vertical descent to the Lyngenfjord
    shore. Slope angles 35-45° on the standard north-east face
    descent, exposed cornice on the summit ridge. Glacier travel
    kit required. Reserved for advanced ski-tourers with full
    arctic + alpine kit.

