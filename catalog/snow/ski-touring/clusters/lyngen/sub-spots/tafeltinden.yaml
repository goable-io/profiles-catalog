tier_rationale:
  en: |
    Tafeltinden (1395 m) is the northernmost Lyngen Alps summit
    in the standard tour-guide rotation. North-facing 40-45° bowls
    with cornice + wind-loaded slab exposure on the summit ridge.
    Boat-only access from Tromsø (no road approach). Glacier kit
    required for the upper section (small permanent snowfield with
    occasional crevasses). Reserved for advanced parties booking
    multi-day Lyngen tours.

