slug: ski-touring-sea-of-japan
spot_kind: region
version: "1.0.0"
category: snow
extends: ski-touring
region: sea-of-japan
display_name:
  en: Ski Touring — Sea of Japan (Japow)
  it: Sci alpinismo — Mare del Giappone
  es: Esquí de travesía — Mar del Japón
  fr: Ski de randonnée — Mer du Japon
  de: Skitourengehen — Japanisches Meer
description:
  en: |
    Sea-of-Japan ski touring covers the Japanese mountain ranges that
    receive the Asian winter monsoon's lake-effect snowfall — Hakuba
    (Northern Alps), Niseko (Hokkaido), Myoko, Nozawa Onsen. The
    defining feature is snow VOLUME: cold-air mass from Siberia picks
    up moisture crossing the Sea of Japan and dumps 10-20 m annual
    snowfall on the western mountain spine. Avalanche risk varies
    sharply with bulletin region — consult Hakuba Avalanche Network
    (HAN) and JAN (Japan Avalanche Network) bulletins. Distinct from
    alpine: lower-elevation peaks (1500-3000 m), warmer base
    temperatures (-5 to +2°C typical), wetter snow than continental
    Europe, lake-effect storms that can drop 1 m in a single day.

