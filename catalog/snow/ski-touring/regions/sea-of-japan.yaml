gates:
  - metric: visibility_km
    condition: lt
    value: 0.4
    reason_code: JAPOW_WHITEOUT
    description: Visibility below 400m during a lake-effect dump makes terrain selection unsafe; the storms can drop visibility to 50m for hours.

  - metric: wind_speed_kn
    condition: gt
    value: 42
    reason_code: HIGH_WIND_RIDGE
    description: Sustained wind above 42 knots on Japanese ridge altitudes makes col crossings dangerous; the wind-loaded slab character of the basin is documented.

  - metric: apparent_temp_c
    condition: lt
    value: -28
    reason_code: EXTREME_COLD
    description: Apparent temperature below -28°C is rare in the Sea-of-Japan band but does occur during continental cold-air outbreaks — same gear-failure risks as Alpine.

  - metric: precipitation_mm_h
    condition: gt
    value: 15
    reason_code: LAKE_EFFECT_DUMP
    description: Lake-effect snowfall above 15 mm/h water equivalent loads slopes acutely; HAN/JAN bulletins gate touring during these storms.

sustainability:
  carbon_neutral: true
  equipment_dependency: high
  typical_season_weeks: 14
  carrying_capacity_sensitivity: low
  notes: |
    Sea-of-Japan touring season runs roughly January-March. Most peaks
    are accessed via lift-assist from the resort base (Tsugaike,
    Hakuba 47, Niseko) and a short skin to the backcountry zone.
    International-flight transport drives the bulk of per-trip
    footprint for European/Australian/American visitors.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "Hakuba Avalanche Network (HAN) bulletin standards"
    - "Japan Avalanche Network (JAN) Hokkaido + Honshu bulletin coordination"
    - "Iwasaka & Hyodo 2017, Sea of Japan effect snowfall climatology"
  notes: |
    Regional overrides vs global ski-touring: precipitation peak shifted
    to 0.5 mm/h (lake-effect storms are the defining condition — dry
    bluebird is the recovery day, not the operating condition);
    precipitation gate raised to 15 mm/h (the basin's signature events
    routinely exceed Alpine norms); wind upper threshold 42 kn matches
    Alpine; temperature optimum shifted slightly warmer (-3°C) due to
    lower peak altitudes (1500-3000 m vs Alpine 2500-4000 m); sun
    weight 0.22 because the visibility constraint is high during
    storm sequences.
