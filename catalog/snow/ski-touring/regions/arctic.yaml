slug: ski-touring-arctic
spot_kind: region
version: "1.0.0"
category: snow
extends: ski-touring
region: arctic
display_name:
  en: Ski Touring — Arctic
  it: Sci alpinismo — Artico
  es: Esquí de travesía — Ártico
  fr: Ski de randonnée — Arctique
  de: Skitourengehen — Arktis
description:
  en: |
    Arctic ski touring covers the high-latitude ranges — Lyngen Alps,
    Lofoten, Tromsø, Senja, Svalbard, Iceland highlands — in the
    January-May window. The defining safety variable is avalanche risk
    (same as Alpine), MUST consult the national bulletin: Snøskredvarsel
    (varsom.no) for Norway, Veðurstofa Íslands for Iceland.
    Distinct from alpine: most lines start from sea level (peaks
    600-1400 m typical, no glacier travel required) but the polar-night
    twilight band, persistent wind-loaded snow surface, and rapid
    weather windows compress the operational schedule into 3-6 hours
    around the daily light maximum.

dimensions:
  - name: temperature
    metric: apparent_temp_c
    weight: 0.18
    curve:
      - { x: -35, s: 0.00 }
      - { x: -22, s: 0.40 }
      - { x: -12, s: 0.85 }
      - { x: -5,  s: 1.00 }
      - { x: 0,   s: 0.85 }
      - { x: 5,   s: 0.30 }
      - { x: 10,  s: 0.00 }

  - name: wind_speed
    metric: wind_speed_kn
    weight: 0.22
    curve:
      - { x: 0,  s: 1.00 }
      - { x: 8,  s: 0.95 }
      - { x: 16, s: 0.55 }
      - { x: 25, s: 0.20 }
      - { x: 35, s: 0.00 }

  - name: precipitation
    metric: precipitation_mm_h
    weight: 0.15
    curve:
      - { x: 0,   s: 1.00 }
      - { x: 0.5, s: 0.85 }
      - { x: 2,   s: 0.45 }
      - { x: 4,   s: 0.15 }
      - { x: 8,   s: 0.00 }

  - name: visibility
    metric: visibility_km
    weight: 0.20
    curve:
      - { x: 0,  s: 0.00 }
      - { x: 1,  s: 0.20 }
      - { x: 3,  s: 0.65 }
      - { x: 8,  s: 0.95 }
      - { x: 15, s: 1.00 }

  - name: sun
    metric: sun_altitude_deg
    weight: 0.25
    curve:
      - { x: -6, s: 0.00 }
      - { x: 0,  s: 0.40 }
      - { x: 5,  s: 0.75 }
      - { x: 12, s: 0.95 }
      - { x: 20, s: 1.00 }

gates:
  - metric: visibility_km
    condition: lt
    value: 0.4
    reason_code: ARCTIC_WHITEOUT
    description: Visibility below 400m in arctic ski-touring terrain makes route-finding and slope-judgment unsafe; arctic light at twilight angles compounds the problem.

  - metric: wind_speed_kn
    condition: gt
    value: 38
    reason_code: HIGH_WIND_ARCTIC
    description: Sustained wind above 38 knots at the typical Arctic ridge altitudes makes peak crossings dangerous; wind-loaded slab forms aggressively.

  - metric: apparent_temp_c
    condition: lt
    value: -32
    reason_code: EXTREME_COLD_ARCTIC
    description: Apparent temperature below -32°C creates immediate frostbite risk; standard arctic touring kit (down-fill or synthetic mid-layers) is rated to this band.

  - metric: precipitation_mm_h
    condition: gt
    value: 8
    reason_code: HEAVY_SNOWFALL_AVALANCHE_LOADING
    description: Heavy active snowfall loads slopes acutely; consult Snøskredvarsel (Norway) / Veðurstofa (Iceland) bulletins before any descent.

sustainability:
  carbon_neutral: true
  equipment_dependency: high
  typical_season_weeks: 16
  carrying_capacity_sensitivity: low
  notes: |
    Arctic touring season runs roughly February-May (light return after
    polar night + stable spring snowpack). Boat-supported peaks
    (Lyngen Alps, Senja) add a marine-transport footprint per group.
    Reindeer-husbandry zones in Sápmi (Lyngen, Senja inner valleys)
    have seasonally-restricted access — operators coordinate with
    Sámi pastoral districts.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "Norges Snøskredvarsling (Snøskredvarsel) avalanche bulletin standards (varsom.no)"
    - "Norwegian Ski Touring Federation (NOTF) arctic-region site documentation"
    - "Hagen et al. 2018, snow climatology of the Lyngen Alps"
  notes: |
    Regional overrides vs global ski-touring: wind upper threshold
    tightened to 38 kn (Arctic ridge exposure), sun weight raised to
    0.25 (the polar light window is the operational scheduling
    constraint), temperature curve shifted colder (sweet spot -5°C),
    cold-frostbite gate at -32°C. Lower-altitude peaks (most arctic
    summits 600-1400 m) reduce altitude-driven cold compared to
    Alpine — but the polar latitude offsets that.
