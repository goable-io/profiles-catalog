tier_rationale:
  en: |
    Symphony Amphitheatre is Whistler mountain's iconic in-bounds
    freeride bowl — accessed via the Symphony Express chair. Open
    above-treeline 30-40° bowls with multiple sub-features (Symphony
    Bowl proper, Adit, Saddle, Bagel Bowl variations). Avalanche-
    controlled by ski patrol within ropes, so consequence is
    bounded by patrol-managed terrain. The cluster's most-skied
    freeride zone.

