tier_rationale:
  en: |
    The Spearhead Traverse — a 35-km horseshoe BC tour from
    Blackcomb glacier (back of Blackcomb) to Whistler peak,
    passing the Trorey, Decker, and Spearhead glaciers. Real
    backcountry — out of resort patrol coverage, glaciated terrain
    with crevasse exposure, avalanche-bulletin-dependent. Multi-
    day variant with the new Kees + Claire huts. Reserved for
    BC-competent skiers with glacier kit + ACMG guide for first
    visits.

display_name:
  en: Freeride — Spearhead Range BC (Whistler)
  it: Freeride — Spearhead Range BC
  es: Freeride — Spearhead Range BC
  fr: Freeride — Spearhead Range BC
  de: Freeride — Spearhead Range BC

description:
  en: |
    The Whistler BC corridor. Spearhead Traverse takes the
    Whistler-Blackcomb freerider into real backcountry —
    glaciated, multi-day, hut-supported. The 2019-opened Kees +
    Claire huts give the route its modern operational standard.

