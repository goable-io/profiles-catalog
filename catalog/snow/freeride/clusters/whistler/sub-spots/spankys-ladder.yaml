tier_rationale:
  en: |
    Spanky's Ladder is Blackcomb mountain's signature freeride
    feature — a 15-minute boot-pack hike from the Glacier Express
    chair leading to the Garnet Bowls, Sapphire Bowls, and Diamond
    Bowls (35-45° sustained pitch). Out-of-bounds patrolled
    terrain — avalanche-controlled but with longer access (no
    immediate ski-patrol on the bowls). The cluster's
    advanced freeride reference; routine sessions but consequence-
    elevated vs Symphony.

