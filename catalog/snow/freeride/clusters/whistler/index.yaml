gates:
  - metric: visibility_km
    condition: lt
    value: 0.4
    reason_code: COAST_RANGE_WHITEOUT
    description: Visibility below 400m in Whistler alpine bowls makes terrain-selection unsafe; Coast Range storm cycles drop visibility for hours.

  - metric: wind_speed_kn
    condition: gt
    value: 42
    reason_code: HIGH_WIND_PEAK
    description: Sustained wind above 42 knots on Whistler / Blackcomb summit ridges accelerates wind-slab formation; peak lifts stop at this threshold.

  - metric: apparent_temp_c
    condition: lt
    value: -28
    reason_code: COAST_RANGE_COLD
    description: Apparent temperature below -28°C is rare in the maritime Coast Range but does occur during arctic-outflow events.

  - metric: precipitation_mm_h
    condition: gt
    value: 12
    reason_code: HEAVY_SNOWFALL_AVALANCHE_LOADING
    description: Heavy active snowfall loads slopes acutely; consult Avalanche Canada Sea-to-Sky bulletin.

sustainability:
  carbon_neutral: false
  equipment_dependency: high
  typical_season_weeks: 22
  carrying_capacity_sensitivity: high
  notes: |
    Whistler-Blackcomb peak season (December-March) saturates the
    resort village + lift capacity. BC's hydro-dominant grid mix
    makes lift electricity low-carbon. Garibaldi Provincial Park
    (Spearhead Range BC corridor) restricts off-resort camping
    + ski-mountaineering activity to designated zones.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "Avalanche Canada Sea-to-Sky bulletin standards"
    - "Whistler Blackcomb Mountain Operations freeride-zone documentation"
    - "BC Parks Garibaldi Provincial Park Spearhead Range plan"
  notes: |
    Cluster aggregates 3 freeride zones — in-bounds alpine bowl
    (Symphony), sidecountry classic (Spanky's Ladder), and
    multi-day BC corridor (Spearhead). Region tag: rockies. Cold
    gate at -28°C (vs rockies parent -32°C) reflects the maritime
    Coast Range climate. v1.1.0: snow_surface_quality (0.30) and
    swe_mm (0.15) added, matching the base freeride profile; the five
    atmospheric weights above are scaled by 0.55 to preserve their
    original relative emphasis.
