description:
  en: |
    Whistler-Blackcomb (British Columbia, Coast Range, Canada) is
    North America's largest ski resort by skiable area + the
    Western world's highest-volume freeride destination. Twin
    mountains (Whistler 2182 m + Blackcomb 2284 m) connected by
    the Peak2Peak gondola, with in-bounds patrolled freeride bowls
    + extensive sidecountry + multi-day Spearhead Range backcountry
    traverse. Coast Range maritime climate delivers heavy snowfall
    (10-12 m annual) at slightly warmer temperatures than
    continental Rockies. Avalanche risk consult Avalanche Canada
    (CAA) Sea-to-Sky bulletin daily.

