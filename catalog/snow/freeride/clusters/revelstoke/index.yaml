description:
  en: |
    Revelstoke Mountain Resort (British Columbia, Selkirk Range,
    Canada) opened in 2007 and immediately became one of North
    America's flagship freeride destinations — the longest lift-
    served vertical descent on the continent (1713 m from Mt
    Mackenzie summit to Revelstoke valley base). Inland Selkirk
    Range receives 10-12 m annual snowfall of dry powder. Resort-
    accessible BC + heli-skiing capital of Canada (Selkirk Tangiers,
    Mike Wiegele heli-ski-base are nearby). Avalanche risk consult
    Avalanche Canada Columbia Mountains bulletin daily.

