gates:
  - metric: visibility_km
    condition: lt
    value: 0.4
    reason_code: SELKIRK_WHITEOUT
    description: Visibility below 400m on Revelstoke alpine bowls makes terrain selection unsafe.

  - metric: wind_speed_kn
    condition: gt
    value: 42
    reason_code: HIGH_WIND_PEAK
    description: Sustained wind above 42 knots on Mt Mackenzie summit ridge accelerates wind-slab formation.

  - metric: apparent_temp_c
    condition: lt
    value: -32
    reason_code: SELKIRK_DEEP_COLD
    description: Apparent temperature below -32°C is common in Selkirk arctic-air outbreaks; kit-failure rates rise sharply.

  - metric: precipitation_mm_h
    condition: gt
    value: 12
    reason_code: HEAVY_SNOWFALL_AVALANCHE_LOADING
    description: Heavy active snowfall loads slopes acutely; consult Avalanche Canada Columbia Mountains bulletin.

sustainability:
  carbon_neutral: false
  equipment_dependency: high
  typical_season_weeks: 20
  carrying_capacity_sensitivity: medium
  notes: |
    Revelstoke Mountain Resort is owned + operated by a single
    company (Northland Properties) with limited resort capacity vs
    Whistler — natural visitor cap. BC hydro-grid electricity gives
    lift operations low-carbon character. Heli-ski concession
    operators in the Columbia Mountains (Selkirk Tangiers, Mike
    Wiegele) are major regional employers but operate under
    separate per-day footprint that is excluded from the resort
    freeride profile.

