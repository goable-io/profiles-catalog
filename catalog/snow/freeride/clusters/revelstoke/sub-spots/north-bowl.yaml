tier_rationale:
  en: |
    North Bowl is Revelstoke's east-facing alpine bowl + adjacent
    glades — the resort's "other-half" freeride zone. Accessed
    from the Ripper Chair + traverse. Mixed alpine and treeline
    skiing, 30-40° sustained, in-bounds patrol coverage. Cleaner
    powder than Sub-Peak (less skied) but with longer return
    laps to the lift. The cluster's lower-crowd freeride
    alternative.

