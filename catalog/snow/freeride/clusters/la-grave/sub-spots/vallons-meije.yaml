tier_rationale:
  en: |
    The Vallons de la Meije is the iconic open-glacier face below
    the Girose plateau — 1500 m vertical of 25-40° terrain spanning
    multiple line variants (Chancel, Patou, Y-Couloir descents).
    Glaciated upper sections with crevasse exposure; lower bowls
    open above the Romanche valley. The cluster's "main face" — most
    visiting parties spend their days here once they've graduated
    from lift-line laps. Avalanche-bulletin gated. Mandatory:
    transceiver + glacier kit + IFMGA guide for non-locals.

