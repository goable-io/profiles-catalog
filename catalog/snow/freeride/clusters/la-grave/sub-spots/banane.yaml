tier_rationale:
  en: |
    The Banane couloir is a single wider line east of Trifides —
    40-50° sustained, similar rock-wall enclosure but with a
    slightly more forgiving exit onto the broader Vallons de la
    Meije below. Still no-fall terrain in the upper section; a
    rappel is sometimes used at the entry depending on snow
    coverage. Mid-tier in the La Grave couloir lineup but
    consequence remains tier 3.

