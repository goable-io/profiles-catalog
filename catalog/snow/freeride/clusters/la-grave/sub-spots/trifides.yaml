tier_rationale:
  en: |
    Les Trifides ("the three") is a series of three narrow north-
    east-facing couloirs dropping off the Glacier de la Girose
    plateau. 45-55° sustained pitch, rock walls on both sides,
    mandatory rappel option for the steepest entries. No-fall
    terrain — a tumble bounces off rock down 400 m vertical.
    Reserved for expert steep skiers with IFMGA guide. The
    cluster's signature steep-skiing reference.

