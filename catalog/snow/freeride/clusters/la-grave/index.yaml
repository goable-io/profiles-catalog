description:
  en: |
    La Grave (Hautes-Alpes, French Alps) is the world's most-storied
    uncontrolled-off-piste resort. A single 2300-m vertical lift
    rises from the village (1450 m) to the Glacier de la Girose
    (3550 m); from there, EVERY descent is unmarked, unpatrolled,
    and entirely freeride. Multiple ungroomed line systems —
    Trifides + Banane couloirs, the open Vallons de la Meije, the
    classic Chancel + Y Chute lines. Mandatory: full avalanche kit,
    glacier-travel competence, IFMGA guide for first-timers.
    Avalanche risk consult Météo-France BERA Hautes-Alpes daily.

