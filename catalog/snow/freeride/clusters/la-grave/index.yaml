gates:
  - metric: visibility_km
    condition: lt
    value: 0.4
    reason_code: LA_GRAVE_WHITEOUT
    description: Visibility below 400m on La Grave's uncontrolled terrain makes route-finding through glaciated, crevassed, cliff-banded faces unsafe.

  - metric: wind_speed_kn
    condition: gt
    value: 38
    reason_code: HIGH_WIND_LA_MEIJE_RIDGE
    description: Sustained wind above 38 knots on La Meije's high ridges accelerates wind-slab formation; lift operations stop at this threshold.

  - metric: apparent_temp_c
    condition: lt
    value: -28
    reason_code: EXTREME_COLD
    description: Apparent temperature below -28°C is common at 3500m in La Grave winter — kit-failure rates rise sharply.

  - metric: precipitation_mm_h
    condition: gt
    value: 10
    reason_code: ACTIVE_HEAVY_SNOWFALL
    description: Active heavy snowfall on La Grave's faces loads slopes acutely; consult Météo-France BERA Hautes-Alpes.

sustainability:
  carbon_neutral: false
  equipment_dependency: high
  typical_season_weeks: 16
  carrying_capacity_sensitivity: low
  notes: |
    La Grave's single 2300-m lift is the lowest-throughput major
    freeride lift in the Alps — by design, to preserve the
    uncontrolled-off-piste character. Visitor cap is implicit in
    lift capacity (~1200 skiers/day max). Adjacent Romanche valley
    village + commune actively resists ski-resort-style development.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "Compagnie des Guides La Grave operational guide"
    - "Téléphérique des Glaciers de la Meije operational dossier"
    - "Météo-France BERA Hautes-Alpes bulletin standards"
  notes: |
    Cluster aggregates 3 line systems on La Meije / Girose glacier.
    Region tag: alpine. Cold-gate at -28°C reflects routine 3500-m
    operation. Sun weight 0.18 (vs alpine parent 0.20) because
    La Grave's north-facing main faces are partially insulated
    from late-afternoon sun by Meije summit ridge.
