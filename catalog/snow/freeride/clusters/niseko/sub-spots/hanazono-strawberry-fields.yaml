tier_rationale:
  en: |
    Hanazono Resort sidecountry — the "Strawberry Fields" zone is
    the cluster's tree-skiing reference, accessed from the
    Hanazono Gate at the top of the resort. Tree skiing in dense
    Japanese white birch + maple forest below 1100 m. Lower-angle
    terrain than the Annupuri summit cone (25-35° slopes), forest
    geometry partially compensates for whiteout days. Most-
    photographed Niseko tree-skiing zone — the cluster's
    intermediate-friendly BC option.

