tier_rationale:
  en: |
    Niseko Annupuri Resort sidecountry — the quieter western face
    of the Niseko mountain. Same Annupuri summit cone as Hirafu,
    accessed from a different lift system. Lower crowd density
    than Hirafu, similar avalanche profile. The cluster's
    "real-locals" venue. Mt. Yotei volcano is the iconic backdrop
    from the summit ridge.

