tier_rationale:
  en: |
    Grand Hirafu is the most-visited Niseko resort and its
    sidecountry zone — accessed via Gate 1 and Gate 2 at the top of
    the resort lift system — is Japan's busiest BC area. Above-
    treeline bowls on the Annupuri summit cone (40° slopes), tree-
    skiing in the upper-resort forest below the gates. Avalanche-
    bulletin gated, transceiver-check required at the gates. The
    cluster's mainstage venue.

