description:
  en: |
    Niseko United (Hokkaido, northern Japan) is the global benchmark
    for deep dry powder skiing — Mt. Niseko Annupuri (1308 m)
    receives 14-16 m of annual lake-effect snowfall, almost entirely
    in dry cold conditions. Four interconnected resorts (Grand
    Hirafu, Niseko Village, Annupuri, Hanazono) share a single lift
    pass and access the same mountain via formal sidecountry gates.
    Tree-skiing-dominant (forest line at 1200 m), with above-treeline
    bowls on the summit cone. Avalanche risk consult JAN Hokkaido
    + Niseko Avalanche Center bulletins.

