gates:
  - metric: visibility_km
    condition: lt
    value: 0.4
    reason_code: JAPOW_WHITEOUT
    description: Visibility below 400m during a Niseko storm makes summit-cone terrain selection unsafe; the storms commonly drop visibility to <50m.

  - metric: wind_speed_kn
    condition: gt
    value: 42
    reason_code: HIGH_WIND_RIDGE
    description: Sustained wind above 42 knots on the Annupuri summit ridge accelerates wind-slab formation; lift operations stop at this threshold.

  - metric: apparent_temp_c
    condition: lt
    value: -28
    reason_code: EXTREME_COLD
    description: Apparent temperature below -28°C is rare in Niseko but does occur during continental cold-air outbreaks from Siberia.

  - metric: precipitation_mm_h
    condition: gt
    value: 15
    reason_code: LAKE_EFFECT_DUMP
    description: Lake-effect snowfall above 15 mm/h water equivalent loads slopes acutely; Niseko Avalanche Center gates sidecountry during these events.

sustainability:
  carbon_neutral: false
  equipment_dependency: high
  typical_season_weeks: 16
  carrying_capacity_sensitivity: high
  notes: |
    Niseko's international visitor base (predominantly Australian
    historically + growing Asian + North American + European
    presence) drives high per-trip carbon footprint via long-haul
    flight. The Niseko Rules — community-codified backcountry-access
    rules around the sidecountry gates — are the model that Hakuba
    + other Japanese resorts copied. Forest-protection zones around
    Mt. Yotei volcano (the iconic Niseko backdrop) restrict
    off-resort BC access seasonally.

