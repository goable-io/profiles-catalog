tier_rationale:
  en: |
    Corbet's Couloir is the American in-bounds steep-skiing
    reference — accessed by 3-min walk from the Aerial Tram exit.
    A 3-5 m mandatory cliff drop entry into a 40° couloir,
    landing on a steep apron. The Corbet's Couloir Contest hosted
    annually pushes the line difficulty further. Reserved for
    advanced steep skiers with documented mandatory-cliff
    experience — videoed wipeouts illustrate the consequence
    profile.

