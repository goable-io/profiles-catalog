tier_rationale:
  en: |
    Casper Bowl is the open alpine bowl above the Casper Restaurant,
    accessed from the Bridger Gondola + Sublette chair traverse.
    Multi-feature 35-45° open-bowl freeride with smaller cliff-band
    options. In-bounds patrolled and avalanche-controlled but with
    serious slope-angle character. The cluster's standard "real
    freeride" lap for Jackson regulars (vs Corbet's one-and-done
    nature).

