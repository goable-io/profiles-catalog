tier_rationale:
  en: |
    Granite Canyon is Jackson Hole's south-side BC corridor —
    accessed via the Sublette chair sidecountry gate, then a
    boot-pack to the canyon entrance. The descent drops into
    Grand Teton National Park BC territory — out-of-resort patrol
    coverage, NPS-administered terrain, glaciated upper sections,
    multiple line variants. Mandatory: full BC kit, BTAC bulletin
    check, NPS BC permit on certain routes. Reserved for BC-
    competent skiers; the canyon's annual avalanche-fatality
    record is sobering.

