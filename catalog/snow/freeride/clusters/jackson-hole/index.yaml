gates:
  - metric: visibility_km
    condition: lt
    value: 0.4
    reason_code: TETON_WHITEOUT
    description: Visibility below 400m on Jackson Hole alpine terrain makes route-finding through cliff-banded faces unsafe.

  - metric: wind_speed_kn
    condition: gt
    value: 42
    reason_code: HIGH_WIND_RENDEZVOUS
    description: Sustained wind above 42 knots on Rendezvous Mountain accelerates wind-slab formation; the tram stops at this threshold.

  - metric: apparent_temp_c
    condition: lt
    value: -32
    reason_code: TETON_DEEP_COLD
    description: Apparent temperature below -32°C is common in Wyoming arctic-outflow events; tram operations sometimes restrict.

  - metric: precipitation_mm_h
    condition: gt
    value: 12
    reason_code: HEAVY_SNOWFALL_AVALANCHE_LOADING
    description: Heavy active snowfall loads slopes acutely; consult BTAC daily.

sustainability:
  carbon_neutral: false
  equipment_dependency: high
  typical_season_weeks: 18
  carrying_capacity_sensitivity: high
  notes: |
    Jackson Hole sits in the gateway zone of Grand Teton National
    Park — Granite Canyon BC exits into NPS-managed wilderness.
    Wyoming grid is coal-heavy, giving the resort's lift operations
    higher carbon character than BC counterparts. International-
    flight transport via JAC (Jackson Hole Airport) drives the
    bulk of per-trip carbon for non-local visitors.

verdict_buckets:
