description:
  en: |
    Jackson Hole Mountain Resort (Teton Range, Wyoming) is the
    American freeride benchmark — Rendezvous Mountain (3185 m
    summit) features the tram-served Corbet's Couloir + Casper
    Bowl + Headwall lines, with extensive Granite Canyon BC
    accessible via the resort gates. Continental Teton climate:
    cold dry powder, 10-12 m annual snowfall, frequent arctic-
    outflow days (-25 to -30°C). Avalanche risk consult Bridger-
    Teton Avalanche Center (BTAC) bulletin daily.

