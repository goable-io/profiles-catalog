gates:
  - metric: visibility_km
    condition: lt
    value: 0.4
    reason_code: ALPINE_WHITEOUT
    description: Visibility below 400m in Verbier alpine freeride terrain makes slope-judgment unsafe.

  - metric: wind_speed_kn
    condition: gt
    value: 42
    reason_code: HIGH_WIND_RIDGE
    description: Sustained wind above 42 knots on the Mont Fort + Bec ridges accelerates wind-slab formation downwind.

  - metric: precipitation_mm_h
    condition: gt
    value: 10
    reason_code: ACTIVE_HEAVY_SNOWFALL
    description: Active heavy snowfall during freeride sessions acutely loads slopes; consult SLF Valais West bulletin.

sustainability:
  carbon_neutral: false
  equipment_dependency: high
  typical_season_weeks: 18
  carrying_capacity_sensitivity: high
  notes: |
    Verbier freeride relies on the Quatre Vallées lift system
    (Swiss-grid electricity, partly hydro-renewable). FWT finale
    week concentrates international visitors into a single 7-day
    window with significant event-logistics footprint. The shared
    Mont Fort + Bec geography with the ski-touring-spot-verbier
    cluster means freeride days routinely cross paths with touring
    parties — local etiquette respected.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "Freeride World Tour Verbier Xtreme venue dossier (annual finale)"
