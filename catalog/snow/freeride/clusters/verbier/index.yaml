  notes: |
    Cluster aggregates 3 freeride zones on the Verbier mountain.
    Region tag: alpine. Sister to ski-touring-spot-verbier; some
    sub-spots overlap physically (Mont Fort, Bec des Rosses) but
    have activity-specific tier rationale.
