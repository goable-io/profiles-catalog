slug: freeride-spot-verbier
spot_kind: cluster
version: "1.0.0"
category: snow
extends: freeride-alpine
region: alpine
country_code: CH
sub_spots:
  - freeride-spot-verbier-mont-fort
  - freeride-spot-verbier-tortin
  - freeride-spot-verbier-bec-des-rosses
display_name:
  en: Freeride — Verbier
  it: Freeride — Verbier
  es: Freeride — Verbier
  fr: Freeride — Verbier
  de: Freeride — Verbier
description:
  en: |
    Verbier (Valais, Swiss Alps) is the home of competitive freeride —
    the Freeride World Tour finale on the Bec des Rosses runs here
    every spring. The Quatre Vallées lift system delivers 200+ m of
    vertical to the high-alpine zones with most lift-served freeride
    in the Western Alps. Distinct from the ski-touring cluster at
    the same location: freeride context is lift-anchored, single-day,
    high-throughput rather than touring-day glacier travel. Avalanche
    risk consult SLF Valais West bulletin daily.

