tier_rationale:
  en: |
    The Bec des Rosses (3222 m) is the FWT World Tour finale venue.
    North face 50-55° steep, exposed couloirs separating rock spines,
    mandatory 45-min boot-pack ascent from the Mont Fort tram.
    Reserved exclusively for FWT-level competitors and elite local
    steep skiers. Most sessions involve a guide and a multi-pitch
    rappel for the upper section.

