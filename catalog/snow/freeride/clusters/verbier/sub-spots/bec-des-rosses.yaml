  en: |
    The Freeride World Tour finale arena. Bec des Rosses' 50°+
    couloirs + rock-spine separation make it the FWT's signature
    venue. Documented televised "10/10" runs in recent finals
    illustrate the line difficulty — reserved for that level only.

