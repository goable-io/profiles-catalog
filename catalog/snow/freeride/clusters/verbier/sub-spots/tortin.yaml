tier_rationale:
  en: |
    The classic Tortin north-face descent from Col des Gentianes —
    Verbier's standard off-piste introduction. Open 30-40° slope
    with moderate avalanche character, no glaciated terrain on the
    standard line. Lift return at the base of Tortin chairlift,
    so the consequence of a stuck-in-valley scenario is low. The
    most-skied freeride descent of the cluster — high lap-rate.

