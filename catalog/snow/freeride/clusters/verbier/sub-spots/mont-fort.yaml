tier_rationale:
  en: |
    Mont Fort (3328 m) is Verbier's high-altitude freeride summit.
    Multiple steep north-and-east-facing lines drop 1000+ m vertical
    from the summit lift to the Tortin valley or directly back to
    Verbier. Crevassed glacier sections on the upper bowls, cornice
    exposure on the summit ridge, 35-45° sustained pitch on the
    classic descents. Lift-served start removes the touring-day
    commitment but the descents are committing freeride. Reserved
    for advanced freeriders with avalanche kit + guide on first
    visits.

