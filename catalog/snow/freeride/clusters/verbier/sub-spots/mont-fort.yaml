  en: Freeride — Mont Fort (Verbier)
  it: Freeride — Mont Fort
  es: Freeride — Mont Fort
  fr: Freeride — Mont Fort
  de: Freeride — Mont Fort

description:
  en: |
    The lift-served high-altitude freeride reference of Verbier.
    Mont Fort delivers 1000+ m vertical north-face descents from
    the highest cable car in the Valais West. Glacier travel kit
    recommended on the upper bowls.

