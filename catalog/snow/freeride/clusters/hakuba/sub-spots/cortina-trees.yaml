tier_rationale:
  en: |
    Hakuba Cortina's lift-served "Inner Trees" zone — accessible
    from the resort lifts without crossing a formal BC gate (a
    notable Cortina feature). Tree skiing at 1500-1900 m in dense
    Japanese forest. Lake-effect snow concentration is highest at
    Cortina (it sits at the northern end of the Hakuba valley,
    receiving the maximum lake-effect dump from the Sea of Japan
    direction). Lower avalanche-risk character than open-bowl
    zones. The cluster's deepest-snow venue.

