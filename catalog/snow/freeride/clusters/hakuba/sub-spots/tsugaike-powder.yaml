tier_rationale:
  en: |
    Tsugaike Kogen Resort's "Powder Down" sidecountry zone —
    accessed via the formal HAN-coordinated Gate 1 at the top of
    the resort. Above-treeline open bowls at 1700-2100 m on the
    Tsugaike Norikura summit cone. Higher avalanche-risk
    character than the tree-skiing zones (Sakka, Cortina) because
    of open-bowl wind-slab loading. Reserved for backcountry-
    competent skiers with full kit. Same physical zone as the
    ski-touring-spot-hakuba-tsugaike sub-spot but freeride focus
    is single-lap lift-served vs touring up from the gate.

