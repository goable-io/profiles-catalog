gates:
  - metric: visibility_km
    condition: lt
    value: 0.4
    reason_code: JAPOW_WHITEOUT
    description: Visibility below 400m during Hakuba storm cycles makes terrain selection unsafe.

  - metric: wind_speed_kn
    condition: gt
    value: 42
    reason_code: HIGH_WIND_RIDGE
    description: Sustained wind above 42 knots on the Northern Alps ridges accelerates wind-slab formation on leeward bowls.

  - metric: apparent_temp_c
    condition: lt
    value: -28
    reason_code: EXTREME_COLD
    description: Apparent temperature below -28°C is rare in Hakuba but does occur during continental cold-air outbreaks.

  - metric: precipitation_mm_h
    condition: gt
    value: 15
    reason_code: LAKE_EFFECT_DUMP
    description: Lake-effect snowfall above 15 mm/h water equivalent loads slopes acutely; HAN gates sidecountry during these storms.

sustainability:
  carbon_neutral: false
  equipment_dependency: high
  typical_season_weeks: 14
  carrying_capacity_sensitivity: high
  notes: |
    Sister cluster to ski-touring-spot-hakuba (same physical
    valley + lift system, different mode). Freeride focus is
    quick lift-served laps with sidecountry access; ski-touring
    focus is skin-up tours from the resort gates. Both share the
    same HAN-coordinated avalanche bulletin and the same kit-check
    sidecountry-gate protocol.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "Hakuba Avalanche Network (HAN) bulletin standards"
    - "Hakuba Valley Tourism Bureau resort network documentation"
  notes: |
    Cluster aggregates 3 lift-served sidecountry zones in the
    Hakuba 5-resort network. Region tag: sea-of-japan. Sister
    cluster to ski-touring-spot-hakuba — sub-spots at distinct
    sidecountry features within each resort. v1.1.0: snow_surface_quality
    (0.30) and swe_mm (0.15) added, matching the base freeride profile;
    the five atmospheric weights above are scaled by 0.55 to preserve
    their original relative emphasis.
