slug: freeride-spot-hakuba
spot_kind: cluster
version: "1.1.0"
category: snow
extends: freeride-sea-of-japan
region: sea-of-japan
country_code: JP
sub_spots:
  - freeride-spot-hakuba-happo-sakka
  - freeride-spot-hakuba-cortina-trees
  - freeride-spot-hakuba-tsugaike-powder
display_name:
  en: Freeride — Hakuba (sidecountry)
  it: Freeride — Hakuba (sidecountry)
  es: Freeride — Hakuba (sidecountry)
  fr: Freeride — Hakuba (sidecountry)
  de: Freeride — Hakuba (Sidecountry)
description:
  en: |
    Hakuba (Nagano, Japanese Northern Alps) hosts Japan's largest
    resort-network freeride scene — distinct from the
    ski-touring-spot-hakuba cluster's "out-the-gate-touring-up" mode,
    this cluster focuses on lift-served sidecountry with quick laps
    and high powder turnover. Same lake-effect snowfall regime, same
    HAN-coordinated avalanche bulletins, same Hakuba 5-resort lift
    network (Happo, Hakuba 47, Goryu, Cortina, Tsugaike). Best
    January-February powder cycle window.

