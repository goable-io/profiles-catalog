  notes: |
    Spot overrides vs freeride-alpine baseline: visibility weight raised
    to 0.25 (lift accessibility depends on visibility); wind upper gate
    set to 45kn (matches Aiguille du Midi cable car operational
    threshold); precipitation sweet spot peaks at 0.3 mm/h (just-snowed
    powder windows are best) rather than 0.5; explicit ACUTE_AVALANCHE_
    LOADING gate at 8 mm/h. Operators using this profile MUST cross-
    reference the daily Météo-France BERA bulletin; this profile
    NEVER replaces a professional avalanche bulletin. v0.2.0:
    snow_surface_quality (0.30) and swe_mm (0.15) added, matching the
    base freeride profile; the five atmospheric weights above are
    scaled by 0.55 to preserve their original relative emphasis.
