description:
  en: |
    Chamonix-Mont-Blanc (France) is arguably the world's most iconic
    freeride destination: lift-accessed off-piste from Aiguille du Midi
    (3842m) into the Mer de Glace and the Vallée Blanche, plus sector
    classics at Grands Montets, Brévent-Flégère, and Les Houches. The
    valley sits in the cross-roads of Atlantic moisture (snow-rich
    westerly storms) and Mediterranean influence (occasional warm
    inversions). Conditions favour cold-after-storm windows with high
    pressure following westerly fronts; the most dangerous moments are
    warm-up cycles in February-March when sun-affected slopes shed
    avalanche cycles. The Vallée Blanche descent specifically requires
    glacier-travel competence; this profile is for the resort-accessed
    sectors, not the alpine glacier descents.

  it: |
    Chamonix-Mont-Blanc (Francia) è probabilmente la destinazione
    freeride più iconica al mondo: fuoripista accessibile da impianti
    dall'Aiguille du Midi (3842m) verso la Mer de Glace e la Vallée
    Blanche, più i settori classici di Grands Montets, Brévent-Flégère
    e Les Houches. Il profilo qui descritto è per i settori accessibili
    in resort, non per le discese su ghiacciaio che richiedono
    competenze alpinistiche specifiche.

