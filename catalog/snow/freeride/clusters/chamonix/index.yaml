gates:
  - metric: visibility_km
    condition: lt
    value: 0.4
    reason_code: ALPINE_WHITEOUT
    description: Visibility below 400m on the Chamonix high-altitude lifts (Aiguille du Midi, Grands Montets) makes off-piste route-finding unsafe; lifts may close at this threshold anyway.

  - metric: wind_speed_kn
    condition: gt
    value: 45
    reason_code: HIGH_WIND_CABLES_AND_RIDGE
    description: Sustained wind above 45 knots typically forces Aiguille du Midi cable car closure and creates dangerous loading on Vallée-Blanche-bound itineraries.

  - metric: precipitation_mm_h
    condition: gt
    value: 8
    reason_code: ACUTE_AVALANCHE_LOADING
    description: Heavy active snowfall on Chamonix slopes creates immediate slab-formation cycles; check Météo-France BERA bulletin and consider postponing off-piste descents.

  - metric: apparent_temp_c
    condition: lt
    value: -28
    reason_code: EXTREME_COLD_HIGH_ALPINE
    description: Apparent temperature below -28°C at Aiguille du Midi altitude creates immediate frostbite risk and equipment-failure window.

sustainability:
  carbon_neutral: false
  equipment_dependency: high
  typical_season_weeks: 22
  carrying_capacity_sensitivity: high
  notes: |
    Chamonix freeride is lift-accessed, with lift operations powered by
    a mixed grid (~75% nuclear + hydro in French electricity mix). Cable
    car and gondola fuel/electricity costs distribute to per-skier
    emissions at non-zero levels. Carrying capacity is HIGH-sensitivity:
    iconic itineraries (Vallée Blanche, Pas de Chèvre) see hundreds of
    skiers per day during powder windows, creating measurable snowpack
    impact and increasing skier-triggered avalanche risk in shared
    descent zones. The valley is in scope for upcoming CSRD reporting
    by the Compagnie du Mont-Blanc operator; Goable data could be
    referenced for operational decisions on lift closures during high-
    pressure overuse windows.

