tier_rationale:
  en: |
    The Aiguille du Midi summit zone (3842 m), departure point for the
    most committing Chamonix freeride lines — Cosmiques Couloir, Mallory
    couloirs, Glacier Rond, Y Couloir. Sustained 45-55° slope angle,
    high glaciation with serac fall hazard from the Glacier des Bossons,
    and an extreme altitude effect (significant performance reduction
    on the first run for non-acclimatised skiers). Most lines require
    rope + ice axe + crampons before the ski portion begins. Errors at
    altitude with cliff bands below are typically unrecoverable.

