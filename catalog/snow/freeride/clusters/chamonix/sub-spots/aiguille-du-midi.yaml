description:
  en: |
    The Aiguille du Midi entry-point lines are the Chamonix freeride
    destination for the elite end of the community. Famous testpieces:
    Cosmiques Couloir, Mallory-Porter, Glacier Rond. Pure alpinism
    overlap — most parties rope up for the initial section. IFMGA
    guide essential except for genuinely experienced local freeriders.
    Best in cold spring conditions; summer brings glacier collapse
    and rockfall hazards.

