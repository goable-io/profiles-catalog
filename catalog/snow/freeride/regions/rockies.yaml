gates:
  - metric: visibility_km
    condition: lt
    value: 0.4
    reason_code: ROCKIES_WHITEOUT
    description: Visibility below 400m in Rockies-freeride terrain makes route-finding through above-treeline bowls unsafe.

  - metric: wind_speed_kn
    condition: gt
    value: 42
    reason_code: HIGH_WIND_RIDGE
    description: Sustained wind above 42 knots on Rockies ridges accelerates wind-slab formation; cross-loading on the lee bowls is the classic North-American avalanche-bulletin warning.

  - metric: apparent_temp_c
    condition: lt
    value: -32
    reason_code: ROCKIES_DEEP_COLD
    description: Apparent temperature below -32°C is common during arctic-air mass intrusions in the northern Rockies — kit-failure rates rise sharply.

  - metric: precipitation_mm_h
    condition: gt
    value: 12
    reason_code: HEAVY_SNOWFALL_AVALANCHE_LOADING
    description: Heavy active snowfall loads slopes acutely; consult CAA / UAC / AAIC daily.

sustainability:
  carbon_neutral: false
  equipment_dependency: high
  typical_season_weeks: 20
  carrying_capacity_sensitivity: high
  notes: |
    Rockies freeride resorts are heavy energy consumers (snow-making,
    grooming, lift operations) and the regional grid mix varies
    sharply (BC hydro very low-carbon, Wyoming coal-heavy). Air-
    access from coastal metros + Western flight hubs drives the bulk
    of per-trip carbon. Heli-ski operations in BC interior add a
    significant per-day footprint that is separate from this
    catalog's resort-anchored freeride profile.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "Canadian Avalanche Association (CAA) Avalanche Canada bulletin standards"
    - "American Avalanche Association (AAA) US zonal bulletin coordination"
    - "Utah Avalanche Center (UAC) + Bridger-Teton Avalanche Center bulletin standards"
    - "Mountain Snow Climatology of the Western US (Western Regional Climate Center)"
  notes: |
    Regional overrides vs global freeride: cold gate at -32°C (vs
    alpine -28) reflects routine continental arctic-air mass winters;
    precipitation peak shifted to 0.5 mm/h (powder cycle is the
    expected operating mode); precip-dump gate at 12 mm/h (cycles
    above this load slopes acutely). Tree-skiing weighting tilts
    visibility tolerance slightly more forgiving than open-bowl
    alpine. v1.1.0: snow_surface_quality (0.30) and swe_mm (0.15) added,
    matching the base freeride profile; the five atmospheric weights
    above are scaled by 0.55 to preserve their original relative
    emphasis.
