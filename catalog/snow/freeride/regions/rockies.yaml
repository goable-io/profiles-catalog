slug: freeride-rockies
spot_kind: region
version: "1.1.0"
category: snow
extends: freeride
region: rockies
display_name:
  en: Freeride — North American Rockies
  it: Freeride — Rocciose Nord-Americane
  es: Freeride — Rocosas Norteamericanas
  fr: Freeride — Rocheuses Nord-Américaines
  de: Freeride — Nordamerikanische Rocky Mountains
display_name_short:
  en: Freeride — Rockies
description:
  en: |
    The North American Rocky-Mountain freeride belt spans the Coast
    Range (Whistler-Blackcomb), Selkirks + Monashees (Revelstoke,
    Roger's Pass, Kicking Horse), Wasatch + Tetons (Snowbird,
    Jackson Hole), and continues south to the Sierra Nevada (Squaw,
    Mammoth). Continental dry-snow climate with cold-air drainage
    + storm-cycle pattern — typical 30-60 cm overnight cycles
    January-February. Resort-anchored sidecountry is the standard
    mode in Canada; US resorts have more in-bounds patrolled freeride
    on average (notable: Jackson Hole's tram service to Corbet's).
    Avalanche risk consult CAA (Canada) + AAIC + UAC (US) bulletins
    daily.

