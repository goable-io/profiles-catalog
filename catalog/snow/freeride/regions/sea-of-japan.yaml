gates:
  - metric: visibility_km
    condition: lt
    value: 0.4
    reason_code: JAPOW_WHITEOUT
    description: Visibility below 400m during a lake-effect dump makes terrain selection unsafe in Japow regions — the storms drop visibility to <50m for hours.

  - metric: wind_speed_kn
    condition: gt
    value: 42
    reason_code: HIGH_WIND_RIDGE
    description: Sustained wind above 42 knots on the Japanese ridges accelerates wind-slab formation on leeward freeride bowls.

  - metric: apparent_temp_c
    condition: lt
    value: -28
    reason_code: EXTREME_COLD
    description: Apparent temperature below -28°C is rare in the Sea-of-Japan band but does occur during continental cold-air outbreaks.

  - metric: precipitation_mm_h
    condition: gt
    value: 15
    reason_code: LAKE_EFFECT_DUMP
    description: Lake-effect snowfall above 15 mm/h water equivalent loads slopes acutely; HAN/JAN bulletins gate sidecountry during these storms.

sustainability:
  carbon_neutral: false
  equipment_dependency: high
  typical_season_weeks: 14
  carrying_capacity_sensitivity: high
  notes: |
    Japow freeride operations are lift-resort-anchored — sidecountry
    gates at Niseko + Hakuba resorts are formally HAN-coordinated
    with kit checks. International-flight transport drives the bulk
    of per-trip carbon footprint. Tree-skiing in protected national-
    forest sectors (Niseko) has documented impact on understory
    vegetation; the local Hokkaido Forestry Agency restricts certain
    zones during early-season low-snow windows.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "Hakuba Avalanche Network (HAN) sidecountry bulletin standards"
    - "Japan Avalanche Network (JAN) Hokkaido + Honshu bulletin coordination"
    - "Hokkaido Forestry Agency Niseko forest-protection zone documentation"
  notes: |
    Regional overrides vs global freeride: precipitation peak shifted
    to 0.5 mm/h (lake-effect storms ARE the operating condition;
    dry days are recovery); precip-dump gate at 15 mm/h matches
    ski-touring-sea-of-japan; tree-skiing-friendly visibility
    weighting (0.22 vs alpine 0.20-0.25) because forest depth
    partially compensates for whiteout above-treeline.
