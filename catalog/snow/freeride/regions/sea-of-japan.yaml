display_name:
  en: Freeride — Sea of Japan (Japow)
  it: Freeride — Mare del Giappone
  es: Freeride — Mar del Japón
  fr: Freeride — Mer du Japon
  de: Freeride — Japanisches Meer
description:
  en: |
    Sea-of-Japan freeride covers the lake-effect snowfall belt of the
    Japanese Alps + Hokkaido — Niseko, Hakuba, Myoko, Nozawa Onsen.
    Distinct from alpine freeride: lower elevations (1500-2300 m),
    warmer base temperatures (-5 to +2°C), tree-skiing dominant
    (forest line at 1200-1600 m), 10-15 m annual snowfall delivered
    in repeated 30-100 cm overnight dumps. Avalanche risk consult
    HAN (Hakuba) + JAN bulletins. Resort-adjacent backcountry is
    the standard mode — formal sign-out gates at most resorts.

