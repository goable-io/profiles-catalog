  en: Paragliding — Babadağ 1900
  it: Parapendio — Babadağ 1900
  es: Parapente — Babadağ 1900
  fr: Parapente — Babadağ 1900
  de: Gleitschirmfliegen — Babadağ 1900

description:
  en: |
    Upper Babadağ launch, the "real" pilots' option. Stronger thermals,
    longer flights, exposure to afternoon convective instability.
    Commercial tandem flights operate here only under settled forecasts
    with experienced senior pilots. Cross-country starts (toward Fethiye
    or the inland ridges) typically launch from 1900 for vertical.

