tier_rationale:
  en: |
    The 1900 m launch (Babadağ summit area), used in the afternoon when
    thermals are stronger and pilots want more vertical for cross-
    country attempts toward Fethiye. Conditions can transition rapidly
    from soarable to overdeveloped — afternoon convergence + thermal
    overdevelopment makes turbulence, rotor, and gust spikes more
    frequent than at 1700. Reserved for intermediate-and-above solo
    pilots and experienced tandem teams in stable forecasts. LZ is the
    same Belcekiz beach as 1700, but approach is more committing because
    of higher altitude + later-day instability.

