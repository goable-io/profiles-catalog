description:
  en: |
    The most-flown paragliding launch in Turkey. ~150-300 tandem flights
    per day in peak season. Smooth sea-breeze convergence in the morning,
    growing thermal activity into early afternoon. Pilots departing
    later in the day move to the 1900 launch for stronger conditions.

