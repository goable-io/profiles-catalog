tier_rationale:
  en: |
    The 1700 m launch on Babadağ — the main commercial tandem launch
    used by the majority of Ölüdeniz operators. Sea-breeze convergence
    gives reliable smooth thermal conditions in the May-October peak
    window. Launch ramp + paved access road managed by the Ölüdeniz
    Hava Sporları Komisyonu. Landing zone is the large Belcekiz beach
    with clear approach corridors. Tandem and intermediate solo pilots
    operate routinely; the only consequential failure mode is
    mid-flight deflation in convergence turbulence (very rare in
    morning sea-breeze conditions).

