description:
  en: |
    The Chamonix valley is the high-alpine reference for European
    paragliding — launches between 1300 m (Plan-Praz) and 2500 m
    (Brévent summit) with the Mont Blanc massif on the south side
    and the Aiguilles Rouges on the north. Strong valley-thermal
    cycles in summer (the Bossons glacier creates a katabatic
    rebound against south-bank anabatic) but consistently shorter
    flying days than Annecy (mountain-shadow + earlier valley
    fill-in). Multiple cable-car-served launches reduce ground
    access friction. Site is more committing than Annecy: terrain
    drops are larger, LZ options are narrower, and lee-rotor on the
    Aiguilles is severe. Raptor protection bands apply March-July
    on the Brévent face. Tandem operations operate year-round but
    XC-grade conditions are May-September.

