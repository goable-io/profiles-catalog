gates:
  - metric: wind_speed_kn
    condition: gt
    value: 26
    reason_code: ALPINE_HIGH_WIND
    description: Sustained wind above 26 knots in the Chamonix high-alpine valley creates dangerous turbulence on the Aiguilles lee and Bossons valley return.

  - metric: wind_gust_factor
    condition: gt
    value: 1.8
    reason_code: ALPINE_TURBULENT_AIR
    description: Gust factor above 1.8x in the Chamonix valley signals severe boundary-layer turbulence from glacier-valley katabatic interaction.

  - metric: visibility_km
    condition: lt
    value: 3
    reason_code: ALPINE_LOW_VISIBILITY
    description: Chamonix paragliding requires visibility above 3 km — glacier face and Mont Blanc massif provide unforgiving terrain margin.

  - metric: precipitation_mm_h
    condition: gt
    value: 0.5
    reason_code: ACTIVE_PRECIPITATION
    description: Active precipitation in the Chamonix valley correlates with rapid front passage and downdraft; immediate land-out required.

  - metric: sun_altitude_deg
    condition: lt
    value: 0
    reason_code: NO_DAYLIGHT
    description: Chamonix paragliding requires daylight; cable-car closures dictate practical end-of-day windows.

sustainability:
  carbon_neutral: true
  equipment_dependency: medium
  typical_season_weeks: 26
  carrying_capacity_sensitivity: medium
  notes: |
    Chamonix paragliding is carbon-neutral free-flight per session,
    with cable-car launch access carrying its own infrastructure
    footprint (Brévent + Plan-Praz cabins run year-round). Carrying
    capacity is medium in peak summer (tandem volume + alpine valley
    fills with mountaineering + ski + biking traffic on shared LZs).
    Raptor nesting protections apply on the Brévent face (typically
    Mar-Jul). LZ at Les Bossons is shared with paragliding schools
    and the Aiguille du Midi exit traffic — operator coordination
    required.

