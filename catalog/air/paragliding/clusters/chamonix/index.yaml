  notes: |
    Spot overrides vs paragliding-alpine: same wind sweet-spot (6-10kn)
    and gates as the regional baseline — Chamonix is the alpine
    reference. Season tightened to 26 weeks (May-October XC-grade);
    tandem operations year-round but recreational-grade scoring is
    summer-window. Once L1f's freezing_level_m + rockfall_risk_index
    ship, the morning glacier-katabatic window becomes scoring-grade.
