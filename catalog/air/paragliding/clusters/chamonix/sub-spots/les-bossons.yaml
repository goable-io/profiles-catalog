tier_rationale:
  en: |
    Les Bossons is the principal Chamonix valley LZ — a designated
    grass field at the foot of the Bossons glacier, ~1000 m below
    the Brévent and Plan-Praz launches. Open valley approach
    corridor with wind-sock and a clear final 800 m, FFVL site-
    committee managed and shared with multiple Chamonix paragliding
    schools. LZ-specific failure modes are limited to over-shoot
    into the adjacent road or the Chamonix-Aiguille du Midi cable-
    car corridor on tailwind approaches; tandem operations and
    student traffic land here by default.

