tier_rationale:
  en: |
    Plan-Praz (2000 m) is the intermediate Chamonix launch — first
    stage of the Brévent cable-car, reached from town in ~10 minutes.
    Grass + scree ramp, sustained southerly anabatic in summer,
    short glide to the Les Bossons LZ. The standard tandem and
    intermediate-pilot launch for Chamonix: significantly less
    committing than Brévent (lower altitude, shorter glide-out,
    bail-out options on the south flank) but still high-alpine in
    character. Site management imposes wind-direction restrictions
    in cross-flow above 18 kn due to the Aiguilles-Rouges lee.

