tier_rationale:
  en: |
    Brévent (2525 m) is the upper Chamonix paragliding launch,
    accessed by the Plan-Praz + Brévent cable-car link. South-facing
    ramp directly opposite the Mont Blanc massif gives one of the
    most dramatic alpine vol-bivouac departure points in Europe.
    Wind exposure is severe (no shelter from synoptic flow), thermal
    cycles couple with glacier-induced katabatic on the Bossons side,
    and the 1500+ m vertical descent to the valley LZ leaves no easy
    bail-out options. Site is operated by professional pilots with
    documented mountain-bivouac experience. Solo recreational use
    requires intermediate-plus rating plus site-briefing through
    Chamonix Parapente or equivalent local school.

