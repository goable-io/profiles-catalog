tier_rationale:
  en: |
    The Lumbin / Saint-Pancrasse LZ is the official Saint-Hilaire
    landing field at 215 m in the Grésivaudan valley, ~500 m
    vertical below the launch. Large grass field with open
    approach from the north, FFVL-managed wind-sock infrastructure,
    standard target for every flight. The only operational
    coordination is with the adjacent Grenoble-Le-Versoud light-
    aviation airport — site committee maintains a published
    airspace integration protocol. LZ failure modes are limited to
    student over-shoot into the perimeter road; the field is large
    enough to accommodate concentrated Coupe Icare weekend volume.

