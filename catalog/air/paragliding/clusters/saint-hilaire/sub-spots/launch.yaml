tier_rationale:
  en: |
    The plateau-edge launch at 950 m above Lumbin — a wide grass
    ramp with W-NW orientation, the Coupe Icare main launch since
    1973. Wind direction is the dominant safety variable: W-NW
    on-flow gives textbook ridge soaring, but cross-flow above
    18 kn triggers plateau-edge rotor on the back-side. Site
    committee enforces direction and wind-strength gates and
    schools coordinate take-off windows. Tandems, students, and
    XC pilots launch from the same ramp with strict separation
    rotation. The Coupe Icare weekend concentrates volume — the
    site otherwise operates with comfortable spacing.

