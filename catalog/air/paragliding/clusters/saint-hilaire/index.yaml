gates:
  - metric: wind_speed_kn
    condition: gt
    value: 26
    reason_code: ALPINE_HIGH_WIND
    description: Sustained wind above 26 knots on the Saint-Hilaire launch creates significant rotor on the Chartreuse plateau back-side; site committee gates take-off above 22 kn W-NW.

  - metric: wind_gust_factor
    condition: gt
    value: 1.8
    reason_code: ALPINE_TURBULENT_AIR
    description: Gust factor above 1.8x on the Saint-Hilaire ramp indicates plateau-edge rotor on cross-flow; site committee enforces stand-down.

  - metric: visibility_km
    condition: lt
    value: 3
    reason_code: ALPINE_LOW_VISIBILITY
    description: Saint-Hilaire requires visibility above 3 km — the Lumbin LZ approach traverses the Grésivaudan valley with overhead Grenoble-Le-Versoud airport corridor.

  - metric: precipitation_mm_h
    condition: gt
    value: 0.5
    reason_code: ACTIVE_PRECIPITATION
    description: Active precipitation in the Grésivaudan valley correlates with downdraft and end of session.

  - metric: sun_altitude_deg
    condition: lt
    value: 0
    reason_code: NO_DAYLIGHT
    description: Saint-Hilaire site operations close at sunset.

sustainability:
  carbon_neutral: true
  equipment_dependency: medium
  typical_season_weeks: 36
  carrying_capacity_sensitivity: medium
  notes: |
    Saint-Hilaire paragliding is carbon-neutral free-flight per
    session, with the funiculaire (historical rack railway) providing
    car-free launch access. Carrying capacity is medium-to-high in
    peak summer and during the Coupe Icare weekend (last weekend of
    September — tens of thousands of spectators and concentrated
    flight volume). Raptor protection bands apply on the plateau
    cliff (typically Mar-Jul). The Lumbin LZ is shared with the
    Grenoble-Le-Versoud light-aviation circuit; site committee
    coordinates with the airport for airspace integration.

