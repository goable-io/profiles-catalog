description:
  en: |
    Saint-Hilaire-du-Touvet on the Chartreuse plateau hosts the
    Coupe Icare — the world's largest paragliding festival, held
    annually since 1973. The launch sits at 950 m on the dramatic
    plateau-edge overlooking the Grésivaudan valley; the LZ at
    Lumbin sits 500 m below at 215 m. The "funiculaire" rack
    railway from Grenoble valley to the plateau gives unique car-
    free launch access. Site is the French historical reference
    for paragliding development and remains a recreational + XC
    bench-mark — early-morning Grésivaudan valley flow is reliable,
    afternoon convergence cycles couple Chartreuse + Belledonne
    massifs, and the W-NW prevailing flow drives a textbook face-
    perpendicular soaring regime. School + tandem operations
    operate year-round.

