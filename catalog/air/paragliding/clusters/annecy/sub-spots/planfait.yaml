tier_rationale:
  en: |
    Planfait is the lower school launch at 1000 m above Talloires,
    served by paved road access and a wide grass take-off. Stable
    morning thermal cycles + low ridge profile + the standard
    Doussard LZ in glide range make this the canonical first-XC
    launch in France. The site is the home venue of multiple
    paragliding schools and tandem operators with daily volumes in
    the hundreds during peak season. Mid-day cycles can build cores
    of 2-3 m/s but never reach the strength of the Forclaz upper
    launch — appropriate for new XC pilots, intermediate-rated
    tandems, and SIV preparation.

