tier_rationale:
  en: |
    The Doussard / Verthier LZ is a large designated grass landing
    field at the south end of Lac d'Annecy, the standard target for
    every flight from Planfait and Forclaz. Open approach corridor
    from the north over the lake, no obstacles in the final 1 km, and
    LZ wind-sock infrastructure managed by the FFVL site committee.
    LZ-specific consequence profile is the lowest in the cluster —
    students and tandems land here by default. The site's only
    failure mode is over-shoot into the road or canal at the southern
    perimeter on tailwind approaches.

