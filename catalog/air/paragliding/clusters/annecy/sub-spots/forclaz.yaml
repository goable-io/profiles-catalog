tier_rationale:
  en: |
    The Forclaz upper launch at ~1500 m above the Col de la Forclaz
    is the Annecy cluster's serious thermal launch — south-facing
    slope, sustained convective cycles in summer, classic 800 m
    glide to the Doussard LZ. Site management imposes wind-direction
    restrictions (closed in S/SW > 22 kn) due to lee-rotor on the
    Tournette backbone. XC pilots routinely set off from here for
    100+ km flights toward the Bauges or Aravis ranges. The launch
    is a steeper grass face than Planfait; pilot rating expectations
    are intermediate XC and above, with tandems requiring documented
    site briefing.

