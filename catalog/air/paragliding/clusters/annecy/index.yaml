  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "FFVL Annecy site management committee operational standards"
    - "Annecy Vol Libre Club site directory"
    - "Ligue Auvergne-Rhône-Alpes Free Flight operational guidance"
  notes: |
    Spot overrides vs paragliding-alpine: wind sweet-spot kept at 6-10kn
    (same as region) with slightly steeper degradation 14kn → 22kn
    (Tournette lee-rotor sensitivity); gust factor curve and gate kept
    at alpine baseline (1.8x); season set to 32 weeks (Annecy operates
    Mar-Oct routinely, with Nov-Feb on warm anticyclone days). Once
    L1d's thermal_lift_index ships, the Tournette south face's
    afternoon convergence becomes scoring-grade rather than the current
    sun-altitude approximation.
