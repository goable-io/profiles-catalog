description:
  en: |
    Lac d'Annecy is the French paragliding training and recreational
    capital — a lakeside basin bracketed by the Forclaz (1500 m) and
    Planfait (1000 m) launches on the east bank, with the standard
    Doussard (Verthier) landing field on the south end. The 'lac
    aerologie' — a 14 km long alpine lake — gives reliable thermo-
    dynamic cycles: morning katabatic, mid-morning anabatic, midday
    convective coupling between the Tournette massif and the lake,
    and afternoon convergence with the Albanais valley breeze. Volume
    is enormous (FFVL lists Annecy as the highest-traffic free-flight
    site in France with tens of thousands of flights per season);
    site management rotates launches by direction and prohibits flight
    in S/SW > 15 kn on Forclaz. School + tandem operations dominate
    the morning window.

