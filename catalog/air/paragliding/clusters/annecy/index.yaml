gates:
  - metric: wind_speed_kn
    condition: gt
    value: 26
    reason_code: ALPINE_HIGH_WIND
    description: Sustained wind above 26 knots on the Annecy launches creates significant rotor on the Tournette lee side; Forclaz is gated by site management above 22 kn S/SW.

  - metric: wind_gust_factor
    condition: gt
    value: 1.8
    reason_code: ALPINE_TURBULENT_AIR
    description: Gust factor above 1.8x on the Annecy basin indicates lee turbulence from the Tournette ridge; canopy collapse risk in rotor zones.

  - metric: visibility_km
    condition: lt
    value: 3
    reason_code: ALPINE_LOW_VISIBILITY
    description: Annecy basin paragliding requires visibility above 3 km — terrain awareness on glides over the lake and Verthier landing approach.

  - metric: precipitation_mm_h
    condition: gt
    value: 0.5
    reason_code: ACTIVE_PRECIPITATION
    description: Active precipitation on the lake basin signals frontal passage and end of session.

  - metric: sun_altitude_deg
    condition: lt
    value: 0
    reason_code: NO_DAYLIGHT
    description: Annecy site operations close at sunset.

sustainability:
  carbon_neutral: true
  equipment_dependency: medium
  typical_season_weeks: 32
  carrying_capacity_sensitivity: medium
  notes: |
    Lac d'Annecy paragliding is carbon-neutral free-flight per session.
    Vehicle shuttle to Forclaz / Planfait adds out-of-session emissions.
    Carrying capacity is medium-to-high in peak summer (June-August)
    with 1000+ tandems on busy days; site management rotates launches
    and the FFVL imposes minimum-distance separations between schools.
    Raptor nesting protections apply on the Tournette face (typically
    Mar-Jul); pilots respect no-fly bands marked on the site map.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
