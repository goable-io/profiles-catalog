description:
  en: |
    Bir-Billing in Himachal Pradesh is India's paragliding capital
    and host of the 2015 FAI Paragliding World Cup. The launch site
    Billing sits at 2400 m on the Dhauladhar foothills; the LZ at
    Bir village is at 1400 m, a 14 km Tibetan-colony plain ideal
    for XC retrieve logistics. Post-monsoon (Oct-Nov) gives the
    most stable XC window — cloud-base routinely 4500-5500 m,
    Dhauladhar ridge gives sustained NW-flow-driven thermal
    streets, and 100-200 km flights toward Mandi or Manali are
    standard. Pre-monsoon (Mar-May) is the secondary season with
    stronger but less stable convection. Monsoon (Jun-Sep) is
    hard-closed: cu-nimb dominates and the site stands down. The
    Billing-Bir corridor is one of the cleanest Himalayan paragliding
    operating regimes globally.

