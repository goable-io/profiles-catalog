gates:
  - metric: wind_speed_kn
    condition: gt
    value: 24
    reason_code: HIMALAYAN_HIGH_WIND
    description: Sustained wind above 24 knots on Billing launch creates severe lee-rotor on the Dhauladhar back-side; Billing Paragliding Association SOP stands down.

  - metric: wind_gust_factor
    condition: gt
    value: 1.8
    reason_code: HIMALAYAN_TURBULENT_AIR
    description: Gust factor above 1.8x on the Billing ramp indicates Dhauladhar convergence turbulence; canopy collapse risk at altitude.

  - metric: visibility_km
    condition: lt
    value: 4
    reason_code: HIMALAYAN_LOW_VISIBILITY
    description: Bir-Billing XC requires visibility above 4 km — Dhauladhar ridge XC over 100 km of valley with sparse alternate LZ options.

  - metric: precipitation_mm_h
    condition: gt
    value: 0.5
    reason_code: ACTIVE_PRECIPITATION
    description: Active precipitation in the Bir-Billing corridor indicates monsoon-residual cu-nimb development; immediate land-out required.

  - metric: sun_altitude_deg
    condition: lt
    value: 0
    reason_code: NO_DAYLIGHT
    description: Bir-Billing operations close at sunset; valley katabatic builds rapidly after.

sustainability:
  carbon_neutral: true
  equipment_dependency: medium
  typical_season_weeks: 16
  carrying_capacity_sensitivity: low
  notes: |
    Bir-Billing paragliding is carbon-neutral free-flight per session.
    The Billing access road (graveled) carries vehicle emissions out
    of session scope. Carrying capacity is low in the XC arena — even
    during PWC season pilots disperse across 100+ km of Dhauladhar
    ridge. Bir LZ field rotation is operator-managed by the Billing
    Paragliding Association during competition windows; local
    Tibetan-colony residential boundaries are respected by site
    convention.

