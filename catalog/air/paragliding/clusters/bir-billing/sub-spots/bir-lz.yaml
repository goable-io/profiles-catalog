tier_rationale:
  en: |
    The Bir LZ is a wide cultivated plain at 1400 m on the Tibetan-
    colony side of Bir village. ~14 km of open valley provides
    multiple landing fields and minimal LZ-side commitment for the
    standard 14 km / 1000 m vertical descent from Billing. BPA
    coordinates field rotation with local residents during the
    October-November competition window when daily flight volume
    peaks. LZ failure modes are limited to over-shoot into the
    perimeter road or village residential boundary; the field is
    large enough to absorb concentrated traffic and tandem-school
    operations.

