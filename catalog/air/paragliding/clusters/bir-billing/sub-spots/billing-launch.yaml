tier_rationale:
  en: |
    Billing launch at 2400 m on the Dhauladhar foothills — a wide
    grass + scree ramp accessed by a graveled mountain road from
    Bir village (~30 minutes drive). South-facing orientation with
    sustained NW-flow thermal streeting in post-monsoon. The
    Billing Paragliding Association maintains site SOP, daily
    weather briefings, and a launch-rotation protocol during peak
    seasons. Tandem operations and PWC-grade pilots launch from
    the same ramp; rating expectation is intermediate XC for solo
    take-off. Lee-rotor sensitivity above the launch in cross-flow
    above 16 kn is the dominant local hazard.

