tier_rationale:
  en: |
    The Söll village LZ at the Hohe-Salve gondola base (~700 m) —
    designated grass field with open approach from the south,
    standard target for every Hohe-Salve flight. The cluster's
    safety reference for landing-side operations: no terrain
    obstruction in the final 1 km, wind-sock managed by local
    schools, low LZ-specific risk. Operational coordination is
    limited to school + tandem rotation during peak windows; LZ
    failure modes are limited to over-shoot toward the perimeter
    road on tailwind approaches.

