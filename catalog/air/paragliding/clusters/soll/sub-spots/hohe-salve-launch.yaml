tier_rationale:
  en: |
    Hohe Salve launch at 1828 m above Söll village — accessed by
    the Hohe-Salve gondola from Söll. South-east-facing grass
    ramp with the Wilder Kaiser as backdrop; sustained anabatic
    on summer afternoons feeding the village LZ in glide range.
    Standard Austrian intermediate-grade alpine launch with
    rotation between schools and tandem operators. Cross-flow
    rotor sensitivity above 18 kn forces ramp-side stand-down.
    Pilot rating expectation: intermediate (DHV-2 / EN B+) solo,
    documented site-briefing for visiting pilots.

