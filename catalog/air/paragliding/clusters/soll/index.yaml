  de: Gleitschirmfliegen — Söll
description:
  en: |
    Söll in the Tyrolean Wilder Kaiser-Brixental area hosts an
    intermediate-grade alpine paragliding cluster on the Hohe Salve
    (1828 m) — accessible by gondola from Söll village (700 m).
    South-east-facing launch with the Wilder Kaiser as backdrop
    and the village LZ at the gondola base in glide range. Less
    high-volume than Interlaken, less XC-intensive than Annecy,
    serves as a school + recreational reference for the eastern
    Austrian Alps with year-round tandem operations under
    Österreichischer Aero-Club permit. Sustained anabatic summer
    cycles + Salzach-valley breeze convergence on north-flow days
    drive the standard flight pattern.

