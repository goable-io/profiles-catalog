gates:
  - metric: wind_speed_kn
    condition: gt
    value: 26
    reason_code: ALPINE_HIGH_WIND
    description: Sustained wind above 26 knots on the Hohe Salve creates significant rotor on the Wilder Kaiser lee; operators stand down.

  - metric: wind_gust_factor
    condition: gt
    value: 1.8
    reason_code: ALPINE_TURBULENT_AIR
    description: Gust factor above 1.8x on the Hohe Salve ramp indicates Salzach-Inn convergence turbulence; canopy collapse risk in rotor zones.

  - metric: visibility_km
    condition: lt
    value: 3
    reason_code: ALPINE_LOW_VISIBILITY
    description: Söll cluster requires visibility above 3 km — terrain awareness on glide to village LZ and Salzach valley alternate.

  - metric: precipitation_mm_h
    condition: gt
    value: 0.5
    reason_code: ACTIVE_PRECIPITATION
    description: Active precipitation in the Wilder Kaiser area correlates with front passage and end of session.

  - metric: sun_altitude_deg
    condition: lt
    value: 0
    reason_code: NO_DAYLIGHT
    description: Söll cluster operations close at sunset by ÖAeC permit conditions.

sustainability:
  carbon_neutral: true
  equipment_dependency: medium
  typical_season_weeks: 30
  carrying_capacity_sensitivity: low
  notes: |
    Söll paragliding is carbon-neutral free-flight per session.
    Hohe Salve gondola access carries infrastructure emissions out
    of session scope. Carrying capacity is low — Söll is not a
    high-volume tandem destination on the scale of Interlaken or
    Annecy, primarily school + recreational + intermediate XC.
    Wilder Kaiser nature-protection zone applies to high-altitude
    flight; pilots respect ÖAeC + park-coordinated routings.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "Österreichischer Aero-Club (ÖAeC) paragliding cluster permit standards"
    - "Wilder Kaiser-Brixental SkiWelt + paragliding-school operator SOP"
    - "Tyrolean Free-Flight Federation site directory"
  notes: |
    Spot overrides vs paragliding-alpine: matches regional baseline
    (Söll is canonical-alpine in dimension and gate behaviour).
    Season set to 30 weeks (Söll operates Mar-Oct routinely with
    winter on warm anticyclone days). Wilder Kaiser as the dominant
    terrain feature drives both the thermal-cycle reliability and
    the cross-flow rotor sensitivity — once L1d's thermal_lift_index
    ships, the Salzach-Inn convergence becomes scoring-grade.
