description:
  en: |
    Roldanillo in the Valle del Cauca is the South American XC
    paragliding capital and the host of multiple PWC + World Cup
    Superfinal events. The launch site "Los Tanques" at 1500 m
    overlooks the Cauca valley; the LZ on the Roldanillo town
    edge sits at 950 m. The site's signature is the dry-season
    (Dec-Mar) "magic" cloud-base at 2500-3500 m with thermal
    streets running parallel to the Cordillera Occidental — 100-
    200 km daily XC tasks are routine, and the venue holds
    multiple world-record open-distance flights. The convergence
    line between the Cauca and Cordillera Occidental drives
    consistent thermal cycles between ~10:30 and 17:00 local. Less
    wind-gated than alpine sites; more sun and convergence driven.

