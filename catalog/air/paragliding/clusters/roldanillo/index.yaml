gates:
  - metric: wind_speed_kn
    condition: gt
    value: 28
    reason_code: ANDES_HIGH_WIND
    description: Sustained wind above 28 knots on the Los Tanques ramp degrades thermal-flying technique and risks asymmetric collapse on stack release.

  - metric: wind_gust_factor
    condition: gt
    value: 1.9
    reason_code: ANDES_TURBULENT_AIR
    description: Gust factor above 1.9x on the Cauca-Cordillera convergence indicates convective overdevelopment; competition pilots wait for cycle smoothing.

  - metric: visibility_km
    condition: lt
    value: 3
    reason_code: ANDES_LOW_VISIBILITY
    description: Roldanillo XC requires visibility above 3 km — Cauca valley open-distance task lines depend on long-range cloud-street recognition.

  - metric: precipitation_mm_h
    condition: gt
    value: 1.0
    reason_code: ACTIVE_PRECIPITATION
    description: Active precipitation in the Cauca valley indicates cu-nimb formation; immediate land-out required.

  - metric: sun_altitude_deg
    condition: lt
    value: 0
    reason_code: NO_DAYLIGHT
    description: Roldanillo operations close at sunset; equatorial twilight is short.

sustainability:
  carbon_neutral: true
  equipment_dependency: medium
  typical_season_weeks: 16
  carrying_capacity_sensitivity: low
  notes: |
    Roldanillo paragliding is carbon-neutral free-flight per session.
    4WD launch access to Los Tanques carries vehicle emissions out of
    session scope. Carrying capacity is low in the XC arena (pilots
    routinely cover 100-200 km) and medium at the town LZ during
    PWC season. The Roldanillo paragliding community has built local
    operator coordination with town authorities for LZ field
    rotation and PWC-week logistics.

