tier_rationale:
  en: |
    The Roldanillo town LZ is a designated grass field on the
    western edge of Roldanillo town at ~950 m. Standard target for
    sport flights from Los Tanques and short-task PWC days. Wide
    open approach from the east and south with no terrain
    obstruction; the only LZ-side coordination is with the local
    municipal soccer field overlap during weekend community use.
    Field is large enough to absorb PWC-week concentrated traffic.
    LZ failure modes are limited to over-shoot toward the
    perimeter agricultural fence — local operators maintain
    bilingual briefing for visiting pilots.

