tier_rationale:
  en: |
    Los Tanques launch at ~1500 m on the Cordillera Occidental
    overlooks the Roldanillo town and the Cauca valley to the
    east. The standard PWC launch — wide grass + dirt ramp accessed
    by 4WD-graded mountain road, sustained N-NE morning anabatic
    that couples into the Cauca-Cordillera convergence cycle by
    11:00 local. PWC-grade pilots, intermediate XC, and tandems
    launch from the same ramp with rotation managed by competition
    director during PWC week, otherwise by local operators. Lee-
    rotor sensitivity in W or strong-S flow forces the alternate
    Pico Sin Nombre launch when conditions cross-flow.

