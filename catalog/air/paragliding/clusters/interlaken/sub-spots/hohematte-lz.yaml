tier_rationale:
  en: |
    The Hohematte LZ is the large grass park in central Interlaken
    at 560 m, between Interlaken West and Ost rail stations. The
    most-used commercial-tandem LZ in Switzerland, with multiple
    operators landing simultaneously through municipally-coordinated
    rotation. Wide open approach from the north and west, no
    significant terrain obstruction in the final 1 km. LZ-side
    coordination is intense (200-400 tandems/day in peak summer +
    tourist foot-traffic + rail-station throughput) but managed by
    the SHV permit + municipal protocol. LZ-specific risk is low
    on the canopy side; the operational complexity is volume + LZ
    sharing.

