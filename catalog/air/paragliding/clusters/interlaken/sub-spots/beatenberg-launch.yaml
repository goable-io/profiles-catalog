tier_rationale:
  en: |
    Beatenberg launch at ~1600 m on the Niederhorn massif north of
    Lake Thun — accessed by Niederhorn funicular + short bus.
    South-facing grass ramp with the Hohematte LZ in glide range
    (~1000 m vertical, ~5 km). Sustained anabatic in summer
    afternoons + occasional convergence cycles with Lake Thun
    breeze. Tandem operators use Beatenberg as the main commercial
    launch with 4-hour daily windows; intermediate XC pilots
    couple Beatenberg into the Niederhorn-Justistal-Stockhorn ridge
    chain. Lee-rotor sensitivity above 18 kn cross-flow forces
    operator stand-down.

