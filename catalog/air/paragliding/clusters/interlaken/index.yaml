description:
  en: |
    Interlaken in the Berner Oberland is Switzerland's paragliding
    tandem capital — between Lake Thun and Lake Brienz with the
    Jungfrau-Eiger-Mönch massif as backdrop. Launch sites at
    Beatenberg (1600 m) and Amisbühl (1100 m) on the north flank
    feed the Hohematte LZ in central Interlaken (560 m). The site
    runs year-round tandem operations on the Swiss Air-Sports
    Federation operating permit and concentrates the highest tandem
    volumes in the country (estimated 200-400+ tandems/day in peak
    summer with multiple operators including Skywings, Paragliding
    Interlaken, AlpinAir). Tourist-tandem-heavy traffic pattern
    differs from XC-oriented sites like Annecy or Chamonix.

