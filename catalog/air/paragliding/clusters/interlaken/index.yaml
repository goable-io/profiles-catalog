gates:
  - metric: wind_speed_kn
    condition: gt
    value: 26
    reason_code: ALPINE_HIGH_WIND
    description: Sustained wind above 26 knots in the Berner Oberland valley creates significant rotor on the Niederhorn lee; operators stand down.

  - metric: wind_gust_factor
    condition: gt
    value: 1.8
    reason_code: ALPINE_TURBULENT_AIR
    description: Gust factor above 1.8x on the Beatenberg ramp indicates Berner-Oberland thermal-frontal turbulence; tandem operators rotate launches.

  - metric: visibility_km
    condition: lt
    value: 3
    reason_code: ALPINE_LOW_VISIBILITY
    description: Interlaken Hohematte LZ approach requires visibility above 3 km — town centre LZ with rail-station + hotel overflight corridors.

  - metric: precipitation_mm_h
    condition: gt
    value: 0.5
    reason_code: ACTIVE_PRECIPITATION
    description: Active precipitation in the Berner Oberland correlates with rapid Jungfrau-massif front transit; immediate land-out required.

  - metric: sun_altitude_deg
    condition: lt
    value: 0
    reason_code: NO_DAYLIGHT
    description: Interlaken tandem operations close at sunset by SHV permit conditions.

sustainability:
  carbon_neutral: true
  equipment_dependency: medium
  typical_season_weeks: 36
  carrying_capacity_sensitivity: high
  notes: |
    Interlaken paragliding is carbon-neutral free-flight per session.
    Beatenberg launch is reached by funicular + bus (low-emission
    vehicle access). Carrying capacity sensitivity is high — Hohematte
    LZ in central Interlaken absorbs 200-400+ tandems/day in peak
    summer plus tourist + transit foot-traffic. Multiple operators
    coordinate launch and LZ rotation under SHV permit conditions.
    Jungfrau-Aletsch UNESCO site protections apply to high-flight
    routes; no-fly bands around raptor nesting cliffs in spring.

