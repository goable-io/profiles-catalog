display_name:
  en: Paragliding — Andes
  it: Parapendio — Ande
  es: Parapente — Andes
  fr: Parapente — Andes
  de: Gleitschirmfliegen — Anden
description:
  en: |
    Andean paragliding (Roldanillo, Piedechinche, Iquique, Sopó) is
    a high-XC regime: convergence-driven thermal streets, very
    consistent flow patterns, and one of the most reliable cloud-
    base ceilings on the planet (Roldanillo's "magic" 2500-3500 m
    base 6 days/week in dry season). The Pacific-influenced Iquique
    coastal flow is distinct from the inland Roldanillo valley
    regime but both are scored here. Dry season (Dec-Mar in
    Colombia, year-round in Iquique) defines competition windows.
    Less wind-gated than European alpine sites, more sun- and
    thermal-driven.

