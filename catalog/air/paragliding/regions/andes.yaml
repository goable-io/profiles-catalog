gates:
  - metric: wind_speed_kn
    condition: gt
    value: 28
    reason_code: ANDES_HIGH_WIND
    description: Sustained wind above 28 knots on Andean ridge sites compromises thermal-flying technique and forces premature top-of-stack escape; competition pilots stand down.

  - metric: wind_gust_factor
    condition: gt
    value: 1.9
    reason_code: ANDES_TURBULENT_AIR
    description: Gust factor above 1.9x in Andean convective terrain risks asymmetric collapse on glide; pilots wait for cycle smoothing.

  - metric: visibility_km
    condition: lt
    value: 3
    reason_code: ANDES_LOW_VISIBILITY
    description: Andean XC paragliding requires visibility above 3 km — multi-100 km flights routinely traverse open valley with sparse landing options.

  - metric: precipitation_mm_h
    condition: gt
    value: 1.0
    reason_code: ACTIVE_PRECIPITATION
    description: Active precipitation in Andean afternoon convection indicates cu-nimb formation; immediate land-out required.

  - metric: sun_altitude_deg
    condition: lt
    value: 0
    reason_code: NO_DAYLIGHT
    description: Andean paragliding requires daylight; equatorial sites have short twilight and pilots respect strict end-of-day cycles.

sustainability:
  carbon_neutral: true
  equipment_dependency: medium
  typical_season_weeks: 16
  carrying_capacity_sensitivity: low
  notes: |
    Andean paragliding is free-flight with zero direct emissions per
    session. 4WD launch access (Los Tanques, Pico Sin Nombre) adds
    out-of-session infrastructure emissions. Carrying capacity is low
    in the XC arena (pilots cover 100-200 km daily during PWC season).
    LZ pressure at Roldanillo town fields is operator-managed during
    competitions.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "FAI PWC Colombia (Roldanillo) annual venue dossier"
    - "Federación Colombiana de Vuelo Libre (FCVL) site-rating standards"
    - "Iquique paragliding operators consolidated daily-window practice"
  notes: |
    Regional overrides vs global paragliding: wind sweet-spot extended
    (6-14kn vs 6-10kn) to reflect Andean valley flow and Iquique sea-
    breeze; sun weighting raised to 0.25 (thermal-quality proxy until
    L1d ships); gust gate kept loose (1.9x — convective cycles are
    natural and dampen quickly in dry air); 16-week season covers the
    Dec-Mar Colombian dry window plus the year-round Iquique flat
    coastal season. The Andean regime is best described as "thermal-
    plus-low-wind" — the inverse weighting from alpine.
