slug: paragliding-himalayas
spot_kind: region
version: "0.1.0"
category: air
extends: paragliding
region: himalayas
display_name:
  en: Paragliding — Himalayas
  it: Parapendio — Himalaya
  es: Parapente — Himalaya
  fr: Parapente — Himalaya
  de: Gleitschirmfliegen — Himalaya
description:
  en: |
    Himalayan paragliding (Bir-Billing, Manali, Annapurna foothills,
    Pokhara) is a distinct regime from the Alps: launch altitudes of
    2000-4500 m put pilots routinely into thin-air canopy behaviour
    (higher trim speed, longer flare timing), thermal columns are
    deeper and stronger (cloud-base routinely 5000-6000 m vs alpine
    3500-4500 m), and post-monsoon (Oct-Nov) plus pre-monsoon (Mar-
    May) are the only safe XC windows — monsoon (Jun-Sep) is hard-
    closed by cu-nimb development. Lee-side rotor on the Dhauladhar
    backbone is severe and unforgiving; westerly synoptic flow
    routinely shuts sites at midday. Density-altitude effects matter
    here in a way they don't in the Alps.

