slug: hot-air-ballooning
version: "1.0.0"
category: air
display_name:
  en: Hot-Air Ballooning
  it: Mongolfiera
  es: Globo Aerostático
  fr: Montgolfière
  de: Heißluftballon
description:
  en: |
    Lighter-than-air flight in a hot-air balloon. The activity is
    extremely wind-sensitive on launch and landing: anything above 10
    knots ground wind makes envelope deployment and basket landing
    unsafe. Thermal stability and atmospheric turbulence determine
    flight quality. Most commercial passenger flights launch in the
    pre-dawn calm window (sun_altitude < 5°), which dominates the
    scoring asymmetry vs other air sports. Visibility is critical for
    obstacle avoidance during landing in agricultural terrain.

dimensions:
  - name: wind_speed
    metric: wind_speed_kn
    weight: 0.35
    curve:
      - { x: 0,  s: 1.00 }
      - { x: 3,  s: 1.00 }
      - { x: 6,  s: 0.80 }
      - { x: 9,  s: 0.40 }
      - { x: 12, s: 0.10 }
      - { x: 18, s: 0.00 }

  - name: visibility
    metric: visibility_km
    weight: 0.20
    curve:
      - { x: 0,  s: 0.00 }
      - { x: 2,  s: 0.40 }
      - { x: 5,  s: 0.80 }
      - { x: 10, s: 1.00 }

  - name: precipitation
    metric: precipitation_mm_h
    weight: 0.15
    curve:
      - { x: 0,   s: 1.00 }
      - { x: 0.2, s: 0.60 }
      - { x: 1,   s: 0.15 }
      - { x: 2,   s: 0.00 }

  - name: thermal_stability
    metric: convective_cloud_base_m
    weight: 0.10
    curve:
      - { x: 0,    s: 0.20 }
      - { x: 800,  s: 0.70 }
      - { x: 1500, s: 1.00 }
      - { x: 3000, s: 1.00 }

  - name: pre_dawn_window
    metric: sun_altitude_deg
    weight: 0.10
    curve:
      - { x: -6, s: 0.85 }
      - { x: 0,  s: 1.00 }
      - { x: 5,  s: 0.90 }
      - { x: 15, s: 0.50 }
      - { x: 30, s: 0.20 }
      - { x: 60, s: 0.00 }

  - name: gust_factor
    metric: wind_gust_factor
    weight: 0.05
    curve:
      - { x: 1.0, s: 1.00 }
      - { x: 1.2, s: 0.85 }
      - { x: 1.5, s: 0.40 }
      - { x: 2.0, s: 0.05 }

  - name: air_temp_density
    metric: apparent_temp_c
    weight: 0.05
    curve:
      - { x: -10, s: 0.95 }
      - { x: 0,   s: 1.00 }
      - { x: 15,  s: 1.00 }
      - { x: 28,  s: 0.75 }
      - { x: 38,  s: 0.30 }

gates:
  - metric: wind_speed_kn
    condition: gt
    value: 12
    reason_code: GROUND_WIND_LAUNCH
    description: Ground wind above 12 knots makes envelope deployment and landing unsafe; commercial operators (FAI/national authorities) gate flights below 10-12 knots.

  - metric: precipitation_mm_h
    condition: gt
    value: 0.5
    reason_code: ACTIVE_PRECIPITATION
    description: Active precipitation damages the envelope and dramatically increases descent rate by adding weight; no commercial flights operate in measurable rain.

  - metric: visibility_km
    condition: lt
    value: 1.5
    reason_code: VFR_MINIMUM
    description: Visibility below 1.5km violates VFR rules for hot-air ballooning under most national CAA regulations.

  - metric: wind_gust_factor
    condition: gt
    value: 2.0
    reason_code: GUST_INSTABILITY
    description: Gust factor above 2.0 creates uncontrollable envelope behaviour on launch and landing.

sustainability:
  carbon_neutral: false
  equipment_dependency: high
  typical_season_weeks: 28
  carrying_capacity_sensitivity: low
  notes: |
    Propane burner combustion produces direct CO₂ emissions per flight
    (~30-50 kg CO₂e per hour for a passenger basket). Envelope, basket,
    and burner have multi-year lifespan but envelope fabric is not
    currently recycled at end-of-life. Carrying capacity sensitivity
    is low: balloons drift over terrain rather than concentrating
    impact at a launch site, though concentrated commercial launch
    zones (Cappadocia, Sossusvlei, Bristol) have local-area ground-
    crew traffic impact.

verdict_buckets:
  unsafe: 0
  poor: [1, 30]
  marginal: [31, 50]
  fair: [51, 70]
  favorable: [71, 85]
  excellent: [86, 100]

meta:
  maturity: provisional
  reviewed_by: []
  sources:
    - "FAI Ballooning Commission (CIA) operational standards"
    - "European Aviation Safety Agency (EASA) hot-air balloon flight rules"
    - "British Balloon and Airship Club (BBAC) operations manual"
  notes: |
    Wind_speed carries the single highest weight (0.35) and the tightest
    gate (12 kn) of any air sport in the catalog because balloons have
    no propulsion to fight wind. The pre_dawn_window dimension via
    sun_altitude_deg captures the operational reality that most flights
    occur in the calm 30-60min after sunrise (or before sunset). L1d
    additions: density_altitude_m (already in MetricEnum, would replace
    air_temp_density approximation) for high-elevation flights
    (Cappadocia 1100m, Sossusvlei).
