name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Enable corepack
        run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm validate
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm bundle

      # Source of truth for the published version is npm itself, NOT the
      # repository's package.json — this avoids race conditions between
      # the release workflow's commit-back and concurrent PR merges.
      - name: Compute next patch version
        id: bump
        run: |
          set -euo pipefail
          PKG_NAME=$(node -p "require('./package.json').name")
          LATEST=$(npm view "$PKG_NAME" version 2>/dev/null || echo "0.0.0")
          MAJOR=$(echo "$LATEST" | cut -d. -f1)
          MINOR=$(echo "$LATEST" | cut -d. -f2)
          PATCH=$(echo "$LATEST" | cut -d. -f3)
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "Latest on npm: ${LATEST}  →  next: ${NEXT}"
          npm version "$NEXT" --no-git-tag-version --allow-same-version
          echo "version=v${NEXT}" >> "$GITHUB_OUTPUT"
          echo "version_plain=${NEXT}" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Tag-only push (no commit back to main). package.json on main stays
      # untouched; consumers always read the actual version from npm.
      - name: Create and push tag
        run: |
          git tag "${{ steps.bump.outputs.version }}"
          git push origin "${{ steps.bump.outputs.version }}"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.version }}
          files: |
            dist/catalog.json
            dist/profile.schema.json
          generate_release_notes: true
