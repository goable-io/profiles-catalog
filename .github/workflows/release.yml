name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Enable corepack
        run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm validate
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm bundle

      # Version resolution policy:
      #
      #   - If package.json version is strictly greater than the latest version
      #     on npm, publish package.json's version exactly (manual major/minor
      #     bump path — used for v2.0.0 and similar planned releases).
      #   - If package.json version equals npm latest, auto-bump the patch
      #     component (routine merge path — most merges to main land here).
      #   - If package.json version is less than npm latest, fail loudly:
      #     someone forgot to bump after a release, or the repo and npm have
      #     drifted in an unsafe way.
      - name: Resolve next version
        id: bump
        run: |
          set -euo pipefail
          PKG_NAME=$(node -p "require('./package.json').name")
          REPO_VERSION=$(node -p "require('./package.json').version")
          NPM_LATEST=$(npm view "$PKG_NAME" version 2>/dev/null || echo "0.0.0")

          CMP=$(node -e "
            const v = (s) => s.split('.').map(Number);
            const a = v('$REPO_VERSION');
            const b = v('$NPM_LATEST');
            for (let i = 0; i < 3; i++) {
              if (a[i] > b[i]) { console.log('gt'); process.exit(0); }
              if (a[i] < b[i]) { console.log('lt'); process.exit(0); }
            }
            console.log('eq');
          ")

          echo "package.json: $REPO_VERSION"
          echo "npm latest:   $NPM_LATEST"
          echo "comparison:   $CMP"

          case "$CMP" in
            gt)
              NEXT="$REPO_VERSION"
              echo "Using package.json version (manual bump): $NEXT"
              ;;
            eq)
              MAJOR=$(echo "$NPM_LATEST" | cut -d. -f1)
              MINOR=$(echo "$NPM_LATEST" | cut -d. -f2)
              PATCH=$(echo "$NPM_LATEST" | cut -d. -f3)
              NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
              echo "Auto-bumping patch: $NEXT"
              npm version "$NEXT" --no-git-tag-version --allow-same-version
              ;;
            lt)
              echo "::error::package.json ($REPO_VERSION) is BEHIND npm latest ($NPM_LATEST). Manual intervention required." >&2
              exit 1
              ;;
            *)
              echo "::error::Could not compare versions" >&2
              exit 1
              ;;
          esac

          echo "version=v${NEXT}" >> "$GITHUB_OUTPUT"
          echo "version_plain=${NEXT}" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Tag-only push (no commit back to main). package.json on main stays
      # untouched; consumers always read the actual version from npm.
      - name: Create and push tag
        run: |
          git tag "${{ steps.bump.outputs.version }}"
          git push origin "${{ steps.bump.outputs.version }}"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.version }}
          files: |
            dist/catalog.json
            dist/profile.schema.json
          generate_release_notes: true
