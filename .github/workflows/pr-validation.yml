name: PR validation

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Enable corepack
        run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm validate
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm bundle
