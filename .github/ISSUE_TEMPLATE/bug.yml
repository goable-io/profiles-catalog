name: Bug report
description: Schema validation bug, broken bundle, CI/release glitch, or incorrect data in a published profile.
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Package version
      description: "Output of `npm ls @goable-io/profiles-catalog` or the commit SHA you're on."
      placeholder: "1.0.5 (or commit abcdef1)"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you do, what did you expect, what did you get?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal steps. If it's a schema/validation issue, paste the YAML that misbehaves.
      render: shell
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "Node 20.11 / pnpm 11 / macOS 14.4"
